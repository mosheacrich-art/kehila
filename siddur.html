<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siddur — Jabad Barcelona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    /* ── Base dark ── */
    body { background: #000; }
    .main-content {
      margin-left: var(--sidebar-width);
      width: calc(100vw - var(--sidebar-width));
      height: 100vh;
      background: #000;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    @media (max-width: 768px) { .main-content { margin-left: 0; width: 100vw; } }

    .siddur-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Top bar ── */
    .siddur-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #000;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .siddur-topbar-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1rem;
      color: #fff;
      letter-spacing: 0.05em;
    }
    .topbar-icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1.5px solid #333;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: border-color 0.15s, background 0.15s;
    }
    .topbar-icon-btn svg { width: 15px; height: 15px; }
    .topbar-icon-btn:hover { border-color: #fff; background: #111; }
    .topbar-icons { display: flex; align-items: center; gap: 8px; }

    /* ── TOC ── */
    .toc-tabbar {
      display: flex;
      padding: 0 20px;
      background: #000;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .toc-tab {
      padding: 10px 16px;
      font-family: Georgia, serif;
      font-size: 0.82rem;
      color: #555;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .toc-tab.active { color: #fff; border-bottom-color: #fff; }
    .toc-list { flex: 1; overflow-y: auto; }
    .toc-section-divider {
      padding: 18px 24px 8px;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
      font-family: Georgia, serif;
      border-bottom: 1px solid #111;
    }
    .toc-entry {
      padding: 14px 24px;
      border-bottom: 1px solid #111;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: background 0.12s;
    }
    .toc-entry:hover { background: #0d0d0d; }
    .toc-entry-left { flex: 1; }
    .toc-entry-en {
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: Georgia, serif;
    }
    .toc-heb-box {
      display: inline-block;
      border: 1.5px solid #fff;
      padding: 2px 14px 6px;
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.5rem;
      color: #fff;
      direction: rtl;
      line-height: 1.2;
    }
    .toc-entry-num {
      font-family: Georgia, serif;
      font-size: 0.78rem;
      color: #444;
      flex-shrink: 0;
      min-width: 28px;
      text-align: right;
    }

    /* ── Sections list ── */
    .sections-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .sections-header-heb {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.4rem;
      color: #fff;
      direction: rtl;
      line-height: 1;
    }
    .sections-header-es {
      font-size: 0.72rem;
      color: #555;
      font-style: italic;
      font-family: Georgia, serif;
    }
    .sections-list-wrap { flex: 1; overflow-y: auto; }
    .section-item {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid #111;
      cursor: pointer;
      transition: background 0.12s;
      gap: 14px;
    }
    .section-item:hover { background: #0d0d0d; }
    .section-item-num {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      color: #444;
      min-width: 18px;
      flex-shrink: 0;
    }
    .section-item-body { flex: 1; }
    .section-item-heb {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.1rem;
      direction: rtl;
      color: #fff;
      line-height: 1.2;
    }
    .section-item-es {
      font-size: 0.72rem;
      color: #555;
      margin-top: 3px;
      font-family: Georgia, serif;
      font-style: italic;
    }
    .section-item-arrow { color: #2a2a2a; flex-shrink: 0; transition: color 0.12s; }
    .section-item:hover .section-item-arrow { color: #fff; }

    /* ── Reader ── */
    .reader-page-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 10px 24px 0;
      flex-shrink: 0;
    }
    .reader-section-tag {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.06em;
    }
    .reader-page-num {
      font-family: Georgia, serif;
      font-size: 0.75rem;
      color: #444;
    }
    .siddur-text-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 32px 80px;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 768px) { .siddur-text-area { padding: 16px 20px 100px; } }

    /* Prayer text */
    .prayer-heb-block {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.45rem;
      line-height: 2.1;
      direction: rtl;
      text-align: right;
      color: #fff;
      margin-bottom: 24px;
    }
    .prayer-translit-block {
      font-family: Georgia, serif;
      font-style: italic;
      color: #555;
      font-size: 0.875rem;
      line-height: 2;
      margin-bottom: 16px;
      padding-top: 16px;
      border-top: 1px solid #1a1a1a;
    }
    .prayer-trans-block {
      font-family: Georgia, serif;
      color: #888;
      font-size: 0.875rem;
      line-height: 1.9;
      padding-top: 16px;
      border-top: 1px solid #1a1a1a;
    }
    .prayer-heb-only {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.7rem;
      line-height: 2.3;
      direction: rtl;
      text-align: center;
      color: #fff;
    }
    .prayer-note {
      background: #0a0a0a;
      border-left: 2px solid #333;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-family: Georgia, serif;
      font-size: 0.78rem;
      color: #666;
      line-height: 1.65;
    }
    .prayer-note strong { color: #888; }
    .prayer-trad-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    @media (max-width: 600px) { .prayer-trad-cols { grid-template-columns: 1fr; } }
    .prayer-col-head {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
    }
    .view-toggle-btn {
      padding: 5px 11px;
      font-size: 0.7rem;
      background: transparent;
      color: #555;
      border: none;
      cursor: pointer;
      font-family: Georgia, serif;
      transition: color 0.12s, background 0.12s;
    }
    .view-toggle-btn.active { background: #fff; color: #000; }

    /* ── Bottom navigation ── */
    .reader-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-top: 1px solid #111;
      gap: 12px;
      flex-shrink: 0;
    }
    .reader-arrow-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid #2a2a2a;
      background: transparent;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.12s, background 0.12s;
      flex-shrink: 0;
    }
    .reader-arrow-btn:hover { border-color: #fff; background: #111; }
    .reader-arrow-btn svg { width: 13px; height: 13px; }
    .reader-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      justify-content: center;
      overflow: hidden;
    }
    .reader-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .reader-dot.active { background: #fff; transform: scale(1.4); }

    /* ── Siddur: 4 botones landing ── */
    .siddur-btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 28px 0;
    }
    .siddur-btn {
      background: transparent;
      border: 1px solid #2d2d2d;
      border-radius: 14px;
      padding: 40px 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: border-color .2s, background .2s;
      width: 100%;
    }
    .siddur-btn:hover  { border-color: #777; background: #0c0c0c; }
    .siddur-btn:active { background: #141414; }
    .siddur-btn-heb {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 2rem;
      color: #fff;
      direction: rtl;
      line-height: 1.2;
      display: block;
    }
    .siddur-btn-name {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: block;
    }
    .prayer-section-sep {
      text-align: center;
      color: #2a2a2a;
      padding: 22px 0;
      font-family: Georgia, serif;
      letter-spacing: 0.5em;
    }
    @media (max-width: 600px) {
      .siddur-btn { padding: 30px 14px; }
      .siddur-btn-heb { font-size: 1.55rem; }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jabad Barcelona">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div class="siddur-inner">
      <div class="page-header">
        <div>
          <button id="global-back-btn" onclick="goBack()" style="display:none;background:none;border:none;cursor:pointer;display:none;align-items:center;gap:6px;font-size:0.8rem;color:var(--color-text-muted);padding:0;margin-bottom:6px;transition:color 0.15s;" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--color-text-muted)'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
            <span id="global-back-label">Volver</span>
          </button>
          <div class="page-header-label">Tefila</div>
          <h1 class="page-header-title">Siddur</h1>
          <p class="page-header-sub">Libro de rezos — Nusaj Sefaradí</p>
        </div>
        <div class="page-header-actions" style="display:flex;gap:8px;align-items:center;">
          <select id="nusaj-select" class="btn btn-secondary btn-sm" style="font-size:0.83rem;padding:6px 12px;cursor:pointer;" onchange="showToast('Nusaj cambiado a ' + this.value,'info')">
            <option>Nusaj Sefaradí</option>
            <option>Nusaj Ashkenaz</option>
            <option>Nusaj Ari (Jabad)</option>
            <option>Nusaj Italki</option>
          </select>
          <button id="btn-edit-zmanim" style="display:none;" class="btn btn-secondary btn-sm" onclick="abrirZmanimModal()" title="Editar horarios de tefila">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
            Zmanim
          </button>
        </div>
      </div>

      <!-- Pantalla 1: Selección de tefila -->
      <div id="siddur-landing">
      <div class="siddur-btn-grid">
        <button class="siddur-btn" onclick="abrirTefila('shajarit')">
          <span class="siddur-btn-heb">&#x05E9;&#x05B7;&#x05D7;&#x05B2;&#x05E8;&#x05B4;&#x05D9;&#x05EA;</span>
          <span class="siddur-btn-name">Shajarit</span>
        </button>
        <button class="siddur-btn" onclick="abrirTefila('minja')">
          <span class="siddur-btn-heb">&#x05DE;&#x05B4;&#x05E0;&#x05B0;&#x05D7;&#x05B8;&#x05D4;</span>
          <span class="siddur-btn-name">Minja</span>
        </button>
        <button class="siddur-btn" onclick="abrirTefila('arvit')">
          <span class="siddur-btn-heb">&#x05E2;&#x05B7;&#x05E8;&#x05B0;&#x05D1;&#x05B4;&#x05D9;&#x05EA;</span>
          <span class="siddur-btn-name">Arvit</span>
        </button>
        <button class="siddur-btn" onclick="abrirTefila('birkat')">
          <span class="siddur-btn-heb">&#x05D1;&#x05BC;&#x05B4;&#x05E8;&#x05B0;&#x05DB;&#x05BC;&#x05B7;&#x05EA; &#x05D4;&#x05B7;&#x05DE;&#x05BC;&#x05B8;&#x05D6;&#x05D5;&#x05B9;&#x05DF;</span>
          <span class="siddur-btn-name">Bircat Hamazon</span>
        </button>
      </div>
    </div>
      <div id="siddur-sections" style="display:none;">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:28px;">
          <button onclick="volverLanding()" class="btn btn-secondary btn-sm" style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
            Volver
          </button>
          <div>
            <div class="page-header-label" id="sections-label" style="margin-bottom:2px;"></div>
            <div id="sections-heb" style="font-family:'Frank Ruhl Libre',serif;font-size:1.6rem;direction:rtl;color:var(--color-primary);line-height:1.1;"></div>
          </div>
        </div>
        <div class="sections-grid" id="sections-list"></div>
      </div>

      <!-- Pantalla 3: Texto del rezo -->
      <div id="siddur-prayer" style="display:none;">
        <div class="siddur-layout">
          <div class="siddur-panel-header">
            <button onclick="volverSecciones()" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:0.8rem;color:var(--color-text-muted);padding:4px 8px;border-radius:var(--radius-md);transition:background 0.15s;white-space:nowrap;flex-shrink:0;" onmouseover="this.style.background='var(--color-bg)'" onmouseout="this.style.background='none'">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
              Secciones
            </button>
            <div class="siddur-panel-title" style="margin:0 16px;">
              <h2 id="panel-heb-title" style="font-family:'Frank Ruhl Libre',serif;font-size:1.3rem;direction:rtl;line-height:1;"></h2>
              <span id="panel-es-title" style="font-size:0.8rem;color:var(--color-text-muted);"></span>
            </div>
            <div class="siddur-controls">
              <button class="ctrl-btn" onclick="changeFontSize(-1)" title="Reducir texto">A−</button>
              <button class="ctrl-btn" onclick="changeFontSize(1)" title="Aumentar texto">A+</button>
              <div class="view-mode-toggle">
                <button class="view-mode-btn active" onclick="setViewMode('completo',this)">Completo</button>
                <button class="view-mode-btn" onclick="setViewMode('heb',this)">Hebreo</button>
                <button class="view-mode-btn" onclick="setViewMode('trad',this)">Traducción</button>
              </div>
              <button class="ctrl-btn" id="bookmark-btn" onclick="toggleBookmark()" title="Guardar marcador">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/></svg>
              </button>
            </div>
          </div>

          <div class="siddur-text-area" id="text-area"></div>

          <div class="siddur-progress">
            <span id="progress-label"></span>
            <div class="siddur-progress-bar"><div class="siddur-progress-fill" id="progress-fill" style="width:0%"></div></div>
            <div style="display:flex;gap:var(--space-2)">
              <button class="ctrl-btn" onclick="prevSection()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
              </button>
              <button class="ctrl-btn" onclick="nextSection()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
      </div><!-- /siddur-inner -->
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/data.js"></script>
  <script>
    requireAuth();
    initNav('siddur');

    /* ────────────────────────────────────────────
       DATOS DEL SIDDUR
    ──────────────────────────────────────────── */
    const TEFILA_DATA = {
      shajarit: {
        sections: [
          { id:'mode-ani', heb:'מוֹדֶה אֲנִי', es:'Modé Aní', note: 'Se recita antes de lavarse las manos, al despertar.' },

          { id:'shajarit-berajot', heb:'בִּרְכוֹת הַשַּׁחַר', es:'Berajot HaShajar', note: 'Bendiciones de la mañana.' },
          { id:'pesukey', heb:'פְּסוּקֵי דְזִמְרָה', es:'Pesukéi DeZimrá', note: 'Versículos de alabanza.' },
          { id:'shema', heb:'קְרִיאַת שְׁמַע', es:'Keriat Shemá', note: 'Lectura del Shemá e Israel.' },
          { id:'amidá', heb:'עֲמִידָה', es:'Amidá — Shajarit', note: 'La oración central, de pie.' },
          { id:'tajanunim', heb:'תַּחֲנוּנִים', es:'Tajanunín', note: 'Plegarias de súplica (no en Shabat ni festividades).' },
          { id:'torá', heb:'קְרִיאַת הַתּוֹרָה', es:'Keriat HaTorá', note: 'Lectura de la Torá (lunes, jueves y Shabat).' },
          { id:'aleinu', heb:'עָלֵינוּ לְשַׁבֵּחַ', es:'Aleinu LeShabéaj', note: 'Al final de cada tefila.' },
          { id:'kaddish', heb:'קַדִּישׁ', es:'Kadísh', note: 'Recitado por los en duelo (aveilim).' },
          { id:'psalm-day', heb:'שִׁיר שֶׁל יוֹם', es:'Shir Shel Yom', note: 'Salmo del día de la semana.' },
          { id:'musaf', heb:'מוּסָף', es:'Musaf', note: 'Tefila adicional en Shabat, Rosh Jódesh y festividades.' }

      },
      minja: {
        sections: [
          { id:'m-asher', heb:'אַשְׁרֵי', es:'Ashréi', note: 'Salmo 145.' },
          { id:'m-amida', heb:'עֲמִידָה', es:'Amidá — Minjá', note: 'En días de ayuno incluye Seliját.' },

      'mode-ani': {
        heb: `מוֹדֶה אֲנִי לְפָנֶיךָ מֶלֶךְ חַי וְקַיָּם, שֶׁהֶחֱזַרְתָּ בִּי נִשְׁמָתִי בְּחֶמְלָה.

      'aleinu': {

      'sh-kabbalat': {

      'm-asher': {
        heb: `אַשְׁרֵי יוֹשְׁבֵי בֵיתֶךָ, עוֹד יְהַלְלוּךָ סֶּלָה.
אַשְׁרֵי הָעָם שֶׁכָּכָה לּוֹ, אַשְׁרֵי הָעָם שֶׁיְיָ אֱלֹהָיו.

תְּהִלָּה לְדָוִד. אֲרוֹמִמְךָ אֱלוֹהַי הַמֶּלֶךְ, וַאֲבָרְכָה שִׁמְךָ לְעוֹלָם וָעֶד.
בְּכָל יוֹם אֲבָרְכֶךָּ, וַאֲהַלְלָה שִׁמְךָ לְעוֹלָם וָעֶד.

גָּדוֹל יְיָ וּמְהֻלָּל מְאֹד, וְלִגְדֻלָּתוֹ אֵין חֵקֶר.
דּוֹר לְדוֹר יְשַׁבַּח מַעֲשֶׂיךָ, וּגְבוּרֹתֶיךָ יַגִּידוּ.

פּוֹתֵחַ אֶת יָדֶךָ, וּמַשְׂבִּיעַ לְכָל חַי רָצוֹן.
צַדִּיק יְיָ בְּכָל דְּרָכָיו, וְחָסִיד בְּכָל מַעֲשָׂיו.

תְּהִלַּת יְיָ יְדַבֶּר פִּי, וִיבָרֵךְ כָּל בָּשָׂר שֵׁם קָדְשׁוֹ לְעוֹלָם וָעֶד.
וַאֲנַחְנוּ נְבָרֵךְ יָהּ, מֵעַתָּה וְעַד עוֹלָם. הַלְלוּיָהּ.`,
        trans: `Dichosos los que moran en Tu Casa, aún te alabarán por siempre.
Dichoso el pueblo que así le va, dichoso el pueblo cuyo Dios es el Señor.

Alabanza de David. Te exaltaré, Dios mío, mi Rey, y bendeciré Tu Nombre eternamente.
Cada día Te bendeciré, y alabaré Tu Nombre por siempre jamás.

Grande es el Señor y muy digno de alabanza, y Su grandeza es inescrutable.
Generación tras generación celebrará Tus obras, y proclamará Tus proezas.

Abres Tu mano y sacías el deseo de todo ser viviente.
Justo es el Señor en todos Sus caminos, y misericordioso en todas Sus obras.

Mi boca proclamará la alabanza del Señor, y toda carne bendecirá Su santo Nombre por siempre.
Y nosotros bendeciremos a Dios desde ahora y por siempre. ¡Aleluya!`,
        translit: `Ashréi yoshvéi veiteján, od yehalelujá sela.
Ashréi haam shekaján lo, ashréi haam sheAdonái Elohav.

Tehilá leDavíd. Aromimejá Eloháj hamélej, vaavarejiá shimjá leolám vaéd.
Bejol yom avarejéjá, vaahaleliá shimjá leolám vaéd.

Gadól Adonái umehuliál meód, veliglutató ein jéker.
Dor ledor yeshabiaj maaseján, ugvurotéjá yagídu.

Potéaj et yadéján, umasvía lejol jaí ratzon.
Tzadík Adonái bejol derajáv, vejasíd bejol maasáv.

Tehilát Adonái yedabér pí, vivarjé jol basár shem kodsho leolám vaéd.
Vaanájnu nevarjé Yah, meatá veád olám. Haleluiá.`,
        note: 'El Salmo 145 se recita tres veces al día. Quien lo dice cada día tiene asegurado su lugar en el Mundo Venidero (Talmud Berajot 4b). Se dice con especial kavand (concentración) en el versículo "Potéaj et yadéján".'
      },
      'm-amida': {
        heb: `אֲדֹנָי שְׂפָתַי תִּפְתָּח וּפִי יַגִּיד תְּהִלָּתֶךָ.

בָּרוּךְ אַתָּה יְיָ, אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ,
אֱלֹהֵי אַבְרָהָם, אֱלֹהֵי יִצְחָק, וֵאלֹהֵי יַעֲקֹב.
הָאֵל הַגָּדוֹל הַגִּבּוֹר וְהַנּוֹרָא, אֵל עֶלְיוֹן.

אַתָּה קָדוֹשׁ וְשִׁמְךָ קָדוֹשׁ, וּקְדוֹשִׁים בְּכָל יוֹם יְהַלְלוּךָ סֶּלָה.
בָּרוּךְ אַתָּה יְיָ, הָאֵל הַקָּדוֹשׁ.

אַתָּה חוֹנֵן לְאָדָם דַּעַת, וּמְלַמֵּד לֶאֱנוֹשׁ בִּינָה.
בָּרוּךְ אַתָּה יְיָ, חוֹנֵן הַדָּעַת.

רְצֵה יְיָ אֱלֹהֵינוּ בְּעַמְּךָ יִשְׂרָאֵל וּבִתְפִלָּתָם,
וְהָשֵׁב אֶת הָעֲבוֹדָה לִדְבִיר בֵּיתֶךָ.
בָּרוּךְ אַתָּה יְיָ, הַמַּחֲזִיר שְׁכִינָתוֹ לְצִיּוֹן.

מוֹדִים אֲנַחְנוּ לָךְ שָׁאַתָּה הוּא יְיָ אֱלֹהֵינוּ
וֵאלֹהֵי אֲבוֹתֵינוּ לְעוֹלָם וָעֶד.

שִׂים שָׁלוֹם טוֹבָה וּבְרָכָה, חֵן וָחֶסֶד וְרַחֲמִים
עָלֵינוּ וְעַל כָּל יִשְׂרָאֵל עַמֶּךָ.
בָּרוּךְ אַתָּה יְיָ, הַמְבָרֵךְ אֶת עַמּוֹ יִשְׂרָאֵל בַּשָּׁלוֹם.`,
        trans: `Señor, abre mis labios para que mi boca proclame Tu alabanza.

Bendito eres Tú, Señor nuestro Dios y Dios de nuestros padres,
Dios de Abraham, Dios de Isaac y Dios de Jacob,
el Dios grande, poderoso y temible, el Dios Altísimo.

Tú eres santo y Tu Nombre es santo, y los santos cada día Te alabarán por siempre.
Bendito eres Tú, Señor, el Dios santo.

Tú concedes conocimiento al hombre y enseñas inteligencia al ser humano.
Bendito eres Tú, Señor, que concedes el conocimiento.

Complázcate, Señor nuestro Dios, en Tu pueblo Israel y en su plegaria,
y restituye el servicio al santuario de Tu Casa.
Bendito eres Tú, Señor, que devuelve Su Presencia a Sión.

Te damos gracias porque Tú eres el Señor nuestro Dios
y el Dios de nuestros padres eternamente.

Concede paz, bondad y bendición, gracia, amor y misericordia
sobre nosotros y sobre todo Israel Tu pueblo.
Bendito eres Tú, Señor, que bendice a Su pueblo Israel con la paz.`,
        translit: `Adonái sefatái tiftáj ufi yagíd tehilatéja.

Baruj atá Adonái, Eloheinu vElohéi avoteinu,
Elohéi Avrahám, Elohéi Itzják, vElohéi Yaakóv.
HaEl hagadól hagibór vehanorá, El Elyón.

Atá kadósh vesimjá kadósh, ukdoshím bejol yom yehalelujá séla.
Baruj atá Adonái, haEl hakadósh.

Atá jonén leadám dáat, umelaméd leenósh biná.
Baruj atá Adonái, jonén hadáat.

Retzé Adonái Eloheinu beamejá Yisraél uvtefilatám,
vehasháv et haavdá lidbír beitéja.
Baruj atá Adonái, hamajazír shejinató leTzión.

Modím anájnu lajá sheAtá hu Adonái Eloheinu
vElohéi avoteinu leolám vaéd.

Sim shalóm tová uverajá, jén vajésed verajamím
aleinu veal kol Yisraél améja.
Baruj atá Adonái, hamevaréj et amó Yisraél bashalóm.`,
        note: 'La Amidá de Minjá es idéntica a la de Shajarit en estructura. En días de ayuno se añade "Anénu" en la berajá de Shomáa Tefilá. Se reza de pie, en silencio, con los pies juntos.'
      },
      'm-tajanunim': {
        heb: `וְהוּא רַחוּם יְכַפֵּר עָוֹן וְלֹא יַשְׁחִית,
וְהִרְבָּה לְהָשִׁיב אַפּוֹ, וְלֹא יָעִיר כָּל חֲמָתוֹ.

יְיָ הוֹשִׁיעָה, הַמֶּלֶךְ יַעֲנֵנוּ בְיוֹם קָרְאֵנוּ.

שׁוֹמֵר יִשְׂרָאֵל, שְׁמוֹר שְׁאֵרִית יִשְׂרָאֵל,
וְאַל יֹאבַד יִשְׂרָאֵל, הָאוֹמְרִים שְׁמַע יִשְׂרָאֵל.`,
        trans: `Él es misericordioso, expiará la iniquidad y no destruirá,
y muchas veces apartará Su ira y no despertará toda Su furia.

¡Señor, salva! ¡Que el Rey nos responda el día que llamamos!

Guardián de Israel, guarda el remanente de Israel,
y que no perezca Israel, los que dicen "Shemá Israel".`,
        translit: `Vehu rajum yejapér avón veló yashjít,
vehirba lehashív apó, veló yaír kol jamató.

Adonái hoshiá, hamélej yaanénu beyóm korenú.

Shomér Yisraél, shmór sheerít Yisraél,
veál yovád Yisraél, haomrím Shemá Yisraél.`,
        note: 'El Tajanún (Nefílat Apáim) se omite en Shabat, festividades, Rosh Jódesh, durante el mes de Nisán, en Lag Baómer, en Janucá y en otras ocasiones festivas. Quien reza sin minián omite la parte de reclinarse.'
      },
      'm-aleinu': {
        heb: `עָלֵינוּ לְשַׁבֵּחַ לַאֲדוֹן הַכֹּל, לָתֵת גְּדֻלָּה לְיוֹצֵר בְּרֵאשִׁית,
שֶׁלֹּא עָשָׂנוּ כְּגוֹיֵי הָאֲרָצוֹת, וְלֹא שָׂמָנוּ כְּמִשְׁפְּחוֹת הָאֲדָמָה.
שֶׁלֹּא שָׂם חֶלְקֵנוּ כָּהֶם, וְגוֹרָלֵנוּ כְּכָל הֲמוֹנָם.

וַאֲנַחְנוּ כּוֹרְעִים וּמִשְׁתַּחֲוִים וּמוֹדִים,
לִפְנֵי מֶלֶךְ מַלְכֵי הַמְּלָכִים הַקָּדוֹשׁ בָּרוּךְ הוּא.

וְנֶאֱמַר: וְהָיָה יְיָ לְמֶלֶךְ עַל כָּל הָאָרֶץ,
בַּיּוֹם הַהוּא יִהְיֶה יְיָ אֶחָד וּשְׁמוֹ אֶחָד.`,
        trans: `Nos corresponde alabar al Señor de todo, atribuir grandeza al Creador del universo,
pues no nos ha hecho como las naciones de las tierras ni nos ha puesto como las familias de la tierra.
No ha puesto nuestra porción como la de ellos, ni nuestra suerte como la de toda su multitud.

Nosotros nos inclinamos, nos prosternamos y agradecemos
ante el Rey, Rey de los reyes, el Santo, bendito sea.

Y está dicho: "El Señor será Rey sobre toda la tierra,
en aquel día el Señor será Uno y Su Nombre Uno."`,
        translit: `Aleinu leshabéaj laadón hakol, latéit guedulá leyotzér bereshít,
sheló asánu kegoyéi haaratzót, veló samánu kemishpejót haadamá.
Sheló sam jelkeinu kahém, vegoraleinu kejol hamonám.

Vaanájnu korím umishtatjavím umodím,
lifnéi mélej maljéi hamelajím hakadósh baruj hu.

Veneémar: Vehayá Adonái lemélej al kol haarétz,
bayóm hahú yihié Adonái ejád ushemó ejád.`,
        note: 'Aleinu cierra cada una de las tres oraciones diarias. Al decir "vaanájnu korím" se inclina el cuerpo hacia adelante en señal de reverencia.'
      },
      'm-kaddish': {
        heb: `יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא.
בְּעָלְמָא דִּי בְרָא כִרְעוּתֵהּ, וְיַמְלִיךְ מַלְכוּתֵהּ,
בְּחַיֵּיכוֹן וּבְיוֹמֵיכוֹן וּבְחַיֵּי דְכָל בֵּית יִשְׂרָאֵל,
בַּעֲגָלָא וּבִזְמַן קָרִיב, וְאִמְרוּ אָמֵן.

יְהֵא שְׁמֵהּ רַבָּא מְבָרַךְ לְעָלַם וּלְעָלְמֵי עָלְמַיָּא.

יִתְבָּרַךְ וְיִשְׁתַּבַּח, וְיִתְפָּאַר וְיִתְרוֹמַם וְיִתְנַשֵּׂא,
וְיִתְהַדָּר וְיִתְעַלֶּה וְיִתְהַלָּל שְׁמֵהּ דְּקֻדְשָׁא, בְּרִיךְ הוּא.

עֹשֶׂה שָׁלוֹם בִּמְרוֹמָיו, הוּא יַעֲשֶׂה שָׁלוֹם,
עָלֵינוּ וְעַל כָּל יִשְׂרָאֵל, וְאִמְרוּ אָמֵן.`,
        trans: `Engrandecido y santificado sea Su gran Nombre
en el mundo que Él creó según Su voluntad, y que establezca Su reinado,
en vuestros días y en vuestra vida y en la vida de toda la casa de Israel,
pronto y en tiempo cercano, y decid: Amén.

Sea Su gran Nombre bendecido por siempre y por toda la eternidad.

Bendito, alabado, glorificado, ensalzado, exaltado,
honrado, elevado y elogiado sea el Nombre del Santo, bendito sea.

Él que hace la paz en Sus alturas, que Él haga la paz
sobre nosotros y sobre todo Israel, y decid: Amén.`,
        translit: `Yitgadál veyitkadásh shemé rabá.
Bealmá di verá jirevutéi, veyamliján maljutéi,
bejayejón uvyomejón uvjayéi dejól beit Yisraél,
baagalá uvizmán karíb, veimrú amén.

Yehé shemé rabá mevaráj leolám ulalmé almayá.

Yitbaráj veyishtabáj, veyitpaár veyitromám veyitnasé,
veyithadár veyitalé veyithalál shemé dekudshá, beríj hu.

Oséh shalóm bimromáv, hu yaasé shalóm,
aleinu veal kol Yisraél, veimrú amén.`,
        note: 'El Kadísh es una doxología aramea. Solo puede recitarse con minián (quórum de 10 varones adultos). El Kadísh de duelo (Yatom) lo recita quien está en los once meses de duelo por sus padres.'
      },
      'a-barchu': {
        heb: `בָּרְכוּ אֶת יְיָ הַמְּבֹרָךְ.

בָּרוּךְ יְיָ הַמְּבֹרָךְ לְעוֹלָם וָעֶד.

בָּרוּךְ אַתָּה יְיָ, אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם,
אֲשֶׁר בִּדְבָרוֹ מַעֲרִיב עֲרָבִים,
בְּחָכְמָה פּוֹתֵחַ שְׁעָרִים,
וּבִתְבוּנָה מְשַׁנֶּה עִתִּים, וּמַחֲלִיף אֶת הַזְּמַנִּים.
בָּרוּךְ אַתָּה יְיָ, הַמַּעֲרִיב עֲרָבִים.`,
        trans: `¡Bendecid al Señor que es bendito!

Bendito el Señor que es bendito por siempre jamás.

Bendito eres Tú, Señor nuestro Dios, Rey del universo,
que con Su palabra hace atardecer los atardeceres,
con sabiduría abre las puertas,
con inteligencia hace variar las estaciones y hace cambiar los tiempos.
Bendito eres Tú, Señor, que hace atardecer los atardeceres.`,
        translit: `Barjú et Adonái hamevorájj.

Barúj Adonái hamevorájj leolám vaéd.

Baruj atá Adonái, Eloheinu mélej haolám,
asher bidvaró maérev aravím,
bejojmá potéaj shearím,
uvtevuná meshaném itím, umajlíf et hazmaním.
Baruj atá Adonái, hamaérev aravím.`,
        note: 'El Barjú es la convocatoria a la oración comunitaria. Solo se dice con minián. El que llega tarde y escucha el Barjú responde aunque no vaya a rezar con la congregación.'
      },
      'a-shema': {
        heb: `שְׁמַע יִשְׂרָאֵל יְיָ אֱלֹהֵינוּ יְיָ אֶחָד.

בָּרוּךְ שֵׁם כְּבוֹד מַלְכוּתוֹ לְעוֹלָם וָעֶד.

וְאָהַבְתָּ אֵת יְיָ אֱלֹהֶיךָ בְּכָל לְבָבְךָ וּבְכָל נַפְשְׁךָ
וּבְכָל מְאֹדֶךָ. וְהָיוּ הַדְּבָרִים הָאֵלֶּה אֲשֶׁר אָנֹכִי מְצַוְּךָ
הַיּוֹם עַל לְבָבֶךָ.

וְהָיָה אִם שָׁמֹעַ תִּשְׁמְעוּ אֶל מִצְוֹתַי,
אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם,
לְאַהֲבָה אֶת יְיָ אֱלֹהֵיכֶם וּלְעָבְדוֹ בְּכָל לְבַבְכֶם וּבְכָל נַפְשְׁכֶם.

וַיֹּאמֶר יְיָ אֶל מֹשֶׁה לֵּאמֹר. דַּבֵּר אֶל בְּנֵי יִשְׂרָאֵל
וְאָמַרְתָּ אֲלֵהֶם וְעָשׂוּ לָהֶם צִיצִת עַל כַּנְפֵי בִגְדֵיהֶם לְדֹרֹתָם.
אֲנִי יְיָ אֱלֹהֵיכֶם.`,
        trans: `Escucha, Israel: el Señor es nuestro Dios, el Señor es Uno.

Bendito sea el Nombre de la gloria de Su reino por siempre jamás.

Amarás al Señor tu Dios con todo tu corazón, con toda tu alma
y con todas tus fuerzas. Estas palabras que Yo te ordeno hoy
estarán en tu corazón.

Y si obedeciereis fielmente Mis mandamientos
que hoy os ordeno,
de amar al Señor vuestro Dios y servirle con todo vuestro corazón y con toda vuestra alma.

El Señor habló a Moisés diciendo: Habla a los hijos de Israel
y diles que se hagan flecos en los bordes de sus vestidos para sus generaciones.
Yo soy el Señor vuestro Dios.`,
        translit: `Shemá Yisraél Adonái Eloheinu Adonái Ejád.

Baruj shem kevod maljutó leolám vaéd.

Veahavtá et Adonái Elohéja bejol levavjá uvejol nafshejá
uvejol meodéja. Vehayu hadevarím haéle asher anojí metzavejá
hayóm al levavéja.

Vehayá im shamóa tishmeú el mitzvotái,
asher anojí metzavé etjém hayóm,
leahavá et Adonái Eloheijém uleovdó bejol levavchem uvejol nafshejém.

Vayómer Adonái el Moshe lemór. Dabér el bnéi Yisraél
veamartá aléhem veasú lahém tzitzít al canféi vigdehém ledorotám.
Aní Adonái Eloheijém.`,
        note: 'El Shemá del Arvit se recita después del atardecer. La noche es el momento apropiado para las dos primeras paráshaot. El tercer párrafo (Tzitzit) recuerda el Éxodo incluso de noche.'
      },
      'a-amida': {
        heb: `אֲדֹנָי שְׂפָתַי תִּפְתָּח וּפִי יַגִּיד תְּהִלָּתֶךָ.

בָּרוּךְ אַתָּה יְיָ, אֱלֹהֵינוּ וֵאלֹהֵי אֲבוֹתֵינוּ,
אֱלֹהֵי אַבְרָהָם, אֱלֹהֵי יִצְחָק, וֵאלֹהֵי יַעֲקֹב.
הָאֵל הַגָּדוֹל הַגִּבּוֹר וְהַנּוֹרָא, אֵל עֶלְיוֹן.

אַתָּה קָדוֹשׁ וְשִׁמְךָ קָדוֹשׁ, וּקְדוֹשִׁים בְּכָל יוֹם יְהַלְלוּךָ סֶּלָה.
בָּרוּךְ אַתָּה יְיָ, הָאֵל הַקָּדוֹשׁ.

אַתָּה חוֹנַנְתָּנוּ לְמַדַּע תּוֹרָתֶךָ, וַתְּלַמְּדֵנוּ לַעֲשׂוֹת חֻקֵּי רְצוֹנֶךָ.
וַתַּבְדֵּל יְיָ אֱלֹהֵינוּ בֵּין קֹדֶשׁ לְחוֹל.

הַשְׁכִּיבֵנוּ יְיָ אֱלֹהֵינוּ לְשָׁלוֹם, וְהַעֲמִידֵנוּ מַלְכֵּנוּ לְחַיִּים.
וּפְרוֹשׂ עָלֵינוּ סֻכַּת שְׁלוֹמֶךָ.
בָּרוּךְ אַתָּה יְיָ, הַפּוֹרֵשׂ סֻכַּת שָׁלוֹם עָלֵינוּ וְעַל כָּל עַמּוֹ יִשְׂרָאֵל וְעַל יְרוּשָׁלָיִם.

שִׂים שָׁלוֹם טוֹבָה וּבְרָכָה, חֵן וָחֶסֶד וְרַחֲמִים
עָלֵינוּ וְעַל כָּל יִשְׂרָאֵל עַמֶּךָ.
בָּרוּךְ אַתָּה יְיָ, הַמְבָרֵךְ אֶת עַמּוֹ יִשְׂרָאֵל בַּשָּׁלוֹם.`,
        trans: `Señor, abre mis labios para que mi boca proclame Tu alabanza.

Bendito eres Tú, Señor nuestro Dios y Dios de nuestros padres,
Dios de Abraham, Dios de Isaac y Dios de Jacob,
el Dios grande, poderoso y temible, el Dios Altísimo.

Tú eres santo y Tu Nombre es santo, y los santos cada día Te alabarán por siempre.
Bendito eres Tú, Señor, el Dios santo.

Nos has dotado del conocimiento de Tu Torá y nos has enseñado a cumplir los estatutos de Tu voluntad.
Y has separado, Señor nuestro Dios, entre lo sagrado y lo profano.

Haznos reposar, Señor nuestro Dios, en paz, y levántanos, Rey nuestro, para la vida.
Y extiende sobre nosotros el tabernáculo de Tu paz.
Bendito eres Tú, Señor, que extiende el tabernáculo de la paz sobre nosotros, sobre todo Su pueblo Israel y sobre Jerusalén.

Concede paz, bondad y bendición, gracia, amor y misericordia
sobre nosotros y sobre todo Israel Tu pueblo.
Bendito eres Tú, Señor, que bendice a Su pueblo Israel con la paz.`,
        translit: `Adonái sefatái tiftáj ufi yagíd tehilatéja.

Baruj atá Adonái, Eloheinu vElohéi avoteinu,
Elohéi Avrahám, Elohéi Itzják, vElohéi Yaakóv.
HaEl hagadól hagibór vehanorá, El Elyón.

Atá kadósh vesimjá kadósh, ukdoshím bejol yom yehalelujá séla.
Baruj atá Adonái, haEl hakadósh.

Atá jonantánu lemadá Toratéja, vatlamedénu laasót jukéi retzonéja.
Vatavdél Adonái Eloheinu bein kódesh lejól.

Hashkivenú Adonái Eloheinu leshalom, vehaamedinú malkenú lejayím.
Ufros aleinu sukat shloméja.
Baruj atá Adonái, haporés sukát shalóm aleinu veal kol amó Yisraél veal Yerushaláim.

Sim shalóm tová uverajá, jén vajésed verajamím
aleinu veal kol Yisraél améja.
Baruj atá Adonái, hamevaréj et amó Yisraél bashalóm.`,
        note: 'La Amidá de Arvit se distingue por la berajá adicional de "Hashkivenú" (haznos reposar). A diferencia de Shajarit y Minjá, la Amidá de Arvit es originalmente opcional (reshut), aunque la costumbre establecida es rezarla siempre.'
      },
      'a-aleinu': {
        heb: `עָלֵינוּ לְשַׁבֵּחַ לַאֲדוֹן הַכֹּל, לָתֵת גְּדֻלָּה לְיוֹצֵר בְּרֵאשִׁית,
שֶׁלֹּא עָשָׂנוּ כְּגוֹיֵי הָאֲרָצוֹת, וְלֹא שָׂמָנוּ כְּמִשְׁפְּחוֹת הָאֲדָמָה.
שֶׁלֹּא שָׂם חֶלְקֵנוּ כָּהֶם, וְגוֹרָלֵנוּ כְּכָל הֲמוֹנָם.

וַאֲנַחְנוּ כּוֹרְעִים וּמִשְׁתַּחֲוִים וּמוֹדִים,
לִפְנֵי מֶלֶךְ מַלְכֵי הַמְּלָכִים הַקָּדוֹשׁ בָּרוּךְ הוּא.

וְנֶאֱמַר: וְהָיָה יְיָ לְמֶלֶךְ עַל כָּל הָאָרֶץ,
בַּיּוֹם הַהוּא יִהְיֶה יְיָ אֶחָד וּשְׁמוֹ אֶחָד.`,
        trans: `Nos corresponde alabar al Señor de todo, atribuir grandeza al Creador del universo,
pues no nos ha hecho como las naciones de las tierras ni nos ha puesto como las familias de la tierra.
No ha puesto nuestra porción como la de ellos, ni nuestra suerte como la de toda su multitud.

Nosotros nos inclinamos, nos prosternamos y agradecemos
ante el Rey, Rey de los reyes, el Santo, bendito sea.

Y está dicho: "El Señor será Rey sobre toda la tierra,
en aquel día el Señor será Uno y Su Nombre Uno."`,
        translit: `Aleinu leshabéaj laadón hakol, latéit guedulá leyotzér bereshít,
sheló asánu kegoyéi haaratzót, veló samánu kemishpejót haadamá.
Sheló sam jelkeinu kahém, vegoraleinu kejol hamonám.

Vaanájnu korím umishtatjavím umodím,
lifnéi mélej maljéi hamelajím hakadósh baruj hu.

Veneémar: Vehayá Adonái lemélej al kol haarétz,
bayóm hahú yihié Adonái ejád ushemó ejád.`,
        note: 'Aleinu cierra cada una de las tres oraciones diarias.'
      },
      'a-kaddish': {
        heb: `יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא.
בְּעָלְמָא דִּי בְרָא כִרְעוּתֵהּ, וְיַמְלִיךְ מַלְכוּתֵהּ,
בְּחַיֵּיכוֹן וּבְיוֹמֵיכוֹן וּבְחַיֵּי דְכָל בֵּית יִשְׂרָאֵל,
בַּעֲגָלָא וּבִזְמַן קָרִיב, וְאִמְרוּ אָמֵן.

יְהֵא שְׁמֵהּ רַבָּא מְבָרַךְ לְעָלַם וּלְעָלְמֵי עָלְמַיָּא.

יִתְבָּרַךְ וְיִשְׁתַּבַּח, וְיִתְפָּאַר וְיִתְרוֹמַם וְיִתְנַשֵּׂא,
וְיִתְהַדָּר וְיִתְעַלֶּה וְיִתְהַלָּל שְׁמֵהּ דְּקֻדְשָׁא, בְּרִיךְ הוּא.

עֹשֶׂה שָׁלוֹם בִּמְרוֹמָיו, הוּא יַעֲשֶׂה שָׁלוֹם,
עָלֵינוּ וְעַל כָּל יִשְׂרָאֵל, וְאִמְרוּ אָמֵן.`,
        trans: `Engrandecido y santificado sea Su gran Nombre
en el mundo que Él creó según Su voluntad, y que establezca Su reinado,
en vuestros días y en vuestra vida y en la vida de toda la casa de Israel,
pronto y en tiempo cercano, y decid: Amén.

Sea Su gran Nombre bendecido por siempre y por toda la eternidad.

Bendito, alabado, glorificado, ensalzado, exaltado,
honrado, elevado y elogiado sea el Nombre del Santo, bendito sea.

Él que hace la paz en Sus alturas, que Él haga la paz
sobre nosotros y sobre todo Israel, y decid: Amén.`,
        translit: `Yitgadál veyitkadásh shemé rabá.
Bealmá di verá jirevutéi, veyamliján maljutéi,
bejayejón uvyomejón uvjayéi dejól beit Yisraél,
baagalá uvizmán karíb, veimrú amén.

Yehé shemé rabá mevaráj leolám ulalmé almayá.

Yitbaráj veyishtabáj, veyitpaár veyitromám veyitnasé,
veyithadár veyitalé veyithalál shemé dekudshá, beríj hu.

Oséh shalóm bimromáv, hu yaasé shalóm,
aleinu veal kol Yisraél, veimrú amén.`,
        note: 'El Kadísh cierra la oración de Arvit. Solo puede recitarse con minián (quórum de 10 varones adultos).'
      },
      'bh-zimun': {
        heb: `רַבּוֹתַי, נְבָרֵךְ!

מִפִּי כֻלָּנוּ: בָּרוּךְ שֶׁאָכַלְנוּ מִשֶּׁלוֹ וּבְטוּבוֹ חָיִינוּ.

(בְּשָׁלשָׁה) בָּרוּךְ (אֱלֹהֵינוּ) שֶׁאָכַלְנוּ מִשֶּׁלוֹ וּבְטוּבוֹ חָיִינוּ.

בָּרוּךְ הוּא וּבָרוּךְ שְׁמוֹ.`,
        trans: `¡Señores, bendigamos!

Todos responden: ¡Bendito Aquel de cuyo alimento hemos comido y por cuya bondad vivimos!

(Con tres personas) Bendito (nuestro Dios) de cuyo alimento hemos comido y por cuya bondad vivimos.

Bendito Él y bendito Su Nombre.`,
        translit: `Rabotái, nevàréj!

Todos: Barúj sheajalnu mishélo uvtuvo jáinu.

(Con tres) Barúj (Eloheinu) sheajalnu mishélo uvtuvo jáinu.

Barúj hu uvarúj shemó.`,
        note: 'El Zimún es la convocatoria responsorial al Bircat Hamazón. Se recita cuando tres o más personas comieron juntas. Con diez personas se añade "Eloheinu". Con cien: "Adonái Eloheinu". Con mil: "Adonái Eloheinu Elohéi Israel". Solo se pueden unir al zimún quienes comieron pan del mismo grupo.'
      },
      'bh-birka1': {
        heb: `בָּרוּךְ אַתָּה יְיָ, אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם,
הַזָּן אֶת הָעוֹלָם כֻּלּוֹ בְּטוּבוֹ,
בְּחֵן בְּחֶסֶד וּבְרַחֲמִים.
הוּא נוֹתֵן לֶחֶם לְכָל בָּשָׂר, כִּי לְעוֹלָם חַסְדּוֹ.
וּבְטוּבוֹ הַגָּדוֹל תָּמִיד לֹא חָסַר לָנוּ,
וְאַל יֶחְסַר לָנוּ מָזוֹן לְעוֹלָם וָעֶד.
בַּעֲבוּר שְׁמוֹ הַגָּדוֹל, כִּי הוּא אֵל זָן וּמְפַרְנֵס לַכֹּל,
וּמֵטִיב לַכֹּל, וּמֵכִין מָזוֹן לְכָל בְּרִיּוֹתָיו אֲשֶׁר בָּרָא.

בָּרוּךְ אַתָּה יְיָ, הַזָּן אֶת הַכֹּל.`,
        trans: `Bendito eres Tú, Señor nuestro Dios, Rey del universo,
que alimenta al mundo entero con Su bondad,
con gracia, con amor y con misericordia.
Él da pan a toda carne, porque Su amor es eterno.
Y gracias a Su gran bondad nunca nos ha faltado nada,
y que nunca nos falte alimento por siempre jamás.
Por amor a Su gran Nombre, pues Él es el Dios que sustenta y provee para todos,
que hace el bien a todos y prepara alimento para todas Sus criaturas que creó.

Bendito eres Tú, Señor, que alimenta a todos.`,
        translit: `Baruj atá Adonái, Eloheinu mélej haolám,
hazán et haolám kuló betuvó,
bején bejésed uverajamím.
Hu notén léjem lejol basár, ki leolám jasdó.
Uvtuvó hagadól tamíd lo jasár lánu,
veal yejsár lánu mazón leolám vaéd.
Baavúr shemó hagadól, ki hu El zan umeranés lakól,
umetív lakól, umejín mazón lejol beriyotáv asher bará.

Baruj atá Adonái, hazán et hakól.`,
        note: 'La primera berajá agradece a Dios por el alimento. Es de origen mosaico según la tradición. Se recita siempre, incluso cuando uno no está seguro de haber comido la cantidad mínima requerida.'
      },
      'bh-birka2': {
        heb: `נוֹדֶה לְּךָ יְיָ אֱלֹהֵינוּ,
עַל שֶׁהִנְחַלְתָּ לַאֲבוֹתֵינוּ
אֶרֶץ חֶמְדָּה טוֹבָה וּרְחָבָה,
וְעַל שֶׁהוֹצֵאתָנוּ יְיָ אֱלֹהֵינוּ מֵאֶרֶץ מִצְרַיִם,
וּפְדִיתָנוּ מִבֵּית עֲבָדִים,
וְעַל בְּרִיתְךָ שֶׁחָתַמְתָּ בִּבְשָׂרֵנוּ,
וְעַל תּוֹרָתְךָ שֶׁלִּמַּדְתָּנוּ,
וְעַל חַיִּים חֵן וָחֶסֶד שֶׁחוֹנַנְתָּנוּ.

עַל הַכֹּל יְיָ אֱלֹהֵינוּ אֲנַחְנוּ מוֹדִים לָךְ
וּמְבָרְכִים אוֹתָךְ.
בָּרוּךְ אַתָּה יְיָ, עַל הָאָרֶץ וְעַל הַמָּזוֹן.`,
        trans: `Te damos gracias, Señor nuestro Dios,
por haber dado en herencia a nuestros padres
una tierra deseable, buena y amplia,
y por habernos sacado, Señor nuestro Dios, de la tierra de Egipto,
y habernos redimido de la casa de la esclavitud,
y por Tu alianza que has sellado en nuestra carne,
y por Tu Torá que nos has enseñado,
y por la vida, la gracia y el amor que nos has concedido.

Por todo ello, Señor nuestro Dios, te damos gracias
y te bendecimos.
Bendito eres Tú, Señor, por la tierra y por el alimento.`,
        translit: `Nodé lejá Adonái Eloheinu,
al shenijálta laavoteinu
érets jemdá tová urejavá,
veal shehozeatánu Adonái Eloheinu méerets Mitzráim,
ufditánu mibéit avadím,
veal britejá shejajtámta bivsarénu,
veal Toratejá shelimadetánu,
veal jáyim jén vajésed shejonantánu.

Al hakól Adonái Eloheinu anájnu modím lajá
umvarejím otáj.
Baruj atá Adonái, al haarétz veal hamazón.`,
        note: 'La segunda berajá fue compuesta por Josué al entrar al pueblo en la Tierra de Israel. Agradece por la tierra, la Torá, la alianza y el Éxodo. En Shabat, Rosh Jódesh y festividades se añaden párrafos especiales.'
      },
      'bh-birka3': {
        heb: `רַחֵם יְיָ אֱלֹהֵינוּ עַל יִשְׂרָאֵל עַמֶּךָ,
וְעַל יְרוּשָׁלַיִם עִירֶךָ,
וְעַל צִיּוֹן מִשְׁכַּן כְּבוֹדֶךָ,
וְעַל מַלְכוּת בֵּית דָּוִד מְשִׁיחֶךָ,
וְעַל הַבַּיִת הַגָּדוֹל וְהַקָּדוֹשׁ שֶׁנִּקְרָא שִׁמְךָ עָלָיו.

אֱלֹהֵינוּ, אָבִינוּ, רְעֵנוּ, זוּנֵנוּ, פַּרְנְסֵנוּ, וְכַלְכְּלֵנוּ,
וְהַרְוִיחֵנוּ, וְהַרְוַח לָנוּ יְיָ אֱלֹהֵינוּ מְהֵרָה מִכָּל צָרוֹתֵינוּ.

וְנָא, אַל תַּצְרִיכֵנוּ יְיָ אֱלֹהֵינוּ,
לֹא לִידֵי מַתְּנַת בָּשָׂר וָדָם,
כִּי אִם לְיָדְךָ הַמְּלֵאָה, הַפְּתוּחָה, הַקְּדוֹשָׁה וְהָרְחָבָה.

בָּרוּךְ אַתָּה יְיָ, בּוֹנֵה בְרַחֲמָיו יְרוּשָׁלָיִם. אָמֵן.`,
        trans: `Apiádate, Señor nuestro Dios, de Israel Tu pueblo,
de Jerusalén Tu ciudad,
de Sión morada de Tu gloria,
del reino de la casa de David Tu ungido,
y de la gran y santa Casa sobre la que Tu Nombre fue invocado.

Dios nuestro, Padre nuestro, pastoréanos, susténtanos, aliméntanos, manténnos,
alivíanos, y alivíanos Señor nuestro Dios pronto de todas nuestras angustias.

Y por favor, no nos hagas depender, Señor nuestro Dios,
ni de los dones de los seres de carne y sangre,
sino de Tu mano plena, abierta, santa y generosa.

Bendito eres Tú, Señor, que en Su misericordia reconstruye Jerusalén. Amén.`,
        translit: `Rajém Adonái Eloheinu al Yisraél améja,
veal Yerushaláim iréja,
veal Tzión mishkán kevodéja,
veal maljút beit David meshijéja,
veal habáit hagadól vehakadósh shenijrá shimjá aláv.

Eloheinu, avínu, raénu, zunénu, parnessénu, vejalkelenu,
veharviénu, veharáaj lánu Adonái Eloheinu meherá mikol tzarotéinu.

Vená, al tatzrijénu Adonái Eloheinu,
lo lídei matnát basár vadam,
ki im leyadejá hameléa, hapetujá, hakdoshá veharejavá.

Baruj atá Adonái, boné verajamáv Yerushaláim. Amén.`,
        note: 'La tercera berajá fue compuesta por el Rey David y Salomón. Se concluye con "Amén" en voz alta, lo cual es inusual dentro de una berajá propia. En Shabat se añade "Retzé vehajalitzeinu".'
      },
      'bh-birka4': {
        heb: `בָּרוּךְ אַתָּה יְיָ, אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם,
הָאֵל אָבִינוּ, מַלְכֵּנוּ, אַדִּירֵנוּ, בּוֹרְאֵנוּ, גֹּאֲלֵנוּ, יוֹצְרֵנוּ,
קְדוֹשֵׁנוּ קְדוֹשׁ יַעֲקֹב, רוֹעֵנוּ רוֹעֵה יִשְׂרָאֵל,
הַמֶּלֶךְ הַטּוֹב וְהַמֵּטִיב לַכֹּל,
שֶׁבְּכָל יוֹם וָיוֹם הוּא הֵטִיב, הוּא מֵטִיב, הוּא יֵיטִיב לָנוּ.
הוּא גְמָלָנוּ, הוּא גוֹמְלֵנוּ, הוּא יִגְמְלֵנוּ לָעַד,
לְחֵן וּלְחֶסֶד וּלְרַחֲמִים וּלְרֶוַח, הַצָּלָה וְהַצְלָחָה,
בְּרָכָה וִישׁוּעָה, נֶחָמָה, פַּרְנָסָה וְכַלְכָּלָה,
וְרַחֲמִים וְחַיִּים וְשָׁלוֹם וְכָל טוֹב,
וּמִכָּל טוּב לְעוֹלָם אַל יְחַסְּרֵנוּ.`,
        trans: `Bendito eres Tú, Señor nuestro Dios, Rey del universo,
el Dios Padre nuestro, Rey nuestro, Poderoso nuestro, Creador nuestro, Redentor nuestro, Formador nuestro,
Nuestro Santo, el Santo de Jacob, Nuestro Pastor, el Pastor de Israel,
el Rey que es bueno y hace el bien a todos,
que cada día ha hecho el bien, hace el bien, y nos hará el bien.
Él nos ha recompensado, Él nos recompensa, Él nos recompensará siempre,
con gracia, con amor y con misericordia, y con alivio, liberación y éxito,
bendición y salvación, consuelo, sustento y manutención,
y misericordia y vida y paz y todo bien,
y de todo bien que nunca nos falte.`,
        translit: `Baruj atá Adonái, Eloheinu mélej haolám,
haEl avínu, malkeinu, adireinu, boreenu, goaleinu, yotzreinu,
kedosheinu kedósh Yaakóv, roeinu roé Yisraél,
hamélej hatóv vehaMetív lakól,
shebejol yom vayóm hu hetív, hu metív, hu yetív lánu.
Hu gemalanu, hu gomelenu, hu yigmelenu laad,
lején ulejésed uverajamim ulerévaj, hatzalá vehatzlajá,
berajá vishúa, nejamá, parnasá vejalkala,
verajamim vejayim veshalóm vejol tov,
umikol tuv leolám al yejasereinu.`,
        note: 'La cuarta berajá fue añadida en Yavné en recuerdo de los caídos en la batalla de Betar (132 d.e.c.), cuya afectuosa sepultura fue milagrosa. Es la única berajá de Bircat Hamazón de origen rabínico (las tres anteriores son de la Torá).'
      },
      'bh-harajamanot': {
        heb: `הָרַחֲמָן הוּא יִמְלוֹךְ עָלֵינוּ לְעוֹלָם וָעֶד.

הָרַחֲמָן הוּא יִתְבָּרַךְ בַּשָּׁמַיִם וּבָאָרֶץ.

הָרַחֲמָן הוּא יִשְׁלַח בְּרָכָה מְרֻבָּה בַּבַּיִת הַזֶּה,
וְעַל שֻׁלְחָן זֶה שֶׁאָכַלְנוּ עָלָיו.

הָרַחֲמָן הוּא יִשְׁלַח לָנוּ אֶת אֵלִיָּהוּ הַנָּבִיא
זָכוּר לַטּוֹב, וִיבַשֶּׂר לָנוּ בְּשׂוֹרוֹת טוֹבוֹת יְשׁוּעוֹת וְנֶחָמוֹת.

הָרַחֲמָן הוּא יְזַכֵּנוּ לִימוֹת הַמָּשִׁיחַ וּלְחַיֵּי הָעוֹלָם הַבָּא.

מִגְדּוֹל יְשׁוּעוֹת מַלְכּוֹ, וְעוֹשֶׂה חֶסֶד לִמְשִׁיחוֹ,
לְדָוִד וּלְזַרְעוֹ עַד עוֹלָם.

עֹשֶׂה שָׁלוֹם בִּמְרוֹמָיו, הוּא יַעֲשֶׂה שָׁלוֹם
עָלֵינוּ וְעַל כָּל יִשְׂרָאֵל, וְאִמְרוּ אָמֵן.`,
        trans: `El Misericordioso reinará sobre nosotros por siempre jamás.

El Misericordioso sea bendecido en los cielos y en la tierra.

El Misericordioso enviará abundante bendición a esta casa,
y sobre esta mesa en la que hemos comido.

El Misericordioso nos enviará al profeta Elías
de grata memoria, que nos anuncie buenas noticias, salvaciones y consuelos.

El Misericordioso nos merezca los días del Mesías y la vida del Mundo Venidero.

Torre de salvaciones es Su rey, y hace amor con Su ungido,
con David y su descendencia por siempre.

Él que hace la paz en Sus alturas, que Él haga la paz
sobre nosotros y sobre todo Israel, y decid: Amén.`,
        translit: `HaRajamán hu yimlój aleinu leolám vaéd.

HaRajamán hu yitbaráj bashamáim uvaarétz.

HaRajamán hu yishlaj berajá merubá babáit hazé,
veal shulján zé sheajalnu aláv.

HaRajamán hu yishlaj lánu et Eliahu hanabí
zajúr latóv, vivásser lánu besarót tovót yeshuót venajamót.

HaRajamán hu yezakénu limót hamashíaj ulejayéi haolám habá.

Migdól yeshuót maljó, veoséh jésed limeshijó,
leDavíd ulzaró ad olám.

Oséh shalóm bimromáv, hu yaasé shalóm
aleinu veal kol Yisraél, veimrú amén.`,
        note: 'Los HaRajamán son peticiones al Misericordioso. La serie culmina con el versículo "Migdol yeshuot" y la plegaria por la paz. En casa de los padres, en Shabat, en festividades y en boda se añaden HaRajamán especiales para cada ocasión.'
      },
      'sp-hallel': {
        heb: `הַלְלוּיָהּ. הַלְלוּ עַבְדֵי יְיָ, הַלְלוּ אֶת שֵׁם יְיָ.

יְהִי שֵׁם יְיָ מְבֹרָךְ, מֵעַתָּה וְעַד עוֹלָם.
מִמִּזְרַח שֶׁמֶשׁ עַד מְבוֹאוֹ, מְהֻלָּל שֵׁם יְיָ.`,
        trans: `¡Aleluya! ¡Alabad, siervos del Señor, alabad el Nombre del Señor!

Sea el Nombre del Señor bendecido desde ahora y por siempre.
Desde el orto del sol hasta su ocaso, alabado sea el Nombre del Señor.`,
        translit: `Haleluiá. Halelú avdéi Adonái, halelú et shem Adonái.

Yehí shem Adonái mevorájj, méatá veád olám.
Mimizraj shémesh ad mevoó, mehulál shem Adonái.`,
        note: 'El Halel completo se recita en Pesaj, Shavuot, Sucot y Janucá. El Halel parcial en Rosh Jódesh y los últimos días de Pesaj.'
      },
      'sp-birkat': {
        heb: `רַבּוֹתַי נְבָרֵךְ.

בָּרוּךְ (אֱלֹהֵינוּ) שֶׁאָכַלְנוּ מִשֶּׁלוֹ וּבְטוּבוֹ חָיִינוּ.

בָּרוּךְ אַתָּה יְיָ, אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם,
הַזָּן אֶת הָעוֹלָם כֻּלּוֹ בְּטוּבוֹ בְּחֵן בְּחֶסֶד וּבְרַחֲמִים.`,
        trans: `¡Señores, bendigamos!

Bendito (nuestro Dios) de cuyo [alimento] hemos comido y por cuya bondad vivimos.

Bendito eres Tú, Señor nuestro Dios, Rey del universo,
que alimenta al mundo entero con Su bondad, con gracia, con amor y con misericordia.`,
        translit: `Rabotái nevàréj.

Baruj (Eloheinu) sheajalnu mishélo uvtuvo jainu.

Baruj atá Adonái Eloheinu mélej haolám,
hazán et haolám kuló betuvó bején bejésed uverajamím.`,
        note: 'Birkat Hamazón se recita después de comer pan (mínimo un kazáit). Requiere un mínimo de 3 personas para recitar la introducción responsorial (zimún).'
      }
    };

    /* ────────────────────────────────────────────
       ESTADO
    ──────────────────────────────────────────── */
    let currentTefila = 'shajarit';
    let currentSectionIdx = 0;
    let fontSize = 1.15; // rem para hebreo
    let viewMode = 'completo';
    let bookmarks = JSON.parse(localStorage.getItem('siddur_bookmarks') || '[]');

    function getCurrentSections() { return TEFILA_DATA[currentTefila].sections; }
    function getCurrentSection() { return getCurrentSections()[currentSectionIdx]; }

    /* ── Render lista de secciones (pantalla 2) ── */
    function renderSectionsList() {
      const td = TEFILA_DATA[currentTefila];
      const tefilaNames = { shajarit:'Shajarit', minja:'Minjá', arvit:'Arvit', birkat:'Bircat Hamazón' };
      const tefilaHeb   = { shajarit:'שַׁחֲרִית', minja:'מִנְחָה', arvit:'עַרְבִית', birkat:'בִּרְכַּת הַמָּזוֹן' };
      document.getElementById('sections-label').textContent = tefilaNames[currentTefila] || '';
      document.getElementById('sections-heb').textContent   = tefilaHeb[currentTefila]   || '';
      document.getElementById('sections-list').innerHTML = td.sections.map((s,i) => `
        <div class="section-item" onclick="abrirSeccion(${i})">
          <div class="section-item-body">
            <div class="section-item-heb">${s.heb}</div>
            <div class="section-item-es">${s.es}</div>
            ${s.note ? `<div class="section-item-note">${s.note}</div>` : ''}
          </div>
          <div class="section-item-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
          </div>
        </div>`).join('');
    }

    /* ── Render texto ── */
    function renderText() {
      const sec = getCurrentSection();
      const pt = PRAYER_TEXTS[sec.id];
      const sections = getCurrentSections();

      document.getElementById('panel-heb-title').textContent = sec.heb;
      document.getElementById('panel-es-title').textContent = sec.es;

      // Progress
      const pct = Math.round(((currentSectionIdx + 1) / sections.length) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `Sección ${currentSectionIdx+1} de ${sections.length}`;

      // Bookmark
      const saved = bookmarks.includes(sec.id);
      const bBtn = document.getElementById('bookmark-btn');
      bBtn.style.color = saved ? 'var(--color-gold)' : '';
      bBtn.querySelector('svg').setAttribute('fill', saved ? 'var(--color-gold)' : 'none');

      if (!pt) {
        document.getElementById('text-area').innerHTML = `
          <div class="prayer-block">
            <div style="text-align:center;padding:var(--space-12);color:var(--color-text-muted)">
              <div style="font-size:2.5rem;margin-bottom:var(--space-3)"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:40px;height:40px;display:inline-block;vertical-align:middle"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg></div>
              <p>El texto completo estará disponible en la versión final del Siddur.</p>
              ${sec.note ? `<div class="prayer-note" style="text-align:left;margin-top:var(--space-6)"><strong><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:16px;height:16px;display:inline-block;vertical-align:middle"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/></svg> Nota:</strong> ${sec.note}</div>` : ''}
            </div>
          </div>`;
        return;
      }

      let html = '';

      if (sec.note) {
        html += `<div class="prayer-note"><strong>Nota halájica:</strong> ${sec.note}</div>`;
      }

      if (viewMode === 'completo') {
        html += `
          <div class="prayer-heb-block" style="font-size:${fontSize}rem">${pt.heb.replace(/\n/g,'<br>')}</div>
          <div class="prayer-translit-block">${pt.translit.replace(/\n/g,'<br>')}</div>
          <div class="prayer-trans-block">${pt.trans.replace(/\n/g,'<br>')}</div>`;
      } else if (viewMode === 'heb') {
        html += `<div class="prayer-heb-only" style="font-size:${fontSize * 1.15}rem">${pt.heb.replace(/\n/g,'<br>')}</div>`;
      } else {
        html += `<div class="prayer-trad-cols">
          <div>
            <div class="prayer-col-head">Transliteración</div>
            <div style="font-style:italic;color:#555;line-height:2;font-size:0.92rem">${pt.translit.replace(/\n/g,'<br>')}</div>
          </div>
          <div>
            <div class="prayer-col-head">Traducción</div>
            <div style="color:#374151;line-height:1.9">${pt.trans.replace(/\n/g,'<br>')}</div>
          </div>
        </div>`;
      }

      document.getElementById('text-area').innerHTML = html;
    }

    /* ── Controles ── */
    function abrirSeccion(idx) {
      currentSectionIdx = idx;
      document.querySelectorAll('.view-mode-btn').forEach((b,i) => b.classList.toggle('active', i===0));
      viewMode = 'completo';
      document.getElementById('siddur-sections').style.display = 'none';
      document.getElementById('siddur-prayer').style.display = '';
      setBackBtn(true, 'Secciones');
      renderText();
    }

    function nextSection() {
      const max = getCurrentSections().length - 1;
      if (currentSectionIdx < max) { currentSectionIdx++; renderText(); }
      else { showToast('Has llegado al final de esta tefila', 'info'); }
    }

    function prevSection() {
      if (currentSectionIdx > 0) { currentSectionIdx--; renderText(); }
    }

    function changeFontSize(delta) {
      fontSize = Math.max(0.9, Math.min(2.2, fontSize + delta * 0.15));
      if (isFullPrayerMode) renderFullPrayer(); else renderText();
    }

    function setViewMode(mode, el) {
      document.querySelectorAll('.view-mode-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      viewMode = mode;
      renderText();
    }

    function toggleBookmark() {
      const id = getCurrentSection().id;
      toggleBookmarkById(null, id);
    }

    function toggleBookmarkById(e, id) {
      if (e) e.stopPropagation();
      const idx = bookmarks.indexOf(id);
      if (idx === -1) {
        bookmarks.push(id);
        showToast('Marcador guardado', 'success');
      } else {
        bookmarks.splice(idx, 1);
        showToast('Marcador eliminado', 'info');
      }
      localStorage.setItem('siddur_bookmarks', JSON.stringify(bookmarks));
      renderText();
    }

    /* ── Navegación entre pantallas ── */
    /* ── Navegación ── */
    function setBackBtn(show, label) {
      const btn = document.getElementById('global-back-btn');
      btn.style.display = show ? 'flex' : 'none';
      if (label) document.getElementById('global-back-label').textContent = label;
    }

    function goBack() {
      const prayer = document.getElementById('siddur-prayer');
      if (prayer.style.display !== 'none') {
        volverLanding();
    }

    function renderFullPrayer() {
      isFullPrayerMode = true;
      const sections = TEFILA_DATA[currentTefila] ? TEFILA_DATA[currentTefila].sections : [];
      const tefilaHeb = {
        shajarit: 'שַחֲרִית',
        minja:    'מִנְחָה',
        arvit:    'עַרְבִית',
        birkat:   'בִּרְכַּת הַמָּזוֹן'
      };
      const tagEl = document.getElementById('reader-section-tag');
      const numEl = document.getElementById('reader-page-num');
      if (tagEl) tagEl.textContent = tefilaHeb[currentTefila] || '';
      if (numEl) numEl.textContent = '';
      const bottom = document.querySelector('.reader-bottom');
      if (bottom) bottom.style.display = 'none';
      let out = '';
      let first = true;
      sections.forEach(function(sec) {
        const pt = PRAYER_TEXTS[sec.id];
        if (pt && pt.heb) {
          if (!first) out += '<div class="prayer-section-sep">· · ·</div>';
          out += '<div class="prayer-heb-block" style="font-size:' + fontSize + 'rem">' + pt.heb.replace(/\n/g, '<br>') + '</div>';
          first = false;
        }
      });
      if (!out) out = '<div style="text-align:center;padding:60px 20px;color:#555;">Texto completo pr\u00f3ximamente</div>';
      document.getElementById('text-area').innerHTML = out;
    }

    function abrirTefila(tefila) {
      currentTefila = tefila;
      currentSectionIdx = 0;
      document.getElementById('siddur-landing').style.display   = 'none';
      document.getElementById('siddur-sections').style.display  = 'none';
      document.getElementById('siddur-prayer').style.display    = '';
      setBackBtn(true, 'Inicio');
      renderFullPrayer();
    }

    function volverLanding() {
      document.getElementById('siddur-landing').style.display   = '';
      document.getElementById('siddur-sections').style.display  = 'none';
      document.getElementById('siddur-prayer').style.display    = 'none';
      setBackBtn(false);
      const bottom = document.querySelector('.reader-bottom');
      if (bottom) bottom.style.display = '';
      isFullPrayerMode = false;
    }

    function volverSecciones() {
      document.getElementById('siddur-sections').style.display  = '';
      document.getElementById('siddur-prayer').style.display    = 'none';
      setBackBtn(true, 'Inicio');
    }

    /* ── Tecla Espacio → volver ── */
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        goBack();
      }
    });

    /* ── Zmanim editables (admin) ── */
    let ZMANIM = JSON.parse(localStorage.getItem('kehila_zmanim') || 'null') || {
      shajarit: { hora: '8:30', hasta: '10:42', lugar: 'Bet Jabad Barcelona' },
      minja:    { hora: '13:45', hasta: 'puesta de sol', lugar: 'Bet Jabad Barcelona' },
      arvit:    { hora: '21:15', hasta: '', lugar: 'Bet Jabad Barcelona' },
    };

    function getZmanCard(tefila) {
      const z = ZMANIM[tefila];
      if (!z) return '';
      const nombres = { shajarit:'Shajarit', minja:'Minjá', arvit:'Arvit' };
      const emojis  = { shajarit:'☀️', minja:'🌤', arvit:'🌙' };
      return `${emojis[tefila]} <strong>${nombres[tefila]} en ${z.lugar}:</strong> ${z.hora}${z.hasta ? ' · hasta las ' + z.hasta : ''}`;
    }

    function abrirZmanimModal() {
      const z = ZMANIM;
      const html = `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;" id="zmanim-overlay">
          <div style="background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--color-border);">
              <h3 style="font-size:1.1rem;font-weight:700;">⏱ Editar horarios de tefila</h3>
              <button onclick="document.getElementById('zmanim-overlay').remove()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:#888;">✕</button>
            </div>
            <div style="padding:20px 24px;display:flex;flex-direction:column;gap:20px;">
              ${['shajarit','minja','arvit'].map(t => {
                const nombres = { shajarit:'☀️ Shajarit', minja:'🌤 Minjá', arvit:'🌙 Arvit' };
                return `<div>
                  <div style="font-weight:600;font-size:0.85rem;margin-bottom:8px;">${nombres[t]}</div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;">
                    <div><label style="font-size:0.72rem;color:#888;display:block;margin-bottom:3px;">Hora inicio</label>
                    <input id="z-${t}-hora" value="${z[t]?.hora||''}" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px;font-size:0.9rem;box-sizing:border-box;"></div>
                    <div><label style="font-size:0.72rem;color:#888;display:block;margin-bottom:3px;">Hasta</label>
                    <input id="z-${t}-hasta" value="${z[t]?.hasta||''}" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px;font-size:0.9rem;box-sizing:border-box;"></div>
                  </div>
                  <div><label style="font-size:0.72rem;color:#888;display:block;margin-bottom:3px;">Lugar</label>
                  <input id="z-${t}-lugar" value="${z[t]?.lugar||''}" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px;font-size:0.9rem;box-sizing:border-box;"></div>
                </div>`;
              }).join('')}
            </div>
            <div style="padding:16px 24px;border-top:1px solid var(--color-border);display:flex;gap:10px;justify-content:flex-end;">
              <button onclick="document.getElementById('zmanim-overlay').remove()" class="btn btn-ghost">Cancelar</button>
              <button onclick="guardarZmanim()" class="btn btn-primary">Guardar horarios</button>
            </div>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', html);
    }

    function guardarZmanim() {
      ['shajarit','minja','arvit'].forEach(t => {
        ZMANIM[t] = {
          hora:  document.getElementById('z-'+t+'-hora')?.value.trim()  || '',
          hasta: document.getElementById('z-'+t+'-hasta')?.value.trim() || '',
          lugar: document.getElementById('z-'+t+'-lugar')?.value.trim() || 'Bet Jabad Barcelona',
        };
      });
      localStorage.setItem('kehila_zmanim', JSON.stringify(ZMANIM));
      document.getElementById('zmanim-overlay')?.remove();
      showToast('Horarios guardados ✓', 'success');
    }

    /* ── Init ── */
    // Mostrar botón de zmanim solo a admin
    (function() {
      const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
