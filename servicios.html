<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabad Barcelona — Servicios</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; background: var(--color-bg); }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }
    .servicios-inner { max-width: 860px; margin: 0 auto; padding: 68px 32px 80px; }
    @media (max-width: 768px) { .servicios-inner { padding: 72px 16px 96px; } }

    .page-header { margin-bottom: 28px; }
    .page-header-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-gold-dark); margin-bottom: 6px; }
    .page-title { font-family: var(--font-brand); font-size: 2rem; font-weight: 700; color: var(--color-primary); line-height: 1.15; }
    .page-subtitle { font-size: 0.95rem; color: var(--color-text-muted); margin-top: 6px; }

    /* ── Vista lista ── */
    .sv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    @media (max-width: 500px) { .sv-grid { grid-template-columns: 1fr 1fr; gap: 12px; } }

    .sv-card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(27,46,94,0.08);
      padding: 24px 20px 20px; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s, box-shadow .15s, transform .15s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .sv-card:hover { border-color: #1B2E5E; box-shadow: 0 6px 24px rgba(27,46,94,0.14); transform: translateY(-2px); }
    .sv-emoji { font-size: 2.2rem; line-height: 1; margin-bottom: 2px; }
    .sv-name { font-weight: 700; font-size: 1.05rem; color: #1B2E5E; }
    .sv-subtitle { font-size: 0.82rem; color: var(--color-text-muted); line-height: 1.4; flex: 1; }
    .sv-cta { margin-top: 6px; font-size: 0.82rem; font-weight: 600; color: #C9A84C; display: flex; align-items: center; gap: 4px; }

    /* ── Solicitudes pendientes ── */
    .pending-section { margin-bottom: 28px; }
    .pending-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 12px; }
    .pending-list { display: flex; flex-direction: column; gap: 10px; }
    .pending-item {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(27,46,94,0.08);
      padding: 14px 16px; display: flex; align-items: center; gap: 14px;
    }
    .pending-emoji { font-size: 1.4rem; flex-shrink: 0; }
    .pending-info { flex: 1; min-width: 0; }
    .pending-name { font-weight: 600; font-size: 0.92rem; color: #1B2E5E; }
    .pending-date { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
    .badge-status { padding: 3px 10px; font-size: 0.72rem; font-weight: 700; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .badge-PENDING   { background: #fef3c7; color: #92400e; }
    .badge-REVIEWING { background: #dbeafe; color: #1e40af; }
    .badge-SCHEDULED { background: #ede9fe; color: #5b21b6; }
    .badge-COMPLETED { background: #d1fae5; color: #065f46; }
    .badge-CANCELLED { background: #f3f4f6; color: #6b7280; }

    /* ── Vista formulario ── */
    .form-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      font-size: 0.88rem; font-weight: 600; color: #64748b;
      padding: 0 0 20px; transition: color .15s;
    }
    .form-back-btn:hover { color: #1B2E5E; }

    .form-card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(27,46,94,0.08);
      padding: 28px 28px 24px; max-width: 560px;
    }
    @media (max-width: 600px) { .form-card { padding: 20px 16px; } }

    /* Progress */
    .progress-wrap { margin-bottom: 24px; }
    .progress-steps { display: flex; gap: 6px; margin-bottom: 6px; }
    .progress-step { flex: 1; height: 4px; border-radius: 2px; background: #e2e8f0; transition: background .3s; }
    .progress-step.done { background: #1B2E5E; }
    .progress-label { font-size: 0.72rem; color: #94a3b8; }

    /* Fields */
    .field-group { display: flex; flex-direction: column; gap: 14px; }
    .field-wrap { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-size: 0.78rem; font-weight: 700; color: #475569; }
    .field-label .req { color: #ef4444; margin-left: 2px; }
    .field-hint { font-size: 0.72rem; color: #94a3b8; }
    .field-input, .field-select, .field-textarea {
      padding: 10px 12px; font-size: 0.88rem;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      outline: none; background: #fff; color: #1a202c;
      font-family: inherit; transition: border-color .15s;
      box-sizing: border-box; width: 100%;
    }
    .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: #1B2E5E; }
    .field-input.error, .field-select.error, .field-textarea.error { border-color: #ef4444; }
    .field-textarea { resize: vertical; min-height: 80px; }

    /* Step header */
    .step-header { margin-bottom: 20px; }
    .step-svc-name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #C9A84C; margin-bottom: 4px; }
    .step-title { font-family: var(--font-brand); font-size: 1.2rem; font-weight: 700; color: #1B2E5E; }

    /* Buttons */
    .btn-primary {
      padding: 11px 24px; background: #1B2E5E; color: #fff;
      border: none; border-radius: 8px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #243d7c; }
    .btn-secondary {
      padding: 11px 20px; background: #f8fafc; color: #475569;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-secondary:hover { background: #f1f5f9; }
    .btn-row { display: flex; gap: 10px; margin-top: 24px; justify-content: space-between; align-items: center; }

    /* Intro */
    .intro-emoji { font-size: 3rem; margin-bottom: 12px; }
    .intro-title { font-family: var(--font-brand); font-size: 1.5rem; font-weight: 700; color: #1B2E5E; margin-bottom: 4px; }
    .intro-subtitle { font-size: 0.85rem; color: #C9A84C; font-weight: 600; margin-bottom: 14px; }
    .intro-desc { font-size: 0.9rem; color: #475569; line-height: 1.6; margin-bottom: 20px; }
    .intro-steps-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; padding: 16px; background: #f8fafc; border-radius: 10px; }
    .intro-step { display: flex; align-items: flex-start; gap: 12px; font-size: 0.87rem; color: #475569; }
    .intro-step-num { width: 22px; height: 22px; border-radius: 50%; background: #1B2E5E; color: #fff; font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

    /* Review */
    .review-title { font-family: var(--font-brand); font-size: 1.2rem; font-weight: 700; color: #1B2E5E; margin-bottom: 4px; }
    .review-subtitle { font-size: 0.82rem; color: #94a3b8; margin-bottom: 20px; }
    .review-section { margin-bottom: 16px; }
    .review-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #f1f5f9; }
    .review-rows { display: flex; flex-direction: column; gap: 6px; }
    .review-row { display: flex; gap: 8px; font-size: 0.85rem; }
    .review-key { color: #64748b; min-width: 140px; flex-shrink: 0; }
    .review-val { color: #1a202c; font-weight: 500; word-break: break-word; }

    /* Confirm */
    .confirm-wrap { text-align: center; }
    .confirm-icon { font-size: 3.5rem; margin-bottom: 14px; }
    .confirm-title { font-family: var(--font-brand); font-size: 1.4rem; font-weight: 700; color: #1B2E5E; margin-bottom: 10px; }
    .confirm-msg { font-size: 0.9rem; color: #475569; line-height: 1.7; margin-bottom: 24px; }
    .confirm-ref { font-size: 0.75rem; color: #94a3b8; margin-bottom: 20px; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jabad Barcelona">

</head>
<body>
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <div class="servicios-inner">

      <header class="page-header">
        <div class="page-header-label">Comunidad</div>
        <h1 class="page-title">Servicios Beit Jabad</h1>
        <p class="page-subtitle">La comunidad cuida de sus miembros</p>
      </header>

      <!-- VISTA: Lista -->
      <div id="view-lista"></div>

      <!-- VISTA: Formulario -->
      <div id="view-form" style="display:none;">
        <button class="form-back-btn" id="btn-back">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
          Volver a servicios
        </button>
        <div id="form-content"></div>
      </div>

    </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
(function () {
  'use strict';

  try { requireAuth(); initNav('servicios'); } catch(e) { console.error(e); }

  /* ════════════════════════════════
     DATOS DE LOS 5 SERVICIOS
  ════════════════════════════════ */
  var SERVICES = [
    {
      id: 'teyad',
      emoji: '📜',
      name: 'Teyad',
      subtitle: 'Documentación de identidad judía',
      desc: 'Te ayudamos a obtener y gestionar la documentación que certifica tu identidad judía: cartas de genealogía, certificados de conversión, documentos para aliyá y más. El proceso es confidencial y lo guía el Rav Libersohn.',
      steps: [
        {
          title: 'Tus datos personales',
          fields: [
            { id: 'nombre',    label: 'Nombre',                 type: 'text',  required: true,  placeholder: 'Tu nombre' },
            { id: 'apellidos', label: 'Apellidos',              type: 'text',  required: true,  placeholder: 'Tus apellidos' },
            { id: 'email',     label: 'Correo electrónico',     type: 'email', required: true,  placeholder: 'correo@ejemplo.com' },
            { id: 'telefono',  label: 'Teléfono',               type: 'tel',   required: true,  placeholder: '+34 600 000 000' }
          ]
        },
        {
          title: 'Tipo de documentación',
          fields: [
            { id: 'tipo_doc',      label: 'Documento que necesitas', type: 'select', required: true,  options: ['Carta de genealogía', 'Certificado de nacimiento judío', 'Documentación para aliyá', 'Certificado de conversión', 'Otro'] },
            { id: 'fecha_evento',  label: 'Fecha del evento (si aplica)', type: 'date', required: false },
            { id: 'lugar_evento',  label: 'Lugar',               type: 'text',   required: false, placeholder: 'Ciudad o país', hint: 'Donde ocurrió el evento a documentar' }
          ]
        },
        {
          title: 'Contexto y detalles',
          fields: [
            { id: 'antecedentes', label: 'Describe tu situación', type: 'textarea', required: true,  placeholder: 'Cuéntanos qué necesitas documentar y por qué...' },
            { id: 'urgencia',     label: 'Urgencia',              type: 'select',   required: false, options: ['Sin urgencia especial', 'En las próximas semanas', 'Urgente — menos de 7 días'] },
            { id: 'notas',        label: 'Notas adicionales',     type: 'textarea', required: false, placeholder: 'Cualquier información relevante...' }
          ]
        }
      ]
    },
    {
      id: 'barmitzvah',
      emoji: '✡️',
      name: 'Bar / Bat Mitzvah',
      subtitle: 'Preparación y celebración',
      desc: 'El Rav Libersohn y el equipo de Jabad Barcelona os acompañan en la preparación y celebración del Bar o Bat Mitzvah de vuestro hijo/a. Desde las clases de Torá hasta la lectura en la sinagoga.',
      steps: [
        {
          title: 'Datos del niño / niña',
          fields: [
            { id: 'nombre_nino',    label: 'Nombre',             type: 'text',   required: true,  placeholder: 'Nombre del niño/a' },
            { id: 'apellidos_nino', label: 'Apellidos',          type: 'text',   required: true,  placeholder: 'Apellidos' },
            { id: 'fecha_nacimiento', label: 'Fecha de nacimiento', type: 'date', required: true },
            { id: 'tipo',           label: 'Bar o Bat Mitzvah',  type: 'select', required: true,  options: ['Bar Mitzvah (niño)', 'Bat Mitzvah (niña)'] }
          ]
        },
        {
          title: 'Planificación del evento',
          fields: [
            { id: 'fecha_prevista',    label: 'Fecha prevista del evento', type: 'date',   required: false, hint: 'Aproximada — podemos ayudaros a elegirla' },
            { id: 'tipo_celebracion',  label: 'Tipo',                      type: 'select', required: true,  options: ['Solo preparación religiosa', 'Preparación + ceremonia en sinagoga', 'Preparación + celebración completa'] },
            { id: 'num_invitados',     label: 'Número aproximado de invitados', type: 'number', required: false, placeholder: 'Ej. 80', hint: 'Nos ayuda a organizar el espacio' }
          ]
        },
        {
          title: 'Datos de contacto',
          fields: [
            { id: 'nombre_padre', label: 'Nombre del padre / madre', type: 'text',  required: true,  placeholder: 'Nombre completo' },
            { id: 'telefono',     label: 'Teléfono',                 type: 'tel',   required: true,  placeholder: '+34 600 000 000' },
            { id: 'email',        label: 'Correo electrónico',       type: 'email', required: true,  placeholder: 'correo@ejemplo.com' },
            { id: 'notas',        label: 'Notas para el Rav',        type: 'textarea', required: false, placeholder: 'Información que quieras compartir...' }
          ]
        }
      ]
    },
    {
      id: 'britmila',
      emoji: '👶',
      name: 'Brit Milá',
      subtitle: 'Entrada del bebé en la alianza',
      desc: 'La Brit Milá es el primer pacto de un niño judío con D\'s. Coordinamos la ceremonia con el mohel y el Rav para que sea un momento sagrado y lleno de alegría familiar.',
      steps: [
        {
          title: 'Datos del bebé',
          fields: [
            { id: 'nombre_bebe',      label: 'Nombre hebreo (si está decidido)', type: 'text', required: false, placeholder: 'Nombre hebreo', hint: 'Puede decidirse antes o durante la ceremonia' },
            { id: 'fecha_nacimiento', label: 'Fecha de nacimiento',              type: 'date', required: true },
            { id: 'lugar_nacimiento', label: 'Hospital / Ciudad de nacimiento',  type: 'text', required: false, placeholder: 'Ej. Hospital Clínic, Barcelona' }
          ]
        },
        {
          title: 'Datos de la familia',
          fields: [
            { id: 'nombre_padre', label: 'Nombre del padre', type: 'text',  required: true,  placeholder: 'Nombre completo' },
            { id: 'nombre_madre', label: 'Nombre de la madre', type: 'text', required: true, placeholder: 'Nombre completo' },
            { id: 'telefono',     label: 'Teléfono de contacto', type: 'tel',  required: true, placeholder: '+34 600 000 000' },
            { id: 'email',        label: 'Correo electrónico',   type: 'email', required: true, placeholder: 'correo@ejemplo.com' }
          ]
        },
        {
          title: 'Detalles de la ceremonia',
          fields: [
            { id: 'fecha_brit',    label: 'Fecha prevista (octavo día)', type: 'date',   required: false, hint: 'La Brit se realiza al octavo día de vida' },
            { id: 'lugar',         label: 'Lugar de la ceremonia',       type: 'select', required: true,  options: ['Sinagoga Jabad Barcelona', 'Domicilio familiar', 'Por determinar'] },
            { id: 'num_invitados', label: 'Número de invitados aproximado', type: 'number', required: false, placeholder: 'Ej. 30' },
            { id: 'notas',         label: 'Notas',                       type: 'textarea', required: false, placeholder: 'Cualquier petición o información adicional...' }
          ]
        }
      ]
    },
    {
      id: 'bodas',
      emoji: '💍',
      name: 'Bodas',
      subtitle: 'Casamiento judío con el Rav Libersohn',
      desc: 'El Rav Libersohn os acompañará en uno de los momentos más sagrados de vuestra vida. Desde las clases de taharát hamishpajá hasta la ceremonia bajo la jupá.',
      steps: [
        {
          title: 'Los novios',
          fields: [
            { id: 'nombre_novio', label: 'Nombre del novio', type: 'text',  required: true, placeholder: 'Nombre completo' },
            { id: 'nombre_novia', label: 'Nombre de la novia', type: 'text', required: true, placeholder: 'Nombre completo' },
            { id: 'telefono',     label: 'Teléfono de contacto', type: 'tel',  required: true, placeholder: '+34 600 000 000' },
            { id: 'email',        label: 'Correo electrónico',   type: 'email', required: true, placeholder: 'correo@ejemplo.com' }
          ]
        },
        {
          title: 'La ceremonia',
          fields: [
            { id: 'fecha_boda',      label: 'Fecha prevista de la boda', type: 'date',   required: false, hint: 'Aproximada — podemos ayudaros a elegir una fecha' },
            { id: 'lugar_boda',      label: 'Lugar de la ceremonia',     type: 'text',   required: false, placeholder: 'Ej. Sinagoga, salón de eventos...' },
            { id: 'tipo_ceremonia',  label: 'Tipo de ceremonia',         type: 'select', required: true,  options: ['Ortodoxa completa', 'Tradicional', 'Solo jupá simbólica'] },
            { id: 'num_invitados',   label: 'Número de invitados',       type: 'number', required: false, placeholder: 'Ej. 120' }
          ]
        },
        {
          title: 'Preparación',
          fields: [
            { id: 'clases_tahara', label: '¿Habéis recibido clases de pureza familiar?', type: 'select', required: true,  options: ['Sí', 'No, nos gustaría recibirlas', 'No lo necesitamos'] },
            { id: 'conoce_leyes',  label: '¿Conocéis las leyes de kidushin?',            type: 'select', required: false, options: ['Sí', 'Parcialmente', 'No'] },
            { id: 'notas',         label: 'Preguntas o notas para el Rav',               type: 'textarea', required: false, placeholder: 'Cualquier pregunta o información que quieran compartir...' }
          ]
        }
      ]
    },
    {
      id: 'najalah',
      emoji: '🕯️',
      name: 'Najalah',
      subtitle: 'Acompañamiento en el duelo',
      desc: 'Estamos con vosotros en los momentos más difíciles. Organizamos el shivá, el servicio de kaddish y ofrecemos acompañamiento emocional y espiritual en los tiempos de pérdida.',
      steps: [
        {
          title: 'Información del difunto/a',
          fields: [
            { id: 'nombre_difunto',    label: 'Nombre del difunto/a',       type: 'text',   required: true,  placeholder: 'Nombre completo' },
            { id: 'fecha_fallecimiento', label: 'Fecha de fallecimiento',   type: 'date',   required: true },
            { id: 'relacion',          label: 'Tu relación con el difunto/a', type: 'select', required: true, options: ['Padre / Madre', 'Cónyuge', 'Hijo / Hija', 'Hermano / Hermana', 'Otro familiar', 'Amigo/a cercano/a'] }
          ]
        },
        {
          title: 'Familia en duelo',
          fields: [
            { id: 'nombre_contacto', label: 'Tu nombre completo',    type: 'text',  required: true,  placeholder: 'Nombre y apellidos' },
            { id: 'telefono',        label: 'Teléfono',              type: 'tel',   required: true,  placeholder: '+34 600 000 000' },
            { id: 'email',           label: 'Correo electrónico',    type: 'email', required: true,  placeholder: 'correo@ejemplo.com' }
          ]
        },
        {
          title: 'Tipo de acompañamiento',
          fields: [
            { id: 'tipo_apoyo', label: '¿Qué necesitáis?',  type: 'select',   required: true,  options: ['Organización del shivá', 'Servicio de kaddish', 'Visitas de consuelo', 'Asesoramiento halájico', 'Acompañamiento emocional', 'Todo lo anterior'] },
            { id: 'idioma',     label: 'Idioma preferido',  type: 'select',   required: false, options: ['Español', 'Inglés', 'Hebreo', 'Francés'] },
            { id: 'notas',      label: 'Cuéntanos lo que necesitas', type: 'textarea', required: false, placeholder: 'Cualquier información que nos ayude a acompañaros mejor...' }
          ]
        }
      ]
    }
  ];

  /* ════════════════════════════════
     ESTADO
  ════════════════════════════════ */
  var state = { view: 'lista', serviceId: null, step: 0, data: {} };

  var STATUS_LABELS = {
    PENDING:   'Pendiente',
    REVIEWING: 'En revisión',
    SCHEDULED: 'Programado',
    COMPLETED: 'Completado',
    CANCELLED: 'Cancelado'
  };

  var LS_KEY = 'kehila_servicios_requests';

  function getRequests() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch(e) { return []; }
  }

  function saveRequest(serviceId, data) {
    var reqs = getRequests();
    var req = { id: 'srv_' + Date.now(), serviceId: serviceId, status: 'PENDING', data: data, createdAt: new Date().toISOString() };
    reqs.unshift(req);
    localStorage.setItem(LS_KEY, JSON.stringify(reqs));
    return req;
  }

  /* ════════════════════════════════
     NAVEGACIÓN
  ════════════════════════════════ */
  function showView(view, serviceId, step) {
    state.view = view;
    if (serviceId !== undefined) state.serviceId = serviceId;
    if (step !== undefined) state.step = step;

    var lista = document.getElementById('view-lista');
    var form  = document.getElementById('view-form');

    if (view === 'lista') {
      lista.style.display = ''; form.style.display = 'none';
      renderLista();
    } else {
      lista.style.display = 'none'; form.style.display = '';
      if (view === 'intro')   renderIntro();
      else if (view === 'step')   renderStep();
      else if (view === 'review') renderReview();
      else if (view === 'confirm') renderConfirm();
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ════════════════════════════════
     RENDER: LISTA
  ════════════════════════════════ */
  function renderLista() {
    var container = document.getElementById('view-lista');
    var reqs = getRequests().filter(function(r) { return r.status !== 'COMPLETED' && r.status !== 'CANCELLED'; });
    var html = '';

    if (reqs.length > 0) {
      html += '<div class="pending-section"><div class="pending-title">Mis solicitudes activas</div><div class="pending-list">';
      reqs.forEach(function(r) {
        var svc = SERVICES.find(function(s) { return s.id === r.serviceId; });
        if (!svc) return;
        var date = new Date(r.createdAt).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
        html += '<div class="pending-item">'
          + '<span class="pending-emoji">' + svc.emoji + '</span>'
          + '<div class="pending-info"><div class="pending-name">' + svc.name + '</div><div class="pending-date">Solicitado el ' + date + '</div></div>'
          + '<span class="badge-status badge-' + r.status + '">' + (STATUS_LABELS[r.status] || r.status) + '</span>'
          + '</div>';
      });
      html += '</div></div>';
    }

    html += '<div class="sv-grid">';
    SERVICES.forEach(function(svc) {
      html += '<div class="sv-card" data-service="' + svc.id + '">'
        + '<div class="sv-emoji">' + svc.emoji + '</div>'
        + '<div class="sv-name">' + svc.name + '</div>'
        + '<div class="sv-subtitle">' + svc.subtitle + '</div>'
        + '<div class="sv-cta">Solicitar <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:13px;height:13px;"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg></div>'
        + '</div>';
    });
    html += '</div>';

    container.innerHTML = html;

    container.querySelectorAll('.sv-card').forEach(function(card) {
      card.addEventListener('click', function() {
        state.data = {};
        showView('intro', card.dataset.service);
      });
    });
  }

  /* ════════════════════════════════
     RENDER: INTRO
  ════════════════════════════════ */
  function renderIntro() {
    var svc = SERVICES.find(function(s) { return s.id === state.serviceId; });
    if (!svc) return showView('lista');

    var stepsHTML = svc.steps.map(function(step, i) {
      return '<div class="intro-step"><div class="intro-step-num">' + (i + 1) + '</div><span>' + step.title + '</span></div>';
    }).join('');

    document.getElementById('form-content').innerHTML =
      '<div class="form-card">'
      + '<div class="intro-emoji">' + svc.emoji + '</div>'
      + '<div class="intro-title">' + svc.name + '</div>'
      + '<div class="intro-subtitle">' + svc.subtitle + '</div>'
      + '<div class="intro-desc">' + svc.desc + '</div>'
      + '<div class="intro-steps-list">' + stepsHTML + '</div>'
      + '<button class="btn-primary" id="btn-comenzar" style="width:100%;">Comenzar solicitud</button>'
      + '</div>';

    document.getElementById('btn-comenzar').addEventListener('click', function() {
      showView('step', undefined, 0);
    });
  }

  /* ════════════════════════════════
     RENDER: STEP
  ════════════════════════════════ */
  function renderField(f) {
    var labelHTML = '<label class="field-label" for="field_' + f.id + '">' + f.label + (f.required ? '<span class="req">*</span>' : '') + '</label>';
    var hintHTML  = f.hint ? '<span class="field-hint">' + f.hint + '</span>' : '';
    var inputHTML = '';

    if (f.type === 'select') {
      inputHTML = '<select class="field-select" id="field_' + f.id + '"><option value="">Seleccionar...</option>'
        + f.options.map(function(o) { return '<option value="' + o + '">' + o + '</option>'; }).join('')
        + '</select>';
    } else if (f.type === 'textarea') {
      inputHTML = '<textarea class="field-textarea" id="field_' + f.id + '" placeholder="' + (f.placeholder || '') + '" rows="3"></textarea>';
    } else {
      inputHTML = '<input type="' + f.type + '" class="field-input" id="field_' + f.id + '" placeholder="' + (f.placeholder || '') + '">';
    }

    return '<div class="field-wrap">' + labelHTML + hintHTML + inputHTML + '</div>';
  }

  function validateStep(svc, stepIndex) {
    var stepDef = svc.steps[stepIndex];
    var valid = true;
    stepDef.fields.forEach(function(f) {
      var el = document.getElementById('field_' + f.id);
      if (!el) return;
      el.classList.remove('error');
      if (f.required && !el.value.trim()) { el.classList.add('error'); valid = false; }
    });
    if (!valid) {
      var firstErr = document.querySelector('.error');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    return valid;
  }

  function saveStepData(svc, stepIndex) {
    var stepDef = svc.steps[stepIndex];
    var stepData = {};
    stepDef.fields.forEach(function(f) {
      var el = document.getElementById('field_' + f.id);
      if (el) stepData[f.id] = el.value;
    });
    state.data['step_' + stepIndex] = stepData;
  }

  function renderStep() {
    var svc = SERVICES.find(function(s) { return s.id === state.serviceId; });
    if (!svc) return showView('lista');

    var stepDef    = svc.steps[state.step];
    var totalSteps = svc.steps.length;

    var progressBars = '';
    for (var i = 0; i < totalSteps; i++) {
      progressBars += '<div class="progress-step' + (i <= state.step ? ' done' : '') + '"></div>';
    }

    var fieldsHTML = stepDef.fields.map(renderField).join('');
    var isLast     = state.step === totalSteps - 1;

    document.getElementById('form-content').innerHTML =
      '<div class="form-card">'
      + '<div class="progress-wrap"><div class="progress-steps">' + progressBars + '</div><div class="progress-label">Paso ' + (state.step + 1) + ' de ' + totalSteps + '</div></div>'
      + '<div class="step-header"><div class="step-svc-name">' + svc.emoji + ' ' + svc.name + '</div><div class="step-title">' + stepDef.title + '</div></div>'
      + '<div class="field-group">' + fieldsHTML + '</div>'
      + '<div class="btn-row">'
      + '<button class="btn-secondary" id="btn-anterior">' + (state.step === 0 ? '← Intro' : '← Anterior') + '</button>'
      + '<button class="btn-primary" id="btn-continuar">' + (isLast ? 'Revisar solicitud →' : 'Continuar →') + '</button>'
      + '</div></div>';

    // Restore saved values
    var stepData = state.data['step_' + state.step] || {};
    stepDef.fields.forEach(function(f) {
      var el = document.getElementById('field_' + f.id);
      if (el && stepData[f.id] !== undefined) el.value = stepData[f.id];
    });

    var currentStep = state.step;
    document.getElementById('btn-anterior').addEventListener('click', function() {
      saveStepData(svc, currentStep);
      if (currentStep === 0) showView('intro');
      else showView('step', undefined, currentStep - 1);
    });

    document.getElementById('btn-continuar').addEventListener('click', function() {
      if (!validateStep(svc, currentStep)) return;
      saveStepData(svc, currentStep);
      if (currentStep === totalSteps - 1) showView('review');
      else showView('step', undefined, currentStep + 1);
    });
  }

  /* ════════════════════════════════
     RENDER: REVIEW
  ════════════════════════════════ */
  function renderReview() {
    var svc = SERVICES.find(function(s) { return s.id === state.serviceId; });
    if (!svc) return showView('lista');

    var sectionsHTML = svc.steps.map(function(stepDef, i) {
      var stepData = state.data['step_' + i] || {};
      var rowsHTML = stepDef.fields.map(function(f) {
        var val = stepData[f.id];
        if (!val) return '';
        return '<div class="review-row"><span class="review-key">' + f.label + '</span><span class="review-val">' + val + '</span></div>';
      }).join('');
      if (!rowsHTML) return '';
      return '<div class="review-section"><div class="review-section-title">' + stepDef.title + '</div><div class="review-rows">' + rowsHTML + '</div></div>';
    }).join('');

    document.getElementById('form-content').innerHTML =
      '<div class="form-card">'
      + '<div class="review-title">Revisa tu solicitud</div>'
      + '<div class="review-subtitle">' + svc.emoji + ' ' + svc.name + ' · ' + svc.subtitle + '</div>'
      + sectionsHTML
      + '<div class="btn-row">'
      + '<button class="btn-secondary" id="btn-edit">← Editar</button>'
      + '<button class="btn-primary" id="btn-enviar">Enviar solicitud →</button>'
      + '</div></div>';

    var totalSteps = svc.steps.length;
    document.getElementById('btn-edit').addEventListener('click', function() {
      showView('step', undefined, totalSteps - 1);
    });

    document.getElementById('btn-enviar').addEventListener('click', function() {
      var btn = document.getElementById('btn-enviar');
      btn.disabled = true; btn.textContent = 'Enviando…';

      var allData = {};
      svc.steps.forEach(function(stepDef, i) {
        var sd = state.data['step_' + i] || {};
        stepDef.fields.forEach(function(f) {
          if (sd[f.id]) allData[f.label] = sd[f.id];
        });
      });

      saveRequest(state.serviceId, allData);

      // Intentar guardar en Supabase
      var sb   = typeof getSupabase === 'function' ? getSupabase() : null;
      var user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
      if (sb) {
        sb.from('servicios_solicitudes').insert({
          tipo: state.serviceId,
          datos: allData,
          usuario_id: user ? user.userId : null,
          usuario_nombre: user ? user.name : 'Anónimo'
        }).catch(function() {});
      }

      showView('confirm');
    });
  }

  /* ════════════════════════════════
     RENDER: CONFIRM
  ════════════════════════════════ */
  function renderConfirm() {
    var svc = SERVICES.find(function(s) { return s.id === state.serviceId; });

    document.getElementById('form-content').innerHTML =
      '<div class="form-card confirm-wrap">'
      + '<div class="confirm-icon">✅</div>'
      + '<div class="confirm-title">¡Solicitud enviada!</div>'
      + '<div class="confirm-msg">Hemos recibido tu solicitud para <strong>' + (svc ? svc.name : 'el servicio') + '</strong>.<br><br>'
      + 'El equipo de Jabad Barcelona la revisará y se pondrá en contacto contigo en menos de 48 horas.<br><br>'
      + '<em>Jazak uvaruj — que seas bendecido/a.</em></div>'
      + '<div class="confirm-ref">Puedes ver el estado de tu solicitud en la parte superior de esta página.</div>'
      + '<button class="btn-primary" id="btn-volver-lista" style="width:100%;margin-top:20px;">Volver a servicios</button>'
      + '</div>';

    document.getElementById('btn-volver-lista').addEventListener('click', function() {
      state.data = {}; state.serviceId = null;
      showView('lista');
    });
  }

  /* ── Botón volver ── */
  document.getElementById('btn-back').addEventListener('click', function() {
    state.data = {};
    showView('lista');
  });

  /* ── Init ── */
  showView('lista');

})();
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/kehila/sw.js").catch(function(){});
  }
</script>
