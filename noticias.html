<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias — Kehilá</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    /* ── Layout ── */
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; background: var(--color-bg); }
    @media (max-width: 768px) { .main-content { margin-left: 0; padding-bottom: 80px; } }

    .noticias-inner { padding: 0 var(--space-6) var(--space-8); max-width: 1100px; }

    /* ── Destacadas: grid 2 columnas ── */
    .destacadas-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    @media (max-width: 900px) { .destacadas-grid { grid-template-columns: 1fr; } }

    /* ── Card destacada (ambas usan la misma base) ── */
    .noticia-featured {
      background: white; border-radius: var(--radius-xl);
      border: 1.5px solid var(--color-border); overflow: hidden;
      cursor: pointer; display: flex; flex-direction: column;
      transition: box-shadow 0.18s, transform 0.18s;
      box-shadow: var(--shadow-sm);
    }
    .noticia-featured:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

    /* Visual header del featured */
    .noticia-featured-visual {
      height: 160px; position: relative; overflow: hidden;
      display: flex; align-items: flex-end; padding: var(--space-4);
    }
    .noticia-featured-visual-bg {
      position: absolute; inset: 0;
    }
    /* Patrón decorativo con líneas diagonales sutiles */
    .noticia-featured-visual-pattern {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 20px,
        rgba(255,255,255,0.03) 20px,
        rgba(255,255,255,0.03) 40px
      );
    }
    /* Gradiente oscuro abajo para legibilidad */
    .noticia-featured-visual::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.45) 100%);
      z-index: 1;
    }
    .noticia-featured-visual-badge {
      position: relative; z-index: 2;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      background: rgba(255,255,255,0.15); color: white;
      border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(4px);
    }
    .noticia-featured-pin {
      position: absolute; top: var(--space-3); right: var(--space-3); z-index: 2;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(201,168,76,0.25); border: 1px solid rgba(201,168,76,0.5);
      display: flex; align-items: center; justify-content: center;
      color: #C9A84C; font-size: 12px;
    }

    .noticia-featured-body {
      padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-2); flex: 1;
    }
    .noticia-featured-body h2 {
      font-family: 'Frank Ruhl Libre', serif; font-weight: 400;
      font-size: 1.15rem; line-height: 1.35; color: var(--color-text); margin: 0;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .noticia-featured-body p {
      font-size: 0.83rem; color: var(--color-text-secondary); line-height: 1.6; margin: 0;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .noticia-featured-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: var(--space-3); border-top: 1px solid var(--color-border); margin-top: auto;
    }
    .noticia-featured-autor { font-size: 0.75rem; font-weight: 500; color: var(--color-text-secondary); }
    .noticia-featured-meta { font-size: 0.73rem; color: var(--color-text-muted); }

    /* ── Filtros ── */
    .filtros-bar {
      display: flex; gap: var(--space-2); overflow-x: auto;
      scrollbar-width: none; padding-bottom: 4px; margin-bottom: var(--space-5);
    }
    .filtros-bar::-webkit-scrollbar { display: none; }
    .filtro-chip {
      padding: 6px 14px; border: 1.5px solid var(--color-border); border-radius: 20px;
      font-size: 0.8rem; font-weight: 500; color: var(--color-text-secondary);
      background: white; cursor: pointer; white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .filtro-chip:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .filtro-chip.filtro-activo { background: var(--color-primary); border-color: var(--color-primary); color: white; }

    /* ── Grid — 3 columnas como JB ── */
    #noticias-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4); margin-top: var(--space-2);
    }

    /* ── Filtros ── */
    .filtro-chip {
      padding: 5px 12px !important; font-size: 11px !important;
      border-radius: 4px !important; letter-spacing: 0.04em !important;
    }
    .filtros-bar { margin-bottom: var(--space-5) !important; }

    @media (max-width: 1024px) { #noticias-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) {
      #noticias-grid { grid-template-columns: 1fr; gap: var(--space-3); }
      .drawer {
        width: 100% !important; height: 85vh !important;
        top: auto !important; bottom: 0 !important;
        border-radius: 16px 16px 0 0 !important;
        animation: drawerUpMobile 0.25s ease forwards !important;
      }
      @keyframes drawerUpMobile {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
    }
    @media (max-width: 900px) {
      .destacadas-grid { grid-template-columns: 1fr; }
    }

    /* ── Card noticia — estilo Jewish Business ── */
    .noticia-card {
      background: white; border-radius: var(--radius-lg);
      border: 1.5px solid var(--color-border);
      display: flex; flex-direction: column;
      transition: box-shadow 0.18s, transform 0.18s;
      overflow: hidden;
    }
    .noticia-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

    .noticia-card-top {
      padding: var(--space-5);
      display: flex; align-items: flex-start; gap: var(--space-4); flex: 1;
    }
    /* Cuadradito — igual que los avatares de JB */
    .noticia-card-avatar {
      width: 48px; height: 48px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.25rem; font-weight: 400; color: white;
    }
    .noticia-card-info { flex: 1; min-width: 0; }
    .noticia-card-info h3 {
      font-size: 0.93rem; font-weight: 600; line-height: 1.4;
      color: var(--color-text); margin: 0 0 4px;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .noticia-card-sub {
      font-size: 0.78rem; color: var(--color-text-muted);
      display: flex; align-items: center; gap: 4px;
    }

    .noticia-card-tags {
      padding: 0 var(--space-5) var(--space-3);
      display: flex; gap: var(--space-2); flex-wrap: wrap;
    }

    .noticia-card-footer {
      padding: var(--space-3) var(--space-5) var(--space-4);
      border-top: 1px solid var(--color-border); margin-top: auto;
    }
    .btn-leer {
      width: 100%; padding: 9px; border-radius: var(--radius-md);
      background: var(--color-primary); color: white; border: none;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-leer:hover { background: #16265a; }

    /* ── Empty ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-4);
      padding: var(--space-12) var(--space-6); color: var(--color-text-muted);
      text-align: center; grid-column: 1 / -1;
    }
    .empty-state p { font-size: 0.87rem; }

    /* ── Drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(13,27,62,0.4);
      z-index: 499; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

    .drawer {
      position: fixed; top: 0; right: 0; height: 100vh; width: 480px;
      max-width: 100vw; background: white; z-index: 500;
      display: flex; flex-direction: column;
      box-shadow: -6px 0 32px rgba(0,0,0,0.14);
      animation: drawerIn 0.25s ease forwards;
    }
    .drawer-closing { animation: drawerOut 0.2s ease forwards !important; }
    @keyframes drawerIn { from { transform: translateX(100%) } to { transform: translateX(0) } }
    @keyframes drawerOut { from { transform: translateX(0) } to { transform: translateX(100%) } }

    .drawer-header {
      padding: var(--space-5) var(--space-6) var(--space-4);
      border-bottom: 1px solid var(--color-border); flex-shrink: 0;
    }
    .drawer-header-top {
      display: flex; justify-content: space-between; align-items: center;
    }
    .drawer-close-btn {
      width: 32px; height: 32px; border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border); background: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--color-text-muted); transition: all 0.15s;
    }
    .drawer-close-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

    .drawer-body { flex: 1; overflow-y: auto; padding: var(--space-6); }
    .drawer-body h2 {
      font-family: 'Frank Ruhl Libre', serif; font-size: 1.45rem; font-weight: 400;
      line-height: 1.3; margin-bottom: var(--space-4); color: var(--color-text);
    }
    .drawer-body-meta {
      display: flex; gap: var(--space-3); font-size: 0.78rem; color: var(--color-text-muted);
      margin-bottom: var(--space-5); padding-bottom: var(--space-5);
      border-bottom: 1px solid var(--color-border); flex-wrap: wrap;
    }
    .drawer-body-contenido p {
      font-size: 0.95rem; color: var(--color-text-secondary);
      line-height: 1.75; margin-bottom: var(--space-5);
    }
    .drawer-footer {
      padding: var(--space-4) var(--space-6); border-top: 1px solid var(--color-border);
      display: flex; gap: var(--space-2); justify-content: flex-end; flex-shrink: 0;
    }
    @media (max-width: 768px) { .drawer { width: 100%; } }
  .fab-admin { position:fixed; bottom:28px; right:28px; width:54px; height:54px; border-radius:50%; background:#C9A84C; color:#fff; border:none; font-size:1.6rem; cursor:pointer; box-shadow:0 4px 18px rgba(201,168,76,0.45); display:flex; align-items:center; justify-content:center; z-index:100; transition:background 0.15s,transform 0.15s; }
  .fab-admin:hover { background:#a8892e; transform:scale(1.06); }
  @media (max-width:768px) { .fab-admin { bottom:80px; right:18px; } }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kehilá">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <div id="page-header"></div>
    <div class="noticias-inner">
      <div id="noticias-destacadas"></div>
      <div id="filtros-container"></div>
      <div id="noticias-grid"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/media.js"></script>
  <script src="js/noticias.js"></script>
  <script>
    // FAB móvil para admin
    (function() {
      const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
      if (!user || user.role !== 'admin') return;
      const fab = document.createElement('button');
      fab.className = 'fab-admin';
      fab.setAttribute('aria-label', 'Nueva noticia');
      fab.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:24px;height:24px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>';
      document.body.appendChild(fab);
      fab.addEventListener('click', () => typeof abrirModalNueva === 'function' && abrirModalNueva());
    })();
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/kehila/sw.js").catch(()=>{});
    }
  </script>
</body>
</html>
