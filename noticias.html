<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias — Kehilá</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
    @media (max-width: 768px) { .main-content { margin-left: 0; padding-bottom: 80px; } }
    .noticias-inner { max-width: 960px; margin: 0 auto; padding: 32px 32px 60px; }
    @media (max-width: 768px) { .noticias-inner { padding: 20px 14px 88px; } }

    /* ── Chips ── */
    .filter-chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; margin-bottom:20px; }
    .filter-chips::-webkit-scrollbar { display:none; }
    .chip { padding:6px 16px; border-radius:var(--radius-full); font-size:.8125rem; font-weight:500; border:1.5px solid var(--color-border); color:var(--color-text-muted); cursor:pointer; background:var(--color-white); white-space:nowrap; transition:all var(--transition-fast); }
    .chip:hover { border-color:var(--color-primary); color:var(--color-primary); }
    .chip.active { background:var(--color-primary); border-color:var(--color-primary); color:#fff; }

    /* ── Grid 2 columnas ── */
    #noticias-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    @media (max-width: 640px) { #noticias-grid { grid-template-columns:1fr; } }

    /* ── Card estilo eventos ── */
    .noticia-card-new { background:var(--color-white); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); overflow:hidden; display:flex; flex-direction:column; transition:all var(--transition-normal); border-left:4px solid var(--color-primary); cursor:pointer; }
    .noticia-card-new:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .nc-cat-comunidad { border-left-color:var(--color-primary); }
    .nc-cat-israel     { border-left-color:#0057B7; }
    .nc-cat-halacha    { border-left-color:#7C3AED; }
    .nc-cat-evento     { border-left-color:#C9A84C; }
    .nc-cat-kashrut    { border-left-color:#059669; }

    .ev-card-header { padding:16px 16px 0; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .ev-date-block { display:flex; flex-direction:column; align-items:center; background:var(--color-bg); border-radius:var(--radius-sm); padding:8px 12px; min-width:52px; text-align:center; flex-shrink:0; }
    .ev-day   { font-family:var(--font-brand); font-size:1.75rem; font-weight:900; color:var(--color-primary); line-height:1; }
    .ev-month { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--color-text-muted); }
    .ev-card-body { padding:12px 16px; flex:1; }
    .ev-title { font-size:.9375rem; font-weight:700; color:var(--color-text); margin-bottom:6px; line-height:1.35; }
    .ev-desc  { font-size:.8125rem; color:var(--color-text-muted); line-height:1.55; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:10px; }
    .ev-meta-row { display:flex; align-items:center; gap:14px; font-size:.775rem; color:var(--color-text-muted); flex-wrap:wrap; }
    .ev-meta-item { display:flex; align-items:center; gap:4px; }
    .ev-meta-item svg { width:13px; height:13px; }
    .ev-card-footer { padding:12px 16px 14px; border-top:1px solid var(--color-border-light, #f1f5f9); display:flex; align-items:center; justify-content:space-between; gap:8px; }

    /* ── Drawer ── */
    .drawer-overlay { position:fixed; inset:0; background:rgba(13,27,62,0.4); z-index:499; animation:fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .drawer { position:fixed; top:0; right:0; height:100vh; width:480px; max-width:100vw; background:white; z-index:500; display:flex; flex-direction:column; box-shadow:-6px 0 32px rgba(0,0,0,0.14); animation:drawerIn 0.25s ease forwards; }
    .drawer-closing { animation:drawerOut 0.2s ease forwards !important; }
    @keyframes drawerIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
    @keyframes drawerOut { from{transform:translateX(0)} to{transform:translateX(100%)} }
    .drawer-header { padding:var(--space-5) var(--space-6) var(--space-4); border-bottom:1px solid var(--color-border); flex-shrink:0; }
    .drawer-header-top { display:flex; justify-content:space-between; align-items:center; }
    .drawer-close-btn { width:32px; height:32px; border-radius:var(--radius-md); border:1.5px solid var(--color-border); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--color-text-muted); transition:all 0.15s; }
    .drawer-close-btn:hover { border-color:var(--color-primary); color:var(--color-primary); }
    .drawer-body { flex:1; overflow-y:auto; padding:var(--space-6); }
    .drawer-footer { padding:var(--space-4) var(--space-6); border-top:1px solid var(--color-border); display:flex; gap:var(--space-2); justify-content:flex-end; flex-shrink:0; }
    @media (max-width:768px) { .drawer { width:100%; height:85vh; top:auto; bottom:0; border-radius:16px 16px 0 0; animation:drawerUpMobile 0.25s ease forwards; } }
    @keyframes drawerUpMobile { from{transform:translateY(100%)} to{transform:translateY(0)} }

    /* ── Admin FAB ── */
    .fab-admin { position:fixed; bottom:28px; right:28px; width:54px; height:54px; border-radius:50%; background:#C9A84C; color:#fff; border:none; font-size:1.6rem; cursor:pointer; box-shadow:0 4px 18px rgba(201,168,76,0.45); display:flex; align-items:center; justify-content:center; z-index:100; transition:background 0.15s,transform 0.15s; }
    .fab-admin:hover { background:#a8892e; transform:scale(1.06); }
    @media (max-width:768px) { .fab-admin { bottom:80px; right:18px; } }

    /* ── Modal admin ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.active { display:flex; }
    .modal { background:#fff; border-radius:16px; width:100%; max-width:540px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--color-border); }
    .modal-title { font-size:1.1rem; font-weight:700; }
    .modal-close { background:none; border:none; cursor:pointer; padding:4px; color:var(--color-text-muted); border-radius:8px; }
    .modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
    .modal-footer { padding:16px 24px; border-top:1px solid var(--color-border); display:flex; gap:10px; justify-content:flex-end; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-group label { font-size:0.78rem; font-weight:600; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:0.05em; }
    .form-group input, .form-group textarea, .form-group select { border:1.5px solid var(--color-border); border-radius:8px; padding:9px 12px; font-size:0.9rem; font-family:inherit; outline:none; transition:border-color 0.15s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--color-primary); }

    /* ── Empty ── */
    .empty-state { display:flex; flex-direction:column; align-items:center; gap:16px; padding:60px 24px; color:var(--color-text-muted); text-align:center; grid-column:1/-1; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kehilá">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div class="noticias-inner">
      <div id="page-header"></div>
      <div id="filtros-container"></div>
      <div id="noticias-grid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/media.js"></script>
  <script src="js/noticias.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/kehila/sw.js").catch(()=>{});
    }
  </script>
</body>
</html>
