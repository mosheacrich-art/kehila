<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shiurim — Jabad Barcelona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; background: var(--color-bg); }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }
    .sh-inner { max-width: 1000px; margin: 0 auto; padding: 32px 32px 80px; }
    @media (max-width: 768px) { .sh-inner { padding: 20px 16px 96px; } }
    .sh-header { margin-bottom: 28px; }
    .sh-header h1 { font-family: 'Frank Ruhl Libre', Georgia, serif; font-size: 1.9rem; font-weight: 700; color: var(--color-text); line-height: 1.2; margin-bottom: 4px; }
    .sh-header p { font-size: 0.9rem; color: var(--color-text-muted); }
    .sh-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--color-border); margin-bottom: 28px; overflow-x: auto; scrollbar-width: none; }
    .sh-tabs::-webkit-scrollbar { display: none; }
    .sh-tab { padding: 12px 22px; font-size: 0.88rem; font-weight: 600; font-family: var(--font-ui); cursor: pointer; border: none; background: none; color: var(--color-text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 8px; }
    .sh-tab:hover { color: var(--color-text); }
    .sh-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .sh-tab-count { background: #f1f5f9; color: #64748b; font-size: 0.7rem; font-weight: 700; padding: 1px 7px; border-radius: 999px; min-width: 20px; text-align: center; }
    .sh-tab.active .sh-tab-count { background: #dbeafe; color: var(--color-primary); }
    .sh-panel { display: none; }
    .sh-panel.active { display: block; }
    .sh-loading { text-align: center; padding: 40px; color: var(--color-text-muted); font-size: .88rem; }
    .sh-empty { text-align: center; padding: 64px 20px; color: var(--color-text-muted); }
    .sh-empty svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: .3; }
    .sh-empty p { font-size: 0.9rem; }
    .vid-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    @media (max-width: 700px) { .vid-grid { grid-template-columns: 1fr; gap: 14px; } }
    .vid-card { background: #fff; border-radius: 14px; border: 1.5px solid var(--color-border); overflow: hidden; transition: box-shadow .2s, transform .2s; }
    .vid-card:hover { box-shadow: 0 8px 28px rgba(27,46,94,0.12); transform: translateY(-2px); }
    .vid-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg,#1B2E5E 0%,#2a4a8e 100%); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .vid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .vid-play { position: absolute; width: 52px; height: 52px; background: rgba(0,0,0,.55); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background .15s; pointer-events: none; }
    .vid-thumb:hover .vid-play { background: rgba(201,168,76,.9); }
    .vid-play svg { width: 24px; height: 24px; color: #fff; margin-left: 3px; }
    .vid-body { padding: 14px 16px 16px; }
    .vid-title { font-size: .92rem; font-weight: 700; color: var(--color-text); line-height: 1.35; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .vid-meta { font-size: .76rem; color: var(--color-text-muted); margin-bottom: 8px; }
    .vid-meta strong { color: #C9A84C; font-weight: 600; }
    .vid-desc { font-size: .8rem; color: var(--color-text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
    .vid-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--color-primary); color: #fff; border-radius: 8px; font-size: .8rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: background .15s; font-family: var(--font-ui); }
    .vid-btn:hover { background: #12204A; }
    .hoja-list { display: flex; flex-direction: column; gap: 12px; }
    .hoja-item { background: #fff; border-radius: 12px; border: 1.5px solid var(--color-border); padding: 16px 20px; display: flex; align-items: center; gap: 16px; transition: box-shadow .2s; }
    .hoja-item:hover { box-shadow: 0 4px 16px rgba(27,46,94,0.1); }
    .hoja-icon { width: 44px; height: 44px; background: #fef3c7; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hoja-icon svg { width: 22px; height: 22px; color: #92400e; }
    .hoja-info { flex: 1; min-width: 0; }
    .hoja-title { font-size: .9rem; font-weight: 700; color: var(--color-text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hoja-desc { font-size: .78rem; color: var(--color-text-muted); margin-bottom: 3px; }
    .hoja-date { font-size: .72rem; color: var(--color-text-muted); }
    .hoja-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px; padding: 8px 14px; background: #fef3c7; color: #92400e; border-radius: 8px; font-size: .78rem; font-weight: 600; text-decoration: none; transition: background .15s; }
    .hoja-btn:hover { background: #fde68a; }
    .otros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 900px) { .otros-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .otros-grid { grid-template-columns: 1fr; } }
    .otro-card { background: #fff; border-radius: 12px; border: 1.5px solid var(--color-border); padding: 16px; display: flex; flex-direction: column; gap: 8px; transition: box-shadow .2s, transform .2s; }
    .otro-card:hover { box-shadow: 0 6px 20px rgba(27,46,94,0.1); transform: translateY(-1px); }
    .otro-badge { display: inline-flex; padding: 2px 10px; border-radius: 999px; background: #ede9fe; color: #5b21b6; font-size: .68rem; font-weight: 700; width: fit-content; }
    .otro-title { font-size: .88rem; font-weight: 700; color: var(--color-text); line-height: 1.35; }
    .otro-autor { font-size: .75rem; color: #C9A84C; font-weight: 600; }
    .otro-desc { font-size: .78rem; color: var(--color-text-muted); line-height: 1.5; flex: 1; }
    .otro-date { font-size: .7rem; color: var(--color-text-muted); }
    .otro-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; background: var(--color-primary); color: #fff; border-radius: 7px; font-size: .78rem; font-weight: 600; text-decoration: none; transition: background .15s; width: fit-content; margin-top: auto; }
    .otro-btn:hover { background: #12204A; }
    .yt-modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 400; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .yt-modal.open { opacity: 1; pointer-events: all; }
    .yt-box { width: 100%; max-width: 840px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
    .yt-box iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
    .yt-close { position: absolute; top: -38px; right: 0; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; opacity: .8; line-height: 1; }
    .yt-close:hover { opacity: 1; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jabad Barcelona">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <main class="main-content">
    <div class="sh-inner">
      <div class="sh-header">
        <h1>Shiurim</h1>
        <p>Clases y materiales de Torah de la comunidad</p>
      </div>
      <div class="sh-tabs" id="sh-tabs">
        <button class="sh-tab active" data-panel="videos">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
          Videos <span class="sh-tab-count" id="count-videos">0</span>
        </button>
        <button class="sh-tab" data-panel="hoja">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
          Hoja de la semana <span class="sh-tab-count" id="count-hoja">0</span>
        </button>
        <button class="sh-tab" data-panel="otros">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
          Otros <span class="sh-tab-count" id="count-otros">0</span>
        </button>
      </div>
      <div class="sh-panel active" id="panel-videos">
        <div class="sh-loading" id="loading-videos">Cargando...</div>
        <div class="vid-grid" id="grid-videos"></div>
      </div>
      <div class="sh-panel" id="panel-hoja">
        <div class="sh-loading" id="loading-hoja">Cargando...</div>
        <div class="hoja-list" id="list-hoja"></div>
      </div>
      <div class="sh-panel" id="panel-otros">
        <div class="sh-loading" id="loading-otros">Cargando...</div>
        <div class="otros-grid" id="grid-otros"></div>
      </div>
    </div>
  </main>
  <div class="yt-modal" id="yt-modal">
    <div class="yt-box">
      <button class="yt-close" id="yt-close">&#10005;</button>
      <iframe id="yt-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
  (async function () {
    try { initNav('shiurim'); } catch(e) {}
    var sb = typeof getSupabase === 'function' ? getSupabase() : null;
    document.getElementById('sh-tabs').addEventListener('click', function(e) {
      var btn = e.target.closest('.sh-tab');
      if (!btn) return;
      document.querySelectorAll('.sh-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.sh-panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    });
    function formatFecha(d) {
      if (!d) return '';
      try { return new Date(d + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' }); }
      catch(e) { return d; }
    }
    function ytId(url) {
      if (!url) return null;
      var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }
    var allData = [];
    if (sb) {
      try {
        var res = await sb.from('shiurim').select('*').order('created_at', { ascending: false });
        if (!res.error && res.data) allData = res.data;
      } catch(e) { console.warn('shiurim:', e); }
    }
    var videos = allData.filter(function(s) { return s.apartado === 'videos'; });
    var hojas  = allData.filter(function(s) { return s.apartado === 'hoja_semana'; });
    var otros  = allData.filter(function(s) { return s.apartado === 'otros'; });
    document.getElementById('count-videos').textContent = videos.length;
    document.getElementById('count-hoja').textContent   = hojas.length;
    document.getElementById('count-otros').textContent  = otros.length;
    var PLAY_SVG = '<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg>';
    // Videos
    document.getElementById('loading-videos').style.display = 'none';
    var gv = document.getElementById('grid-videos');
    if (!videos.length) {
      gv.innerHTML = '<div class="sh-empty" style="grid-column:1/-1"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/></svg><p>No hay videos publicados todav&#237;a.</p></div>';
    } else {
      gv.innerHTML = videos.map(function(v) {
        var id = ytId(v.video_url);
        var thumb = v.imagen_url || (id ? 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg' : null);
        var da = (id ? ' data-ytid="' + id + '"' : '') + (v.video_url ? ' data-url="' + v.video_url + '"' : '');
        return '<div class="vid-card"><div class="vid-thumb yt-open"' + da + '>'
          + (thumb ? '<img src="' + thumb + '" alt="" onerror="this.style.display=\'none\'">' : '')
          + '<div class="vid-play">' + PLAY_SVG + '</div></div>'
          + '<div class="vid-body"><div class="vid-title">' + v.titulo + '</div>'
          + '<div class="vid-meta">' + (v.maestro ? '<strong>' + v.maestro + '</strong> &middot; ' : '') + formatFecha(v.fecha) + '</div>'
          + (v.descripcion ? '<div class="vid-desc">' + v.descripcion + '</div>' : '')
          + (v.video_url ? '<button class="vid-btn yt-open"' + da + ' style="width:14px;height:14px;">' + PLAY_SVG + 'Ver video</button>' : '')
          + '</div></div>';
      }).join('');
    }
    // Hoja
    document.getElementById('loading-hoja').style.display = 'none';
    var lh = document.getElementById('list-hoja');
    var DOC_SVG = '<svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>';
    if (!hojas.length) {
      lh.innerHTML = '<div class="sh-empty">' + DOC_SVG + '<p>No hay hojas publicadas todav&#237;a.</p></div>';
    } else {
      lh.innerHTML = hojas.map(function(h) {
        return '<div class="hoja-item"><div class="hoja-icon">' + DOC_SVG + '</div>'
          + '<div class="hoja-info"><div class="hoja-title">' + h.titulo + '</div>'
          + (h.descripcion ? '<div class="hoja-desc">' + h.descripcion + '</div>' : '')
          + '<div class="hoja-date">' + formatFecha(h.fecha) + '</div></div>'
          + (h.video_url ? '<a class="hoja-btn" href="' + h.video_url + '" target="_blank" rel="noopener"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:13px;height:13px;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>Descargar</a>' : '')
          + '</div>';
      }).join('');
    }
    // Otros
    document.getElementById('loading-otros').style.display = 'none';
    var go = document.getElementById('grid-otros');
    if (!otros.length) {
      go.innerHTML = '<div class="sh-empty" style="grid-column:1/-1"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg><p>No hay materiales publicados todav&#237;a.</p></div>';
    } else {
      go.innerHTML = otros.map(function(o) {
        return '<div class="otro-card"><span class="otro-badge">Recurso</span>'
          + '<div class="otro-title">' + o.titulo + '</div>'
          + (o.maestro ? '<div class="otro-autor">' + o.maestro + '</div>' : '')
          + (o.descripcion ? '<div class="otro-desc">' + o.descripcion + '</div>' : '')
          + '<div class="otro-date">' + formatFecha(o.fecha) + '</div>'
          + (o.video_url ? '<a class="otro-btn" href="' + o.video_url + '" target="_blank" rel="noopener"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:13px;height:13px;"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>Abrir</a>' : '')
          + '</div>';
      }).join('');
    }
    // YouTube modal
    document.addEventListener('click', function(e) {
      var el = e.target.closest('.yt-open');
      if (!el) return;
      var vid = el.dataset.ytid, url = el.dataset.url;
      if (vid) { document.getElementById('yt-iframe').src = 'https://www.youtube.com/embed/' + vid + '?autoplay=1'; document.getElementById('yt-modal').classList.add('open'); }
      else if (url) { window.open(url, '_blank'); }
    });
    document.getElementById('yt-close').addEventListener('click', function() { document.getElementById('yt-modal').classList.remove('open'); document.getElementById('yt-iframe').src = ''; });
    document.getElementById('yt-modal').addEventListener('click', function(e) { if (e.target === this) { this.classList.remove('open'); document.getElementById('yt-iframe').src = ''; } });
  })();
  </script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(function(){}); }</script>
</body>
</html>
