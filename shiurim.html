<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shiurim — Jabad Barcelona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; background: #f8fafc; }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }
    .sh-inner { max-width: 1080px; margin: 0 auto; padding: 28px 28px 100px; }
    @media (max-width: 768px) { .sh-inner { padding: 16px 14px 100px; } }

    .sh-header { margin-bottom: 22px; }
    .sh-header h1 { font-family: 'Frank Ruhl Libre', Georgia, serif; font-size: 1.75rem; font-weight: 700; color: var(--color-text); margin-bottom: 3px; }
    .sh-header p { font-size: 0.87rem; color: var(--color-text-muted); }

    /* Tabs */
    .sh-tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; overflow-x: auto; scrollbar-width: none; }
    .sh-tabs::-webkit-scrollbar { display: none; }
    .sh-tab { padding: 11px 20px; font-size: 0.87rem; font-weight: 600; font-family: var(--font-ui); cursor: pointer; border: none; background: none; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 7px; }
    .sh-tab:hover { color: var(--color-text); }
    .sh-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .sh-count { background: #f1f5f9; color: #64748b; font-size: 0.68rem; font-weight: 700; padding: 1px 6px; border-radius: 999px; }
    .sh-tab.active .sh-count { background: #dbeafe; color: var(--color-primary); }
    .sh-panel { display: none; }
    .sh-panel.active { display: block; }
    .sh-loading { text-align: center; padding: 48px; color: #94a3b8; font-size: .87rem; }
    .sh-empty { text-align: center; padding: 72px 20px; color: #94a3b8; }
    .sh-empty svg { width: 44px; height: 44px; margin: 0 auto 10px; display: block; opacity: .25; }
    .sh-empty p { font-size: .88rem; }

    /* Video grid */
    .vid-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 960px) { .vid-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .vid-grid { grid-template-columns: 1fr; gap: 14px; } }
    .vid-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; transition: box-shadow .2s, transform .2s; cursor: pointer; }
    .vid-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .vid-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg,#1B2E5E,#2a4a8e); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .vid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
    .vid-card:hover .vid-thumb img { transform: scale(1.03); }
    .vid-play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: background .2s; }
    .vid-card:hover .vid-play-btn { background: rgba(0,0,0,.25); }
    .vid-play-circle { width: 48px; height: 48px; background: rgba(0,0,0,.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
    .vid-card:hover .vid-play-circle { opacity: 1; }
    .vid-play-circle svg { width: 22px; height: 22px; color: #fff; margin-left: 3px; }
    .vid-duration { position: absolute; bottom: 6px; right: 8px; background: rgba(0,0,0,.8); color: #fff; font-size: .68rem; font-weight: 600; padding: 2px 5px; border-radius: 4px; }
    .vid-info { padding: 10px 12px 12px; }
    .vid-title { font-size: .87rem; font-weight: 700; color: #0f172a; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px; }
    .vid-author { font-size: .75rem; color: #C9A84C; font-weight: 600; margin-bottom: 4px; }
    .vid-stats { display: flex; align-items: center; gap: 12px; font-size: .72rem; color: #64748b; margin-bottom: 8px; }
    .vid-stat { display: flex; align-items: center; gap: 3px; }
    .vid-stat svg { width: 12px; height: 12px; }
    .vid-actions { display: flex; align-items: center; gap: 8px; }
    .vid-like-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 999px; border: 1.5px solid #e2e8f0; background: #fff; font-size: .74rem; font-weight: 600; color: #475569; cursor: pointer; transition: all .15s; font-family: var(--font-ui); }
    .vid-like-btn:hover, .vid-like-btn.liked { border-color: #C9A84C; color: #92400e; background: #fef3c7; }
    .vid-like-btn svg { width: 13px; height: 13px; }
    .vid-open-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 12px; background: var(--color-primary); color: #fff; border-radius: 8px; font-size: .75rem; font-weight: 600; border: none; cursor: pointer; transition: background .15s; font-family: var(--font-ui); }
    .vid-open-btn:hover { background: #12204A; }
    .vid-open-btn svg { width: 13px; height: 13px; }

    /* Hoja list */
    .hoja-list { display: flex; flex-direction: column; gap: 10px; }
    .hoja-item { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 14px 18px; display: flex; align-items: center; gap: 14px; transition: box-shadow .15s; }
    .hoja-item:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.08); }
    .hoja-icon { width: 42px; height: 42px; background: #fef3c7; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hoja-icon svg { width: 20px; height: 20px; color: #92400e; }
    .hoja-info { flex: 1; min-width: 0; }
    .hoja-title { font-size: .88rem; font-weight: 700; color: #0f172a; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hoja-sub { font-size: .74rem; color: #64748b; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .hoja-stat { display: flex; align-items: center; gap: 3px; }
    .hoja-stat svg { width: 11px; height: 11px; }
    .hoja-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
    .hoja-like-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 999px; border: 1.5px solid #e2e8f0; background: #fff; font-size: .73rem; font-weight: 600; color: #475569; cursor: pointer; transition: all .15s; font-family: var(--font-ui); }
    .hoja-like-btn:hover, .hoja-like-btn.liked { border-color: #C9A84C; color: #92400e; background: #fef3c7; }
    .hoja-like-btn svg { width: 12px; height: 12px; }
    .hoja-dl-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; background: #fef3c7; color: #92400e; border-radius: 8px; font-size: .76rem; font-weight: 600; text-decoration: none; transition: background .15s; white-space: nowrap; }
    .hoja-dl-btn:hover { background: #fde68a; }
    .hoja-dl-btn svg { width: 12px; height: 12px; }

    /* Otros grid */
    .otros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 900px) { .otros-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .otros-grid { grid-template-columns: 1fr; } }
    .otro-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 16px; display: flex; flex-direction: column; gap: 7px; transition: box-shadow .2s, transform .2s; }
    .otro-card:hover { box-shadow: 0 5px 18px rgba(0,0,0,.09); transform: translateY(-1px); }
    .otro-badge { display: inline-flex; padding: 2px 9px; border-radius: 999px; background: #ede9fe; color: #5b21b6; font-size: .67rem; font-weight: 700; width: fit-content; }
    .otro-title { font-size: .87rem; font-weight: 700; color: #0f172a; line-height: 1.35; }
    .otro-autor { font-size: .74rem; color: #C9A84C; font-weight: 600; }
    .otro-desc { font-size: .77rem; color: #64748b; line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .otro-stats { display: flex; gap: 10px; font-size: .71rem; color: #94a3b8; }
    .otro-stat { display: flex; align-items: center; gap: 3px; }
    .otro-stat svg { width: 11px; height: 11px; }
    .otro-foot { display: flex; align-items: center; gap: 8px; margin-top: auto; }
    .otro-like-btn { display: flex; align-items: center; gap: 4px; padding: 5px 9px; border-radius: 999px; border: 1.5px solid #e2e8f0; background: #fff; font-size: .72rem; font-weight: 600; color: #475569; cursor: pointer; transition: all .15s; font-family: var(--font-ui); }
    .otro-like-btn:hover, .otro-like-btn.liked { border-color: #C9A84C; color: #92400e; background: #fef3c7; }
    .otro-like-btn svg { width: 12px; height: 12px; }
    .otro-open-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 10px; background: var(--color-primary); color: #fff; border-radius: 7px; font-size: .73rem; font-weight: 600; text-decoration: none; transition: background .15s; }
    .otro-open-btn:hover { background: #12204A; }

    /* YouTube modal */
    .yt-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 400; display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .yt-overlay.open { opacity: 1; pointer-events: all; }
    .yt-box { width: 100%; max-width: 900px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
    .yt-box iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
    .yt-close-btn { position: absolute; top: -40px; right: 0; background: none; border: none; color: #fff; font-size: 1.6rem; cursor: pointer; line-height: 1; opacity: .8; }
    .yt-close-btn:hover { opacity: 1; }

    /* FAB */
    .fab-add { position: fixed; bottom: 28px; right: 28px; width: 56px; height: 56px; border-radius: 50%; background: #C9A84C; color: #fff; border: none; font-size: 1.8rem; cursor: pointer; box-shadow: 0 4px 20px rgba(201,168,76,.5); display: none; align-items: center; justify-content: center; z-index: 200; transition: background .15s, transform .15s; line-height: 1; }
    .fab-add.visible { display: flex; }
    .fab-add:hover { background: #a8892e; transform: scale(1.07); }
    @media (max-width: 768px) { .fab-add { bottom: 82px; right: 16px; } }

    /* Upload area (mismo estilo que admin) */
    .sh-upload-area { border: 2px dashed #e2e8f0; border-radius: 10px; cursor: pointer; transition: border-color .15s, background .15s; overflow: hidden; }
    .sh-upload-area:hover { border-color: var(--color-primary); background: rgba(27,46,94,.03); }
    .sh-upload-ph { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 20px; color: #718096; }
    .sh-upload-ph svg { width: 26px; height: 26px; opacity: .6; }
    .sh-upload-ph span { font-size: .83rem; font-weight: 500; }
    .sh-upload-hint { font-size: .74rem; color: #94a3b8; }
    .sh-upload-filled { position: relative; }
    .sh-upload-filled img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; display: block; }
    .sh-upload-clear { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.55); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 13px; line-height: 22px; text-align: center; padding: 0; }

    /* File upload zone */
    .sh-file-zone { border: 2px dashed #e2e8f0; border-radius: 10px; padding: 22px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    .sh-file-zone:hover, .sh-file-zone.drag { border-color: var(--color-primary); background: rgba(27,46,94,.03); }
    .sh-file-zone svg { width: 28px; height: 28px; color: #94a3b8; margin-bottom: 6px; }
    .sh-file-zone p { font-size: .83rem; font-weight: 500; color: #475569; margin: 0 0 3px; }
    .sh-file-zone span { font-size: .74rem; color: #94a3b8; }
    .sh-file-selected { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f0fdf4; border-radius: 8px; border: 1.5px solid #86efac; }
    .sh-file-selected svg { width: 18px; height: 18px; color: #16a34a; flex-shrink: 0; }
    .sh-file-selected span { font-size: .82rem; color: #15803d; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sh-file-selected button { background: none; border: none; cursor: pointer; color: #64748b; font-size: 1rem; flex-shrink: 0; }

    /* Content source toggle */
    .src-toggle { display: flex; gap: 0; border: 1.5px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
    .src-btn { flex: 1; padding: 8px 12px; border: none; background: #fff; font-size: .82rem; font-weight: 600; color: #64748b; cursor: pointer; transition: background .15s, color .15s; font-family: var(--font-ui); }
    .src-btn.active { background: var(--color-primary); color: #fff; }

    /* Progress bar */
    .sh-progress { height: 4px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-top: 8px; display: none; }
    .sh-progress-bar { height: 100%; background: var(--color-primary); border-radius: 999px; transition: width .2s; }

    /* Toast */
    .sh-toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 600; pointer-events: none; }
    .sh-toast { background: #065f46; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: .83rem; font-weight: 500; opacity: 0; transition: opacity .3s; white-space: nowrap; }
    .sh-toast.show { opacity: 1; }
    .sh-toast.error { background: #991b1b; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jabad Barcelona">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <main class="main-content">
    <div class="sh-inner">
      <div class="sh-header">
        <h1>Shiurim</h1>
        <p>Clases y materiales de Torah de la comunidad</p>
      </div>
      <div class="sh-tabs" id="sh-tabs">
        <button class="sh-tab active" data-panel="videos">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
          Videos <span class="sh-count" id="cnt-videos">0</span>
        </button>
        <button class="sh-tab" data-panel="hoja">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
          Hoja de la semana <span class="sh-count" id="cnt-hoja">0</span>
        </button>
        <button class="sh-tab" data-panel="otros">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
          Otros <span class="sh-count" id="cnt-otros">0</span>
        </button>
      </div>

      <div class="sh-panel active" id="panel-videos">
        <div class="sh-loading" id="load-videos">Cargando...</div>
        <div class="vid-grid" id="grid-videos"></div>
      </div>
      <div class="sh-panel" id="panel-hoja">
        <div class="sh-loading" id="load-hoja">Cargando...</div>
        <div class="hoja-list" id="list-hoja"></div>
      </div>
      <div class="sh-panel" id="panel-otros">
        <div class="sh-loading" id="load-otros">Cargando...</div>
        <div class="otros-grid" id="grid-otros"></div>
      </div>
    </div>
  </main>

  <!-- FAB admin -->
  <button class="fab-add" id="fab-add" title="Publicar shiur">+</button>

  <!-- YouTube modal -->
  <div class="yt-overlay" id="yt-overlay">
    <div class="yt-box">
      <button class="yt-close-btn" id="yt-close">&#10005;</button>
      <iframe id="yt-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Modal publicar shiur (mismo formato que admin) -->
  <div class="modal-overlay hidden" id="modal-pub-shiur">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 class="modal-title">Publicar nuevo shiur</h3>
        <button class="modal-close" onclick="closePubModal()">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="flex-col gap-md">

          <!-- Apartado -->
          <div class="form-group">
            <label class="form-label required">Apartado</label>
            <select class="form-select" id="pub-apartado">
              <option value="videos">&#127909; Videos</option>
              <option value="hoja_semana">&#128196; Hoja de la semana</option>
              <option value="otros">&#128218; Otros materiales</option>
            </select>
          </div>

          <!-- Título -->
          <div class="form-group">
            <label class="form-label required">T&#237;tulo</label>
            <input type="text" class="form-input" id="pub-titulo" placeholder="T&#237;tulo del shiur o material">
            <span class="form-error" id="pub-titulo-err" style="display:none;">El t&#237;tulo es obligatorio.</span>
          </div>

          <!-- Descripción -->
          <div class="form-group">
            <label class="form-label">Descripci&#243;n <span style="color:var(--color-text-light);font-weight:400;">(opcional)</span></label>
            <textarea class="form-textarea form-textarea-sm" id="pub-desc" placeholder="Breve descripci&#243;n del contenido..." style="min-height:70px;"></textarea>
          </div>

          <!-- Imagen de portada -->
          <div class="form-group">
            <label class="form-label">Imagen de portada <span style="color:var(--color-text-light);font-weight:400;">(opcional)</span></label>
            <div class="sh-upload-area" id="pub-img-area" onclick="document.getElementById('pub-img-file').click()">
              <input type="file" id="pub-img-file" accept="image/*" hidden>
              <div class="sh-upload-ph" id="pub-img-ph">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
                <span>A&#241;adir imagen de portada</span>
                <span class="sh-upload-hint">JPG, PNG o WebP</span>
              </div>
              <div class="sh-upload-filled" id="pub-img-filled" style="display:none;">
                <img id="pub-img-preview" alt="preview">
                <button type="button" class="sh-upload-clear" onclick="event.stopPropagation();clearPubImg()">&times;</button>
              </div>
            </div>
          </div>

          <!-- Contenido: toggle URL / Archivo -->
          <div class="form-group">
            <label class="form-label">Contenido</label>
            <div class="src-toggle">
              <button type="button" class="src-btn active" id="src-url-btn" onclick="setSrc('url')">
                &#128279; Pegar URL
              </button>
              <button type="button" class="src-btn" id="src-file-btn" onclick="setSrc('file')">
                &#128193; Subir archivo
              </button>
            </div>

            <!-- URL -->
            <div id="src-url-wrap">
              <input type="url" class="form-input" id="pub-url" placeholder="https://youtube.com/watch?v=... o enlace a PDF">
            </div>

            <!-- Archivo -->
            <div id="src-file-wrap" style="display:none;">
              <div class="sh-file-zone" id="pub-file-zone" onclick="document.getElementById('pub-content-file').click()">
                <input type="file" id="pub-content-file" accept=".pdf,.mp3,.mp4,.m4a,.wav,.ogg,video/*,audio/*,application/pdf" hidden>
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
                <p>Haz clic o arrastra el archivo aqu&#237;</p>
                <span>PDF, MP3, MP4, audio o v&#237;deo · M&#225;x. 50 MB</span>
              </div>
              <div class="sh-file-selected" id="pub-file-selected" style="display:none;">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>
                <span id="pub-file-name">archivo.pdf</span>
                <button type="button" onclick="clearPubFile()">&#10005;</button>
              </div>
              <div class="sh-progress" id="pub-progress">
                <div class="sh-progress-bar" id="pub-progress-bar" style="width:0%"></div>
              </div>
            </div>
          </div>

          <!-- Maestro y duración en fila -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">Maestro / Autor</label>
              <input type="text" class="form-input" id="pub-maestro" placeholder="Nombre del maestro">
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Duraci&#243;n <span style="color:var(--color-text-light);font-weight:400;">(ej: 45 min)</span></label>
              <input type="text" class="form-input" id="pub-duracion" placeholder="45 min">
            </div>
          </div>

          <!-- Fecha -->
          <div class="form-group">
            <label class="form-label">Fecha</label>
            <input type="date" class="form-input" id="pub-fecha" style="max-width:200px;">
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closePubModal()">Cancelar</button>
        <button class="btn btn-primary" id="pub-save-btn" onclick="saveShiur()">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          <span id="pub-save-txt">Publicar shiur</span>
        </button>
      </div>
    </div>
  </div>

  <div class="sh-toast-wrap"><div class="sh-toast" id="sh-toast"></div></div>

  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/media.js"></script>
  <script>
  (async function () {
    try { initNav('shiurim'); } catch(e) {}

    var sb = typeof getSupabase === 'function' ? getSupabase() : null;
    var isAdmin = false;
    try { var u = getCurrentUser ? getCurrentUser() : null; isAdmin = u && u.role === 'admin'; } catch(e) {}
    if (isAdmin) document.getElementById('fab-add').classList.add('visible');

    // ── Tabs ──
    document.getElementById('sh-tabs').addEventListener('click', function(e) {
      var btn = e.target.closest('.sh-tab');
      if (!btn) return;
      document.querySelectorAll('.sh-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.sh-panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    });

    // ── Helpers ──
    function fmt(d) {
      if (!d) return '';
      try { return new Date(d + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }); }
      catch(e) { return d; }
    }
    function fmtN(n) { if (!n) return '0'; return n >= 1000 ? (n/1000).toFixed(1).replace('.0','') + 'k' : String(n); }
    function ytId(url) {
      if (!url) return null;
      var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }
    function toast(msg, type) {
      var t = document.getElementById('sh-toast');
      t.textContent = msg; t.className = 'sh-toast show' + (type === 'error' ? ' error' : '');
      setTimeout(function() { t.classList.remove('show'); }, 3500);
    }

    // Likes localStorage
    function getLiked() { try { return JSON.parse(localStorage.getItem('sh_liked') || '[]'); } catch(e) { return []; } }
    function isLiked(id) { return getLiked().indexOf(id) !== -1; }
    function toggleLiked(id) {
      var arr = getLiked(), idx = arr.indexOf(id);
      if (idx === -1) arr.push(id); else arr.splice(idx, 1);
      localStorage.setItem('sh_liked', JSON.stringify(arr));
      return idx === -1;
    }
    function incVistas(id, current) {
      var s = typeof getSupabase === 'function' ? getSupabase() : null; if (!s) return;
      s.from('shiurim').update({ vistas: (current || 0) + 1 }).eq('id', id).then(function() {});
    }
    function updateLikes(id, cur, add) {
      var s = typeof getSupabase === 'function' ? getSupabase() : null; if (!s) return;
      s.from('shiurim').update({ likes: Math.max(0, (cur || 0) + (add ? 1 : -1)) }).eq('id', id).then(function() {});
    }
    window.incVistas = incVistas;

    // ── Load data ──
    var allData = [];
    var sbLoad = typeof getSupabase === 'function' ? getSupabase() : null;
    if (sbLoad) {
      try {
        var res = await sbLoad.from('shiurim').select('*').order('created_at', { ascending: false });
        if (!res.error && res.data) allData = res.data;
      } catch(e) { console.warn('shiurim:', e); }
    }
    var videos = allData.filter(function(s) { return s.apartado === 'videos'; });
    var hojas  = allData.filter(function(s) { return s.apartado === 'hoja_semana'; });
    var otros  = allData.filter(function(s) { return s.apartado === 'otros'; });

    document.getElementById('cnt-videos').textContent = videos.length;
    document.getElementById('cnt-hoja').textContent   = hojas.length;
    document.getElementById('cnt-otros').textContent  = otros.length;

    var HEART = '<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>';
    var HEART_F = '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z"/></svg>';
    var EYE = '<svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>';
    var PLAY = '<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg>';
    var DL = '<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>';
    var EXT = '<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:12px;height:12px;"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>';

    // ── Render Videos ──
    document.getElementById('load-videos').style.display = 'none';
    var gv = document.getElementById('grid-videos');
    if (!videos.length) {
      gv.innerHTML = '<div class="sh-empty" style="grid-column:1/-1"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/></svg><p>No hay videos todav&#237;a.</p></div>';
    } else {
      gv.innerHTML = videos.map(function(v) {
        var id = ytId(v.video_url);
        var thumb = v.imagen_url || (id ? 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg' : null);
        var liked = isLiked(v.id);
        var da = 'data-id="' + v.id + '" data-likes="' + (v.likes||0) + '" data-vistas="' + (v.vistas||0) + '"' + (id ? ' data-ytid="' + id + '"' : '') + (v.video_url ? ' data-url="' + v.video_url + '"' : '');
        return '<div class="vid-card" ' + da + '>'
          + '<div class="vid-thumb vid-open-click" ' + da + '>'
          + (thumb ? '<img src="' + thumb + '" alt="" onerror="this.style.display=\'none\'">' : '')
          + '<div class="vid-play-btn"><div class="vid-play-circle">' + PLAY + '</div></div>'
          + (v.duracion ? '<span class="vid-duration">' + v.duracion + '</span>' : '')
          + '</div><div class="vid-info">'
          + '<div class="vid-title">' + v.titulo + '</div>'
          + (v.maestro ? '<div class="vid-author">' + v.maestro + '</div>' : '')
          + '<div class="vid-stats"><span class="vid-stat">' + EYE + '<span class="vista-count">' + fmtN(v.vistas) + '</span></span><span class="vid-stat">' + HEART + '<span class="like-count">' + fmtN(v.likes) + '</span></span><span>' + fmt(v.fecha) + '</span></div>'
          + '<div class="vid-actions">'
          + '<button class="vid-like-btn like-btn' + (liked ? ' liked' : '') + '" data-id="' + v.id + '" data-likes="' + (v.likes||0) + '">' + (liked ? HEART_F : HEART) + '<span>' + fmtN(v.likes) + '</span></button>'
          + '<button class="vid-open-btn vid-open-click" ' + da + ' style="width:13px;height:13px;">' + PLAY + ' Ver video</button>'
          + '</div></div></div>';
      }).join('');
    }

    // ── Render Hoja ──
    document.getElementById('load-hoja').style.display = 'none';
    var lh = document.getElementById('list-hoja');
    var DOC = '<svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>';
    if (!hojas.length) {
      lh.innerHTML = '<div class="sh-empty">' + DOC + '<p>No hay hojas publicadas todav&#237;a.</p></div>';
    } else {
      lh.innerHTML = hojas.map(function(h) {
        var liked = isLiked(h.id);
        return '<div class="hoja-item"><div class="hoja-icon">' + DOC + '</div>'
          + '<div class="hoja-info"><div class="hoja-title">' + h.titulo + '</div>'
          + '<div class="hoja-sub"><span class="hoja-stat">' + EYE + '<span class="vista-count">' + fmtN(h.vistas) + '</span></span>'
          + (h.maestro ? '<span>' + h.maestro + '</span>' : '') + '<span>' + fmt(h.fecha) + '</span></div></div>'
          + '<div class="hoja-actions">'
          + '<button class="hoja-like-btn like-btn' + (liked ? ' liked' : '') + '" data-id="' + h.id + '" data-likes="' + (h.likes||0) + '">' + (liked ? HEART_F : HEART) + '<span>' + fmtN(h.likes) + '</span></button>'
          + (h.video_url ? '<a class="hoja-dl-btn" href="' + h.video_url + '" target="_blank" rel="noopener" onclick="incVistas(\'' + h.id + '\',' + (h.vistas||0) + ')">' + DL + ' Descargar</a>' : '')
          + '</div></div>';
      }).join('');
    }

    // ── Render Otros ──
    document.getElementById('load-otros').style.display = 'none';
    var go = document.getElementById('grid-otros');
    if (!otros.length) {
      go.innerHTML = '<div class="sh-empty" style="grid-column:1/-1"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg><p>No hay materiales todav&#237;a.</p></div>';
    } else {
      go.innerHTML = otros.map(function(o) {
        var liked = isLiked(o.id);
        return '<div class="otro-card"><span class="otro-badge">Recurso</span>'
          + '<div class="otro-title">' + o.titulo + '</div>'
          + (o.maestro ? '<div class="otro-autor">' + o.maestro + '</div>' : '')
          + (o.descripcion ? '<div class="otro-desc">' + o.descripcion + '</div>' : '')
          + '<div class="otro-stats"><span class="otro-stat">' + EYE + '<span class="vista-count">' + fmtN(o.vistas) + '</span></span><span class="otro-stat">' + HEART + '<span class="like-count">' + fmtN(o.likes) + '</span></span><span>' + fmt(o.fecha) + '</span></div>'
          + '<div class="otro-foot">'
          + '<button class="otro-like-btn like-btn' + (liked ? ' liked' : '') + '" data-id="' + o.id + '" data-likes="' + (o.likes||0) + '">' + (liked ? HEART_F : HEART) + '<span>' + fmtN(o.likes) + '</span></button>'
          + (o.video_url ? '<a class="otro-open-btn" href="' + o.video_url + '" target="_blank" rel="noopener" onclick="incVistas(\'' + o.id + '\',' + (o.vistas||0) + ')">' + EXT + ' Abrir</a>' : '')
          + '</div></div>';
      }).join('');
    }

    // ── YouTube modal ──
    function openYt(vid, url) {
      if (vid) { document.getElementById('yt-iframe').src = 'https://www.youtube.com/embed/' + vid + '?autoplay=1'; document.getElementById('yt-overlay').classList.add('open'); }
      else if (url) { window.open(url, '_blank'); }
    }
    function closeYt() { document.getElementById('yt-overlay').classList.remove('open'); document.getElementById('yt-iframe').src = ''; }
    document.getElementById('yt-close').addEventListener('click', closeYt);
    document.getElementById('yt-overlay').addEventListener('click', function(e) { if (e.target === this) closeYt(); });

    // ── Click delegation ──
    document.body.addEventListener('click', function(e) {
      var opener = e.target.closest('.vid-open-click');
      if (opener) {
        var vid = opener.dataset.ytid, url = opener.dataset.url, id = opener.dataset.id, vis = parseInt(opener.dataset.vistas)||0;
        openYt(vid, url);
        incVistas(id, vis);
        var card = document.querySelector('[data-id="' + id + '"].vid-card');
        if (card) { var vc = card.querySelector('.vista-count'); if (vc) vc.textContent = fmtN(vis + 1); }
        return;
      }
      var lb = e.target.closest('.like-btn');
      if (lb) {
        var sid = lb.dataset.id, cur = parseInt(lb.dataset.likes)||0;
        var nowLiked = toggleLiked(sid);
        var newL = Math.max(0, cur + (nowLiked ? 1 : -1));
        lb.dataset.likes = newL;
        lb.classList.toggle('liked', nowLiked);
        lb.innerHTML = (nowLiked ? HEART_F : HEART) + '<span>' + fmtN(newL) + '</span>';
        updateLikes(sid, cur, nowLiked);
        document.querySelectorAll('.like-count').forEach(function(el) {
          var c = el.closest('[data-id]');
          if (c && c.dataset.id === sid) el.textContent = fmtN(newL);
        });
      }
    });

    // ── Publish modal (admin) ──
    if (isAdmin) {
      document.getElementById('fab-add').addEventListener('click', function() {
        document.getElementById('pub-fecha').value = new Date().toISOString().slice(0,10);
        document.getElementById('modal-pub-shiur').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      });
    }

    // Imagen portada
    document.getElementById('pub-img-file').addEventListener('change', function() {
      var file = this.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('pub-img-preview').src = e.target.result;
        document.getElementById('pub-img-ph').style.display = 'none';
        document.getElementById('pub-img-filled').style.display = '';
      };
      reader.readAsDataURL(file);
    });
    window.clearPubImg = function() {
      document.getElementById('pub-img-file').value = '';
      document.getElementById('pub-img-preview').src = '';
      document.getElementById('pub-img-ph').style.display = 'flex';
      document.getElementById('pub-img-filled').style.display = 'none';
    };

    // Archivo de contenido
    var _contentFile = null;
    document.getElementById('pub-content-file').addEventListener('change', function() {
      var file = this.files[0]; if (!file) return;
      _contentFile = file;
      document.getElementById('pub-file-zone').style.display = 'none';
      document.getElementById('pub-file-selected').style.display = 'flex';
      document.getElementById('pub-file-name').textContent = file.name;
    });
    window.clearPubFile = function() {
      _contentFile = null;
      document.getElementById('pub-content-file').value = '';
      document.getElementById('pub-file-zone').style.display = '';
      document.getElementById('pub-file-selected').style.display = 'none';
    };

    // Drag & drop
    var zone = document.getElementById('pub-file-zone');
    zone.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('drag'); });
    zone.addEventListener('dragleave', function() { this.classList.remove('drag'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); this.classList.remove('drag');
      var file = e.dataTransfer.files[0]; if (!file) return;
      _contentFile = file;
      document.getElementById('pub-file-zone').style.display = 'none';
      document.getElementById('pub-file-selected').style.display = 'flex';
      document.getElementById('pub-file-name').textContent = file.name;
    });

    // Toggle URL / Archivo
    window.setSrc = function(type) {
      document.getElementById('src-url-btn').classList.toggle('active', type === 'url');
      document.getElementById('src-file-btn').classList.toggle('active', type === 'file');
      document.getElementById('src-url-wrap').style.display = type === 'url' ? '' : 'none';
      document.getElementById('src-file-wrap').style.display = type === 'file' ? '' : 'none';
    };

    window.closePubModal = function() {
      document.getElementById('modal-pub-shiur').classList.add('hidden');
      document.body.style.overflow = '';
    };
    document.getElementById('modal-pub-shiur').addEventListener('click', function(e) {
      if (e.target === this) window.closePubModal();
    });

    // ── Guardar shiur ──
    window.saveShiur = async function() {
      var titulo = document.getElementById('pub-titulo').value.trim();
      var err = document.getElementById('pub-titulo-err');
      if (!titulo) { err.style.display = ''; return; }
      err.style.display = 'none';

      var btn = document.getElementById('pub-save-btn');
      var txt = document.getElementById('pub-save-txt');
      btn.disabled = true; txt.textContent = 'Subiendo...';

      var contentUrl = null;
      var imgUrl = null;

      // Subir imagen si hay
      var imgFile = document.getElementById('pub-img-file').files[0];
      if (imgFile && typeof uploadMedia === 'function') {
        txt.textContent = 'Subiendo imagen...';
        imgUrl = await uploadMedia(imgFile, 'shiurim/imagenes');
      }

      // Subir archivo de contenido o usar URL
      var srcIsFile = document.getElementById('src-file-btn').classList.contains('active');
      if (srcIsFile && _contentFile) {
        txt.textContent = 'Subiendo archivo...';
        // Mostrar barra de progreso (simulada, ya que uploadMedia no tiene progress)
        var prog = document.getElementById('pub-progress');
        var bar = document.getElementById('pub-progress-bar');
        prog.style.display = ''; bar.style.width = '30%';
        contentUrl = await uploadMedia(_contentFile, 'shiurim/archivos');
        bar.style.width = '100%';
        setTimeout(function() { prog.style.display = 'none'; bar.style.width = '0%'; }, 600);
      } else {
        contentUrl = document.getElementById('pub-url').value.trim() || null;
      }

      var payload = {
        titulo: titulo,
        apartado: document.getElementById('pub-apartado').value,
        descripcion: document.getElementById('pub-desc').value.trim() || null,
        video_url: contentUrl,
        imagen_url: imgUrl,
        maestro: document.getElementById('pub-maestro').value.trim() || null,
        duracion: document.getElementById('pub-duracion').value.trim() || null,
        fecha: document.getElementById('pub-fecha').value || new Date().toISOString().slice(0,10),
        vistas: 0, likes: 0
      };

      var sb = typeof getSupabase === 'function' ? getSupabase() : null;
      if (!sb) { toast('Supabase no disponible.', 'error'); btn.disabled = false; txt.textContent = 'Publicar shiur'; return; }
      var r = await sb.from('shiurim').insert(payload).select().single();
      btn.disabled = false; txt.textContent = 'Publicar shiur';

      if (r.error) { toast('Error: ' + r.error.message, 'error'); return; }
      window.closePubModal();
      // Reset form
      ['pub-titulo','pub-desc','pub-url','pub-maestro','pub-duracion'].forEach(function(id) { document.getElementById(id).value = ''; });
      clearPubImg(); clearPubFile(); setSrc('url');
      toast('Shiur publicado correctamente. Recarga para verlo.', 'success');
    };

  })();
  </script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(function(){}); }</script>
