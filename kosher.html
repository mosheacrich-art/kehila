<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kehilá — Kosher App</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }
    .kosher-inner { max-width: 960px; margin: 0 auto; padding: 32px 32px 60px; }
    @media (max-width: 768px) { .kosher-inner { padding: 20px 14px 88px; } }

    /* ─── Tabs principales ─── */
    .kosher-tabs {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .kosher-tab {
      flex: 1; padding: 14px 20px;
      border-radius: var(--radius-md);
      border: 2px solid var(--color-border);
      background: var(--color-white);
      font-size: .9375rem; font-weight: 600;
      color: var(--color-text-muted); cursor: pointer;
      transition: all var(--transition-fast);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: var(--shadow-sm);
    }
    .kosher-tab svg { width: 20px; height: 20px; }
    .kosher-tab:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .kosher-tab.active {
      background: var(--color-primary); border-color: var(--color-primary);
      color: var(--color-white); box-shadow: var(--shadow-md);
    }
    .kosher-tab.active svg { color: var(--color-gold); }

    /* ─── Banner alerta ─── */
    .kosher-alert {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: var(--color-info-light); border: 1px solid rgba(59,130,246,.25);
      border-radius: var(--radius-md); padding: 12px 18px; margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .kosher-alert-text { display: flex; align-items: center; gap: 10px; font-size: .875rem; color: #1E40AF; }
    .kosher-alert-text svg { width: 18px; height: 18px; flex-shrink: 0; }
    .kosher-alert a { font-weight: 600; color: #1E40AF; text-decoration: underline; cursor: pointer; }

    /* ─── Filtros ─── */
    .kosher-filters { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .kosher-filter-select {
      padding: 8px 12px; border: 1.5px solid var(--color-border); border-radius: var(--radius-sm);
      font-size: .8125rem; background: var(--color-white); color: var(--color-text);
      outline: none; cursor: pointer; transition: border-color var(--transition-fast);
    }
    .kosher-filter-select:focus { border-color: var(--color-primary); }

    /* Checkboxes supervisión */
    .supervision-checks { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .sv-check { display: flex; align-items: center; gap: 6px; font-size: .8125rem; color: var(--color-text-muted); cursor: pointer; }
    .sv-check input { accent-color: var(--color-gold); width: 15px; height: 15px; }

    /* ─── Restaurantes ─── */
    .rest-list { display: flex; flex-direction: column; gap: 14px; }

    .rest-card {
      background: var(--color-white); border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm); padding: 20px;
      display: flex; gap: 18px; align-items: flex-start;
      transition: all var(--transition-normal);
    }
    .rest-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

    .rest-emoji-box {
      width: 56px; height: 56px; border-radius: var(--radius-md);
      background: var(--color-gold-light); border: 1.5px solid rgba(201,168,76,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; flex-shrink: 0;
    }
    .rest-info { flex: 1; min-width: 0; }
    .rest-name { font-size: 1.05rem; font-weight: 700; color: var(--color-text); margin-bottom: 2px; }
    .rest-cuisine { font-size: .8125rem; color: var(--color-text-muted); margin-bottom: 8px; }

    .rest-certs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .cert-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--color-primary); color: var(--color-gold-light);
      border: 1px solid var(--color-gold); padding: 2px 9px;
      border-radius: var(--radius-full); font-size: .65rem; font-weight: 700;
      letter-spacing: .04em;
    }
    .cert-badge svg { width: 10px; height: 10px; color: var(--color-gold); }

    .rest-details { display: flex; flex-direction: column; gap: 4px; }
    .rest-detail-row { display: flex; align-items: flex-start; gap: 7px; font-size: .8125rem; color: var(--color-text-muted); }
    .rest-detail-row svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; color: var(--color-text-light); }
    .rest-detail-row a { color: var(--color-primary); font-weight: 500; }
    .rest-detail-row a:hover { color: var(--color-gold-dark); }

    .rest-rating { display: flex; align-items: center; gap: 4px; font-size: .8125rem; font-weight: 600; color: var(--color-text); }
    .stars { color: var(--color-gold); font-size: .875rem; letter-spacing: 1px; }

    .rest-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    @media (max-width: 600px) {
      .rest-card { flex-direction: column; }
      .rest-actions { flex-direction: row; align-items: center; width: 100%; }
    }

    /* ─── Productos ─── */
    /* Buscadores */
    .productos-search-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .barcode-input {
      display: flex; align-items: center; gap: 8px;
      border: 1.5px solid var(--color-border); border-radius: var(--radius-sm);
      padding: 0 12px; background: var(--color-white);
      transition: border-color var(--transition-fast);
    }
    .barcode-input:focus-within { border-color: var(--color-primary); }
    .barcode-input input {
      border: none; outline: none; font-size: .875rem; padding: 9px 0;
      background: transparent; width: 140px; color: var(--color-text);
    }
    .barcode-input input::placeholder { color: var(--color-text-light); }
    .barcode-input svg { width: 18px; height: 18px; color: var(--color-text-light); flex-shrink: 0; cursor: pointer; }

    .prod-filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

    .toggle-filter {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: var(--radius-full);
      border: 1.5px solid var(--color-border); background: var(--color-white);
      font-size: .775rem; font-weight: 500; color: var(--color-text-muted);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .toggle-filter.on { background: var(--color-gold-light); border-color: var(--color-gold); color: var(--color-gold-dark); }

    /* Grid productos */
    .prod-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 700px) { .prod-grid { grid-template-columns: repeat(2,1fr); } }

    .prod-card {
      background: var(--color-white); border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm); overflow: hidden;
      display: flex; flex-direction: column;
      transition: all var(--transition-normal);
    }
    .prod-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .prod-img {
      height: 80px; background: var(--color-gold-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; position: relative;
    }
    .prod-img.no-stock { opacity: .5; }

    .prod-no-stock-overlay {
      position: absolute; inset: 0; background: rgba(255,255,255,.7);
      display: flex; align-items: center; justify-content: center;
    }
    .prod-no-stock-tag { background: var(--color-danger); color: #fff; font-size: .65rem; font-weight: 700; padding: 3px 8px; border-radius: var(--radius-full); text-transform: uppercase; }

    .prod-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .prod-name { font-size: .8375rem; font-weight: 600; color: var(--color-text); line-height: 1.3; }
    .prod-brand { font-size: .75rem; color: var(--color-text-muted); }
    .prod-cert {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--color-primary); color: var(--color-gold-light);
      padding: 2px 7px; border-radius: var(--radius-full);
      font-size: .6rem; font-weight: 700; letter-spacing: .03em;
      width: fit-content; margin-top: 2px;
    }
    .prod-extra-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
    .prod-extra-badge {
      font-size: .6rem; font-weight: 600; padding: 1px 6px;
      border-radius: var(--radius-full); border: 1px solid;
    }
    .prod-extra-badge.pesaj { background: var(--color-gold-light); color: var(--color-gold-dark); border-color: var(--color-gold); }
    .prod-extra-badge.halav { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }

    .prod-supermercados { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
    .prod-super-pill {
      font-size: .6rem; font-weight: 500; padding: 1px 6px;
      background: var(--color-bg); color: var(--color-text-muted);
      border-radius: var(--radius-full); border: 1px solid var(--color-border);
    }

    /* Stars helper */
    function starsHTML not needed, use inline
  </style>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div class="main-content">
  <div class="kosher-inner">

    <!-- Header -->
    <div class="page-header">
      <div class="page-header-left">
        <p class="page-header-label">Kashrut</p>
        <h1 class="page-title">Kosher App</h1>
        <p class="page-subtitle">Guía de restaurantes y productos certificados en España</p>
      </div>
    </div>

    <!-- Banner alerta -->
    <div class="kosher-alert">
      <div class="kosher-alert-text">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
        </svg>
        <span>¿Detectas un cambio en la certificación de un producto? <a onclick="showToast('Gracias por tu aportación. El equipo lo revisará.','success')">Notifícanos →</a></span>
      </div>
      <span style="font-size:.75rem;color:#1E40AF;opacity:.7;">Actualizado: Marzo 2024</span>
    </div>

    <!-- Tabs principales -->
    <div class="kosher-tabs">
      <button class="kosher-tab active" id="tab-rest" onclick="setKosherTab('restaurantes')">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.857 0-3.369 1.522-3.369 3.401 0 .823.308 1.578.815 2.155M12 8.25c1.857 0 3.369 1.522 3.369 3.401 0 .823-.308 1.578-.815 2.155m-3.369-2.155V21m0-9.394c-.52.565-.815 1.313-.815 2.128 0 .58.166 1.122.453 1.579M12 12.655v8.345m0 0H8.25m3.75 0h3.75M9.75 3.75h4.5"/></svg>
        Restaurantes
      </button>
      <button class="kosher-tab" id="tab-prod" onclick="setKosherTab('productos')">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/></svg>
        Productos
      </button>
    </div>

    <!-- ═══ RESTAURANTES ═══ -->
    <div id="panel-restaurantes">
      <div class="kosher-filters">
        <select class="kosher-filter-select" id="rest-ciudad" onchange="filterRestaurantes()">
          <option value="">Todas las ciudades</option>
          <option value="Madrid">Madrid</option>
          <option value="Barcelona">Barcelona</option>
          <option value="Marbella">Marbella</option>
          <option value="Málaga">Málaga</option>
        </select>
        <div class="supervision-checks">
          <label class="sv-check"><input type="checkbox" id="sv-beit" onchange="filterRestaurantes()"> Beit Yosef</label>
          <label class="sv-check"><input type="checkbox" id="sv-halav" onchange="filterRestaurantes()"> Halav Israel</label>
          <label class="sv-check"><input type="checkbox" id="sv-pas" onchange="filterRestaurantes()"> Pas Yisrael</label>
        </div>
        <span style="font-size:.8125rem;color:var(--color-text-muted);margin-left:auto;" id="rest-count"></span>
      </div>
      <div class="rest-list" id="rest-list"></div>
    </div>

    <!-- ═══ PRODUCTOS ═══ -->
    <div id="panel-productos" style="display:none;">
      <div class="productos-search-row">
        <div class="search-box" style="flex:1;">
          <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
          <input type="text" id="prod-search" placeholder="Busca por nombre o marca…" oninput="filterProductos()">
        </div>
        <div class="barcode-input" title="Escáner de código de barras (demo)">
          <input type="text" placeholder="Código barras" id="barcode-input" oninput="filterProductos()">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" onclick="showToast('Función de cámara disponible en la app móvil.','info')">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5ZM6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75V16.5ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75V16.5Z"/>
          </svg>
        </div>
      </div>
      <div class="prod-filters">
        <select class="kosher-filter-select" id="prod-cat" onchange="filterProductos()">
          <option value="">Todas las categorías</option>
          <option>Vinos y bebidas</option>
          <option>Snacks y galletas</option>
          <option>Frescos y refrigerados</option>
          <option>Dulces y chocolates</option>
          <option>Carne y aves</option>
          <option>Pesaj</option>
          <option>Lácteos</option>
          <option>Pescados</option>
          <option>Despensa</option>
        </select>
        <button class="toggle-filter" id="filter-pesaj" onclick="toggleFilter('pesaj')">Solo Pesaj</button>
        <button class="toggle-filter" id="filter-halav" onclick="toggleFilter('halav')">Halav Israel</button>
        <span style="font-size:.8125rem;color:var(--color-text-muted);margin-left:auto;" id="prod-count"></span>
      </div>
      <div class="prod-grid" id="prod-grid"></div>
    </div>

  </div>
</div>

<div class="toast-container"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
  requireAuth();
  initNav('kosher');

  const SUPERMERCADOS = {
    'Israel': ['El Corte Inglés','Online'],
    'España': ['Mercadona','Carnicería Ben David'],
    'EEUU (importado)': ['Amazon ES','tiendas especializadas'],
    'Noruega': ['El Corte Inglés','Hipercor'],
    'default': ['Tiendas especializadas','Online']
  };

  function getSupermarkets(origen) {
    return SUPERMERCADOS[origen] || SUPERMERCADOS['default'];
  }

  /* ─── Tabs ─── */
  function setKosherTab(tab) {
    document.getElementById('panel-restaurantes').style.display = tab === 'restaurantes' ? '' : 'none';
    document.getElementById('panel-productos').style.display    = tab === 'productos'    ? '' : 'none';
    document.getElementById('tab-rest').classList.toggle('active', tab === 'restaurantes');
    document.getElementById('tab-prod').classList.toggle('active', tab === 'productos');
    if (tab === 'productos') filterProductos();
  }

  /* ─── Restaurantes ─── */
  function starsHTML(rating) {
    const full = Math.floor(rating);
    const half = rating % 1 >= 0.5;
    let s = '';
    for (let i = 0; i < full; i++) s += '★';
    if (half) s += '½';
    return s;
  }

  function parseCerts(certStr) {
    return certStr.split('·').map(c => c.trim()).filter(Boolean);
  }

  function filterRestaurantes() {
    const ciudad = document.getElementById('rest-ciudad').value;
    const beit   = document.getElementById('sv-beit').checked;
    const halav  = document.getElementById('sv-halav').checked;
    const pas    = document.getElementById('sv-pas').checked;

    let items = MOCK_RESTAURANTES.filter(r => {
      if (ciudad && r.ciudad !== ciudad) return false;
      if (beit  && !r.certificacion.toLowerCase().includes('yosef') && !r.certificacion.toLowerCase().includes('glatt')) return false;
      if (halav && !r.certificacion.toLowerCase().includes('chalav')) return false;
      if (pas   && !r.certificacion.toLowerCase().includes('pas'))   return false;
      return true;
    });

    document.getElementById('rest-count').textContent = `${items.length} restaurante${items.length !== 1 ? 's' : ''}`;
    renderRestaurantes(items);
  }

  function renderRestaurantes(items) {
    const list = document.getElementById('rest-list');
    if (!items.length) {
      list.innerHTML = `<div class="empty-state" style="padding:40px 0;"><p class="empty-state-title">Sin restaurantes</p><p class="empty-state-desc">No hay coincidencias con los filtros seleccionados.</p></div>`;
      return;
    }

    list.innerHTML = items.map(r => {
      const certs = parseCerts(r.certificacion);
      const mapsURL = `https://www.google.com/maps/search/${encodeURIComponent(r.nombre + ' ' + r.direccion)}`;

      return `
        <div class="rest-card">
          <div class="rest-emoji-box">${r.emoji}</div>
          <div class="rest-info">
            <p class="rest-name">${r.nombre}</p>
            <p class="rest-cuisine">${r.tipo} · ${r.cocina}</p>
            <div class="rest-certs">
              ${certs.map(c => `
                <span class="cert-badge">
                  <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>
                  ${c}
                </span>`).join('')}
            </div>
            <div class="rest-details">
              <div class="rest-detail-row">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
                ${r.direccion} — ${r.ciudad}
              </div>
              <div class="rest-detail-row">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>
                <a href="tel:${r.telefono}">${r.telefono}</a>
              </div>
              <div class="rest-detail-row">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                ${r.horario}
              </div>
              <div class="rest-detail-row" style="color:var(--color-danger);font-size:.775rem;">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
                Cierra: ${r.cierra}
              </div>
            </div>
          </div>
          <div class="rest-actions">
            <div class="rest-rating">
              <span class="stars">${starsHTML(r.rating)}</span>
              <span>${r.rating}</span>
            </div>
            <a href="${mapsURL}" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"/></svg>
              Cómo llegar
            </a>
          </div>
        </div>`;
    }).join('');
  }

  /* ─── Productos ─── */
  const activeToggles = { pesaj: false, halav: false };

  function toggleFilter(key) {
    activeToggles[key] = !activeToggles[key];
    document.getElementById('filter-' + key).classList.toggle('on', activeToggles[key]);
    filterProductos();
  }

  function filterProductos() {
    const q    = (document.getElementById('prod-search').value || '').toLowerCase();
    const bc   = (document.getElementById('barcode-input').value || '').toLowerCase();
    const cat  = document.getElementById('prod-cat').value;

    const items = MOCK_KOSHER_PRODUCTOS.filter(p => {
      const matchQ   = !q  || p.nombre.toLowerCase().includes(q) || p.marca.toLowerCase().includes(q);
      const matchBC  = !bc || p.nombre.toLowerCase().includes(bc);
      const matchCat = !cat || p.categoria === cat;
      const matchPes = !activeToggles.pesaj  || p.categoria === 'Pesaj' || p.certificacion.toLowerCase().includes('pesaj');
      const matchHal = !activeToggles.halav  || p.certificacion.toLowerCase().includes('chalav');
      return matchQ && matchBC && matchCat && matchPes && matchHal;
    });

    document.getElementById('prod-count').textContent = `${items.length} producto${items.length !== 1 ? 's' : ''}`;
    renderProductos(items);
  }

  const prodBgColors = {
    'Vinos y bebidas':'#FEE2E2','Snacks y galletas':'#FEF3C7',
    'Frescos y refrigerados':'#D1FAE5','Dulces y chocolates':'#FCE7F3',
    'Carne y aves':'#DBEAFE','Pesaj':'#F5EDD6',
    'Lácteos':'#F0FDF4','Pescados':'#CFFAFE','Despensa':'#F5F6FA'
  };

  function renderProductos(items) {
    const grid = document.getElementById('prod-grid');
    if (!items.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state" style="padding:40px 0;"><p class="empty-state-title">Sin resultados</p><p class="empty-state-desc">Prueba con otro término de búsqueda.</p></div></div>`;
      return;
    }

    grid.innerHTML = items.map(p => {
      const bgColor  = prodBgColors[p.categoria] || '#F5F6FA';
      const initial  = p.marca[0].toUpperCase();
      const supers   = getSupermarkets(p.origen);
      const isPesaj  = p.categoria === 'Pesaj' || p.certificacion.toLowerCase().includes('pesaj');
      const isHalav  = p.certificacion.toLowerCase().includes('chalav');

      return `
        <div class="prod-card">
          <div class="prod-img ${p.disponible ? '' : 'no-stock'}" style="background:${bgColor};">
            <span style="font-size:2.5rem;">${p.emoji}</span>
            ${!p.disponible ? `
              <div class="prod-no-stock-overlay">
                <span class="prod-no-stock-tag">Sin stock</span>
              </div>` : ''}
          </div>
          <div class="prod-body">
            <p class="prod-name">${p.nombre}</p>
            <p class="prod-brand">${p.marca} · ${p.origen}</p>
            <span class="prod-cert">✡ ${p.certificacion}</span>
            <div class="prod-extra-badges">
              ${isPesaj ? '<span class="prod-extra-badge pesaj">Pesaj</span>' : ''}
              ${isHalav ? '<span class="prod-extra-badge halav">Halav Israel</span>' : ''}
            </div>
            <div class="prod-supermercados">
              ${supers.map(s => `<span class="prod-super-pill">${s}</span>`).join('')}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  /* ─── Init ─── */
  filterRestaurantes();
  filterProductos();
</script>
</body>
</html>
