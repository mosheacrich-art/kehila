<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticia — Jabad Barcelona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; background: #f5f3ef; }
    @media (max-width: 768px) { .main-content { margin-left: 0; padding-bottom: 80px; } }

    /* ── Back bar ── */
    .article-back-bar {
      background: #fff;
      border-bottom: 1px solid #e2e0da;
      padding: 0 32px;
      height: 50px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    @media (max-width: 768px) { .article-back-bar { padding: 0 16px; } }

    .article-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text-muted);
      padding: 0;
      transition: color 0.15s;
    }
    .article-back-btn:hover { color: var(--color-primary); }
    .article-back-btn svg { width: 16px; height: 16px; }

    /* ── Article wrapper ── */
    .article-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }
    @media (max-width: 768px) { .article-wrap { padding: 28px 16px 60px; } }

    /* ── Newspaper masthead ── */
    .np-masthead-line {
      border-top: 4px solid #1a202c;
      border-bottom: 1px solid #1a202c;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      margin-bottom: 32px;
      gap: 10px;
    }
    .np-masthead-pub {
      font-family: 'Frank Ruhl Libre', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a202c;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .np-masthead-date {
      font-size: 0.7rem;
      color: #718096;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: right;
    }

    /* ── Category ── */
    .np-category {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .np-category::before {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: #C9A84C;
    }

    /* ── Headline ── */
    .np-headline {
      font-family: 'Frank Ruhl Libre', Georgia, 'Times New Roman', serif;
      font-size: 2.6rem;
      font-weight: 900;
      line-height: 1.1;
      color: #1a202c;
      margin-bottom: 18px;
    }
    @media (max-width: 640px) { .np-headline { font-size: 1.85rem; } }

    /* ── Excerpt / standfirst ── */
    .np-standfirst {
      font-size: 1.05rem;
      font-weight: 400;
      color: #4a5568;
      line-height: 1.65;
      border-left: 3px solid #C9A84C;
      padding-left: 16px;
      margin-bottom: 24px;
      font-style: italic;
    }

    /* ── Divider ── */
    .np-divider {
      border: none;
      border-top: 1px solid #c8c3b8;
      margin: 20px 0;
    }
    .np-divider.thick { border-top-width: 2px; border-color: #1a202c; }

    /* ── Byline ── */
    .np-byline {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .np-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .np-avatar span { color: #fff; font-size: 13px; font-weight: 700; }
    .np-byline-info {}
    .np-byline-name {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1a202c;
    }
    .np-byline-date { font-size: 0.78rem; color: #718096; margin-top: 1px; }

    /* ── Hero image ── */
    .np-hero {
      width: 100%;
      max-height: 440px;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      margin-bottom: 28px;
    }
    .np-hero-placeholder {
      width: 100%;
      height: 280px;
      background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      border-radius: 2px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .np-hero-placeholder svg { width: 48px; height: 48px; color: rgba(255,255,255,0.25); }

    /* ── Body text ── */
    .np-body {
      columns: 1;
    }
    .np-p {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.0625rem;
      line-height: 1.82;
      color: #2d3748;
      margin-bottom: 1.25em;
      text-align: justify;
      hyphens: auto;
    }
    .np-p:first-child::first-letter {
      font-family: 'Frank Ruhl Libre', Georgia, serif;
      font-size: 4.2em;
      font-weight: 900;
      float: left;
      line-height: 0.72;
      margin: 0.06em 0.12em 0 0;
      color: #1a202c;
    }

    /* ── Footer ornament ── */
    .np-rule-end {
      border: none;
      border-top: 1px solid #c8c3b8;
      margin: 32px 0 20px;
      text-align: center;
      overflow: visible;
    }
    .np-rule-end::after {
      content: '✦';
      font-size: 12px;
      color: #C9A84C;
      background: #f5f3ef;
      padding: 0 12px;
      position: relative;
      top: -10px;
    }

    /* ── Share / nav row ── */
    .np-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Loading / error ── */
    .np-loading {
      text-align: center;
      padding: 80px 0;
      color: #718096;
      font-size: 1rem;
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="main-content">

    <!-- Back bar -->
    <div class="article-back-bar">
      <button class="article-back-btn" onclick="history.back()">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
        </svg>
        Volver
      </button>
    </div>

    <!-- Article -->
    <div class="article-wrap" id="article-wrap">
      <div class="np-loading" id="np-loading">
        <svg style="width:32px;height:32px;animation:spin 1s linear infinite;color:#C9A84C" fill="none" viewBox="0 0 24 24">
          <circle style="opacity:.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path style="opacity:.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <p style="margin-top:12px">Cargando noticia…</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script>
    requireAuth();
    initNav('noticias');

    function formatFechaLarga(str) {
      try {
        const d = new Date((str || '').includes('T') ? str : str + 'T12:00:00');
        return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      } catch(e) { return str || ''; }
    }

    async function loadArticle() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) { window.location.href = 'noticias.html'; return; }

      const sb = typeof getSupabase === 'function' ? getSupabase() : null;
      let noticia = null;

      if (sb) {
        try {
          const { data } = await sb.from('noticias').select('*').eq('id', id).maybeSingle();
          noticia = data;
        } catch(e) { /* fallback to mock */ }
      }

      // Fallback: look in MOCK_NOTICIAS_V2
      if (!noticia && typeof MOCK_NOTICIAS_V2 !== 'undefined') {
        noticia = MOCK_NOTICIAS_V2.find(n => String(n?.id) === String(id));
      }

      const wrap = document.getElementById('article-wrap');

      if (!noticia) {
        wrap.innerHTML = `
          <div style="text-align:center;padding:80px 0;color:#718096;">
            <p style="font-size:1.1rem;margin-bottom:16px;">Noticia no encontrada.</p>
            <a href="noticias.html" class="btn btn-primary btn-sm">Ver todas las noticias</a>
          </div>`;
        return;
      }

      // Update page title
      document.title = `${noticia.titulo} — Jabad Barcelona`;

      const fecha = noticia.created_at || noticia.fecha || '';
      const authorInitial = (noticia.autor?.[0] ?? 'R').toUpperCase();

      const parrafos = (noticia.contenido ?? noticia.resumen ?? '')
        .split(/\n\n+/).filter(p => p.trim());
      const bodyHTML = parrafos.length
        ? parrafos.map((p, i) =>
            `<p class="np-p">${p.trim()}</p>`
          ).join('')
        : `<p class="np-p">${noticia.resumen || ''}</p>`;

      const heroHTML = noticia.imagen_url
        ? `<img src="${noticia.imagen_url}" class="np-hero" alt="${noticia.titulo}">`
        : `<div class="np-hero-placeholder">
             <svg fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
           </div>`;

      wrap.innerHTML = `
        <!-- Masthead -->
        <div class="np-masthead-line">
          <span class="np-masthead-pub">Jabad Barcelona</span>
          <span class="np-masthead-date">${formatFechaLarga(fecha)}</span>
        </div>

        <!-- Category -->
        <div class="np-category">${noticia.categoria || 'Comunidad'}</div>

        <!-- Headline -->
        <h1 class="np-headline">${noticia.titulo}</h1>

        <!-- Standfirst / excerpt -->
        ${noticia.resumen ? `<p class="np-standfirst">${noticia.resumen}</p>` : ''}

        <hr class="np-divider thick">

        <!-- Byline -->
        <div class="np-byline">
          <div class="np-avatar"><span>${authorInitial}</span></div>
          <div class="np-byline-info">
            <div class="np-byline-name">${noticia.autor || 'Redacción'}</div>
            <div class="np-byline-date">${formatFechaLarga(fecha)}</div>
          </div>
        </div>

        <!-- Hero image -->
        ${heroHTML}

        <!-- Body -->
        <div class="np-body">${bodyHTML}</div>

        <hr class="np-rule-end">

        <!-- Actions -->
        <div class="np-actions">
          <a href="noticias.html" class="btn btn-secondary btn-sm">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:13px;height:13px"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
            Todas las noticias
          </a>
          <button class="btn btn-secondary btn-sm" onclick="copyLink()">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:13px;height:13px"><path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.935-2.185 2.25 2.25 0 0 0-3.935 2.185Z"/></svg>
            Compartir
          </button>
        </div>`;
    }

    function copyLink() {
      navigator.clipboard?.writeText(location.href)
        .then(() => showToast('Enlace copiado', 'success'))
        .catch(() => showToast('No se pudo copiar', 'error'));
    }

    loadArticle();
  </script>
</body>
</html>
