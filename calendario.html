<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario Hebreo — Kehilá</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
    @media (max-width: 768px) { .main-content { margin-left: 0; padding-bottom: 80px; } }
    .cal-heb-inner { padding: 32px 36px 60px; }
    @media (max-width: 768px) { .cal-heb-inner { padding: 20px 14px 88px; } }

    /* ── Grid principal ── */
    .cal-wrap { display: grid; grid-template-columns: 1fr 400px; gap: 28px; align-items: start; }
    @media (max-width: 900px) { .cal-wrap { grid-template-columns: 1fr; } }

    /* ── Nav mes ── */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-month-label { font-family: var(--font-brand); font-size: 1.5rem; font-weight: 700; color: var(--color-text); }
    .cal-nav-btn {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      background: var(--color-white); border: 1.5px solid var(--color-border);
      cursor: pointer; transition: all var(--transition-fast); color: var(--color-text);
    }
    .cal-nav-btn:hover { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .cal-nav-btn svg { width: 16px; height: 16px; }

    /* ── Grid días ── */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-header-day { text-align: center; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--color-text-muted); padding: 10px 0; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: var(--radius-sm); cursor: pointer; position: relative;
      transition: background var(--transition-fast); font-size: 1rem; font-weight: 400;
      color: var(--color-text); padding: 4px;
    }
    .cal-day:hover { background: var(--color-bg); }
    .cal-day.other { color: var(--color-text-light); }
    .cal-day.today { background: var(--color-primary); color: #fff; font-weight: 700; border-radius: var(--radius-sm); }
    .cal-day.today:hover { background: var(--color-primary); opacity: .9; }
    .cal-day.selected { background: var(--color-gold-light, #fef9ec); border: 2px solid var(--color-gold); font-weight: 600; }
    .cal-day.shabbat-day { font-weight: 600; }

    /* ── Dots ── */
    .cal-dots { display: flex; gap: 2px; position: absolute; bottom: 3px; align-items: center; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot-candles  { background: var(--color-gold); }
    .dot-shabbat  { background: var(--color-primary); }
    .dot-holiday  { background: #10B981; }
    .dot-fast     { background: #7C3AED; }
    .dot-chanuka  { background: #2563EB; }
    .dot-purim    { background: #DB2777; }
    .cal-day.today .cal-dot { background: var(--color-gold); }

    /* ── Panel lateral ── */
    .cal-side {
      background: var(--color-white); border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm); padding: 20px;
      position: sticky; top: 20px; max-height: calc(100vh - 80px); overflow-y: auto;
    }
    .cal-side-title { font-size: .9375rem; font-weight: 700; color: var(--color-text); margin-bottom: 14px; }
    .cal-empty { text-align: center; color: var(--color-text-light); font-size: .875rem; padding: 24px 0; }

    /* ── Tarjeta Shabat en el panel ── */
    .side-shabat-card {
      background: var(--color-primary); border-radius: var(--radius-md);
      padding: 16px; margin-bottom: 12px; color: #fff; position: relative; overflow: hidden;
    }
    .side-shabat-card::before {
      content: '✡'; position: absolute; right: 12px; top: 8px;
      font-size: 3rem; opacity: .08; pointer-events: none;
    }
    .side-shabat-label { font-size: .625rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.55); margin-bottom: 4px; }
    .side-shabat-parasha { font-family: var(--font-brand); font-size: 1.15rem; font-weight: 700; color: #fff; line-height: 1.2; }
    .side-shabat-he { font-family: var(--font-brand); font-size: .95rem; color: rgba(255,255,255,.55); direction: rtl; display: block; margin-top: 1px; }
    .side-shabat-especial { font-size: .7rem; font-weight: 600; color: var(--color-gold); margin-top: 4px; }
    .side-shabat-times { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
    .side-time-item { display: flex; flex-direction: column; gap: 1px; }
    .side-time-label { font-size: .6rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,.45); }
    .side-time-val { font-family: var(--font-brand); font-size: 1.1rem; font-weight: 700; color: var(--color-gold); }
    .side-time-sep { width: 1px; background: rgba(255,255,255,.12); align-self: stretch; }

    /* ── Tarjeta festividad en el panel ── */
    .side-holiday-card {
      border-radius: var(--radius-md); padding: 14px;
      margin-bottom: 10px; border-left: 4px solid var(--color-primary);
      background: var(--color-bg);
    }
    .side-holiday-card.yomtov  { border-left-color: #1B2E5E; }
    .side-holiday-card.fast    { border-left-color: #7C3AED; background: #F5F3FF; }
    .side-holiday-card.chanuka { border-left-color: #2563EB; }
    .side-holiday-card.purim   { border-left-color: #DB2777; }
    .side-holiday-card.sukkot  { border-left-color: #D97706; }
    .side-holiday-card.especial{ border-left-color: var(--color-gold); }
    .side-holiday-name { font-size: .9375rem; font-weight: 600; color: var(--color-text); }
    .side-holiday-he   { font-family: var(--font-brand); font-size: .9rem; color: var(--color-text-muted); direction: rtl; }
    .side-holiday-desc { font-size: .75rem; color: var(--color-text-muted); margin-top: 3px; }
    .side-holiday-time { font-size: .75rem; font-weight: 600; color: var(--color-gold-dark, #9a7a2a); margin-top: 4px; }

    /* ── Candle lighting en viernes ── */
    .side-candles-card {
      border-radius: var(--radius-md); padding: 12px 14px;
      margin-bottom: 10px; background: #fffbf0;
      border: 1.5px solid #e9d38a; display: flex; align-items: center; gap: 12px;
    }
    .side-candles-icon { font-size: 1.4rem; flex-shrink: 0; }
    .side-candles-info { flex: 1; }
    .side-candles-label { font-size: .625rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--color-text-muted); }
    .side-candles-time  { font-family: var(--font-brand); font-size: 1.2rem; font-weight: 700; color: var(--color-gold-dark, #9a7a2a); }
    .side-candles-next  { font-size: .75rem; color: var(--color-text-muted); margin-top: 2px; }

    /* ── Loading ── */
    .loading-state { text-align:center; padding: 60px 20px; color: var(--color-text-muted); }
    .loading-spinner { width:32px; height:32px; border:3px solid var(--color-border); border-top-color:var(--color-primary); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Leyenda ── */
    .cal-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border); }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: .7rem; color: var(--color-text-muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Eventos de comunidad en calendario ── */
    .cal-ev-item { background:var(--color-bg); border-radius:var(--radius-sm); padding:10px 12px; margin-bottom:8px; border-left:3px solid var(--color-gold); }
    .cal-ev-item-title { font-size:.875rem; font-weight:600; color:var(--color-text); }
    .cal-ev-item-hora  { font-size:.75rem; color:var(--color-gold-dark,#9a7a2a); font-weight:500; margin-top:2px; }
    .cal-ev-item-desc  { font-size:.75rem; color:var(--color-text-muted); margin-top:3px; }
    .cal-ev-item-del   { float:right; background:none; border:none; color:#ef4444; cursor:pointer; font-size:.8rem; padding:0; opacity:0.6; }
    .cal-ev-item-del:hover { opacity:1; }
    .cal-add-btn { width:100%; margin-top:10px; padding:8px; border:1.5px dashed var(--color-border); background:none; border-radius:var(--radius-sm); color:var(--color-text-muted); cursor:pointer; font-size:.8125rem; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
    .cal-add-btn:hover { border-color:var(--color-gold); color:var(--color-gold-dark,#9a7a2a); background:var(--color-bg); }
    .cal-add-form { background:var(--color-bg); border-radius:var(--radius-sm); padding:12px; margin-top:10px; display:flex; flex-direction:column; gap:8px; }
    .cal-add-form input, .cal-add-form textarea, .cal-add-form select { border:1.5px solid var(--color-border); border-radius:6px; padding:7px 10px; font-size:.8125rem; font-family:inherit; outline:none; background:#fff; }
    .cal-add-form input:focus, .cal-add-form textarea:focus { border-color:var(--color-primary); }
    .cal-add-form-btns { display:flex; gap:8px; }
    .cal-add-form-btns button { flex:1; padding:7px; border-radius:6px; font-size:.8125rem; cursor:pointer; border:1.5px solid var(--color-border); }
    .cal-add-form-btns .btn-save { background:var(--color-primary); color:#fff; border-color:var(--color-primary); font-weight:600; }
    .dot-custom { background: #F59E0B; }
  </style>
</head>

  "Yom HaShoah":{"es":"Yom Hashoá","he":"יום השואה","desc":"Día del Holocausto","tipo":"especial"},
  "Yom HaZikaron":{"es":"Yom Hazikaron","he":"יום הזיכרון","desc":"Día del Recuerdo","tipo":"especial"},
  "Yom HaAtzma'ut":{"es":"Yom Haatsmaut","he":"יום העצמאות","desc":"Día Independencia Israel","tipo":"especial"},
  "Yom Yerushalayim":{"es":"Yom Yerushalayim","he":"יום ירושלים","desc":"Día de Jerusalén","tipo":"especial"},
};

const SHABAT_ESP = {
  "Shabbat HaGadol":"Shabat HaGadol",
  "Shabbat Shuva":"Shabat Shuva",
  "Shabbat Shekalim":"Shabat Shekalim",
  "Shabbat Zachor":"Shabat Zajor",
  "Shabbat Parah":"Shabat Pará",
  "Shabbat HaChodesh":"Shabat HaJodesh",
  "Shabbat Chazon":"Shabat Jazón",
  "Shabbat Nachamu":"Shabat Najamú",
};

function fmtTime(isoStr) {
  if (!isoStr || isoStr.length <= 10) return null;
  return new Date(isoStr).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'});
}

function isoDate(y,m,d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

/* ─── Carga de datos HebCal ─── */
async function ensureData(year) {
  if (loadedYear === year) return;
  const url = `https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=on&nx=off&year=${year}&month=x&ss=on&mf=on&c=on&geo=geoname&geonameid=3117735&m=42&b=18&s=on&lg=s`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error');
  const data = await res.json();

  dateMap = {};

  (data.items || []).forEach(item => {
    const dateKey = item.date.slice(0,10);

    const get = k => { if (!dateMap[k]) dateMap[k] = { holidays:[] }; return dateMap[k]; };

    if (item.category === 'candles') {
      get(dateKey).candles = fmtTime(item.date);
    } else if (item.category === 'havdalah') {
      get(dateKey).havdalah = fmtTime(item.date);
    } else if (item.category === 'parashat') {
      // parasha day = Sábado; la vela = viernes anterior
      const satD = new Date(dateKey + 'T12:00:00');
      const friD = new Date(satD); friD.setDate(friD.getDate()-1);
      const friKey = friD.toISOString().slice(0,10);
      const raw = item.title.replace(/^Parashat\s+/,'').replace(/^Parasha\s+/,'');
      const p = PARASHA[raw] || { es: raw, he: item.hebrew || '' };
      get(friKey).parasha = p;
      get(friKey).shabatDate = dateKey;
    } else if (item.category === 'holiday' && SHABAT_ESP[item.title]) {
      // Shabat especial (cae el sábado, marcamos el viernes)
      const satD = new Date(dateKey + 'T12:00:00');
      const friD = new Date(satD); friD.setDate(friD.getDate()-1);
      const friKey = friD.toISOString().slice(0,10);
      get(friKey).especial = SHABAT_ESP[item.title];
    } else if (item.category === 'holiday' || item.category === 'mf') {
      if (!SHABAT_ESP[item.title]) {
        const h = HOLIDAYS[item.title] || { es: item.title, he: item.hebrew||'', desc:'', tipo:'especial' };
        const timeStr = fmtTime(item.date);
        get(dateKey).holidays.push({ ...h, time: timeStr });
      }
    }
  });

  loadedYear = year;
}

async function loadCustomEvents(year, month) {
  const sb = typeof getSupabase === 'function' ? getSupabase() : null;
  if (!sb) return;
  try {
    const from = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const to   = `${year}-${String(month+1).padStart(2,'0')}-${new Date(year,month+1,0).getDate()}`;
    const { data } = await sb.from('calendario_eventos').select('*')
      .gte('fecha', from).lte('fecha', to).order('hora', { ascending: true });
    if (data) {
      data.forEach(ev => {
        if (!customEventsMap[ev.fecha]) customEventsMap[ev.fecha] = [];
        // avoid duplicates
        if (!customEventsMap[ev.fecha].find(e => e.id === ev.id)) {
          customEventsMap[ev.fecha].push(ev);
        }
      });
    }
  } catch(e) { console.warn('loadCustomEvents:', e); }
}

/* ─── Renderiza el calendario ─── */
function renderCal() {
  const today = new Date();
  const todayKey = isoDate(today.getFullYear(), today.getMonth(), today.getDate());
  const firstDay = new Date(curYear, curMonth, 1);
  const lastDay  = new Date(curYear, curMonth+1, 0);

  // Día de la semana del 1 (0=Dom, 6=Sáb — sin conversión)
  let startDow = firstDay.getDay(); // 0=Dom … 6=Sáb

  let daysHtml = '';

  // Cabeceras
  DIAS_HDR.forEach(d => {
    daysHtml += `<div class="cal-header-day">${d}</div>`;
  });

  // Días del mes anterior
  const prevLast = new Date(curYear, curMonth, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    const d = prevLast - i;
    const key = isoDate(curYear, curMonth-1, d);
    daysHtml += dayCell(d, key, true, todayKey);
  }

  // Días del mes
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const key = isoDate(curYear, curMonth, d);
    daysHtml += dayCell(d, key, false, todayKey);
  }

  // Días del mes siguiente para completar la grilla
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;
  const remaining = totalCells - startDow - lastDay.getDate();
  for (let d = 1; d <= remaining; d++) {
    const key = isoDate(curYear, curMonth+1, d);
    daysHtml += dayCell(d, key, true, todayKey);
  }

  const monthLabel = `${MESES[curMonth]} ${curYear}`;

  document.getElementById('cal-container').innerHTML = `
    <div class="cal-wrap">
      <div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="navMonth(-1)">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
          </button>
          <span class="cal-month-label">${monthLabel}</span>
          <button class="cal-nav-btn" onclick="navMonth(1)">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
          </button>
        </div>
        <div class="cal-grid">${daysHtml}</div>
        <div class="cal-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--color-gold)"></div>Encendido velas</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--color-primary)"></div>Shabat / Parashá</div>
          <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div>Festividad</div>
          <div class="legend-item"><div class="legend-dot" style="background:#7C3AED"></div>Ayuno</div>
          <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>Evento comunidad</div>
        </div>
      </div>
      <div class="cal-side">
        <p class="cal-side-title" id="cal-side-title">Selecciona un día</p>
        <div id="cal-side-detail"><p class="cal-empty">Haz clic en un día para ver la información</p></div>
      </div>
    </div>`;

  // Seleccionar hoy automáticamente si está en el mes visible
  if (today.getFullYear() === curYear && today.getMonth() === curMonth) {
    selectDate(todayKey);
  }
}

function dayCell(d, key, other, todayKey) {
  const info = dateMap[key] || { holidays: [] };
  const isToday    = key === todayKey;
  const isSelected = key === selectedDate;

  let classes = 'cal-day';
  if (other)    classes += ' other';
  if (isToday)  classes += ' today';
  if (isSelected && !isToday) classes += ' selected';

  // Dots
  let dots = '';
  if (info.candles)            dots += `<span class="cal-dot dot-candles"></span>`;
  if (info.parasha)            dots += `<span class="cal-dot dot-shabbat"></span>`;
  if (info.holidays.length) {
    const tipo = info.holidays[0].tipo;
    if      (tipo === 'fast')    dots += `<span class="cal-dot dot-fast"></span>`;
    else if (tipo === 'chanuka') dots += `<span class="cal-dot dot-chanuka"></span>`;
    else if (tipo === 'purim')   dots += `<span class="cal-dot dot-purim"></span>`;
    else                         dots += `<span class="cal-dot dot-holiday"></span>`;
  }
  if (customEventsMap[key]?.length) dots += `<span class="cal-dot dot-custom"></span>`;

  const dotsHtml = dots ? `<div class="cal-dots">${dots}</div>` : '';

  return `<div class="${classes}" data-key="${key}" onclick="selectDate('${key}')">${d}${dotsHtml}</div>`;
}

function selectDate(key) {
  selectedDate = key;

  // Resaltar celda seleccionada
  document.querySelectorAll('.cal-day').forEach(el => {
    el.classList.remove('selected');
    if (el.dataset.key === key && !el.classList.contains('today')) {
      el.classList.add('selected');
    }
  });

  const info = dateMap[key] || { holidays: [] };
  const dateObj = new Date(key + 'T12:00:00');
  const label = dateObj.toLocaleDateString('es-ES',{ weekday:'long', day:'numeric', month:'long' });
  const labelCap = label.charAt(0).toUpperCase() + label.slice(1);

  document.getElementById('cal-side-title').textContent = labelCap;

  let html = '';
  let hasContent = false;

  // ── Encendido de velas (viernes o erev yom tov) ──
  if (info.candles) {
    hasContent = true;
    // Buscar havdalah del sábado siguiente
    const satD = new Date(dateObj); satD.setDate(satD.getDate()+1);
    const satKey = satD.toISOString().slice(0,10);
    const havdalahTime = (dateMap[satKey] || {}).havdalah || null;

    if (info.parasha) {
      // Viernes con parashá → mostrar tarjeta Shabat completa
      const p = info.parasha;
      const esp = info.especial ? `<div class="side-shabat-especial">✦ ${info.especial}</div>` : '';
      const havdalahHTML = havdalahTime
        ? `<div class="side-time-sep"></div><div class="side-time-item"><span class="side-time-label">Habdalá</span><span class="side-time-val">${havdalahTime}</span></div>`
        : '';
      html += `
        <div class="side-shabat-card">
          <div class="side-shabat-label">Shabat esta semana</div>
          <div class="side-shabat-parasha">Parashat ${p.es}</div>
          <span class="side-shabat-he">${p.he}</span>
          ${esp}
          <div class="side-shabat-times">
            <div class="side-time-item">
              <span class="side-time-label">Encendido</span>
              <span class="side-time-val">${info.candles}</span>
            </div>
            ${havdalahHTML}
          </div>
        </div>`;
    } else {
      // Erev Yom Tov (sin parashá)
      html += `
        <div class="side-candles-card">
          <div class="side-candles-icon">🕯️</div>
          <div class="side-candles-info">
            <div class="side-candles-label">Encendido de velas</div>
            <div class="side-candles-time">${info.candles}</div>
          </div>
        </div>`;
    }
  }

  // ── Sábado: mostrar parashá si no se mostró en el viernes ──
  if (info.havdalah && !info.candles) {
    // Es un sábado — buscar la parasha del viernes
    const friD = new Date(dateObj); friD.setDate(friD.getDate()-1);
    const friKey = friD.toISOString().slice(0,10);
    const friInfo = dateMap[friKey] || {};
    if (friInfo.parasha) {
      hasContent = true;
      const p = friInfo.parasha;
      const esp = friInfo.especial ? `<div class="side-shabat-especial">✦ ${friInfo.especial}</div>` : '';
      html += `
        <div class="side-shabat-card">
          <div class="side-shabat-label">Shabat — Parashá de esta semana</div>
          <div class="side-shabat-parasha">Parashat ${p.es}</div>
          <span class="side-shabat-he">${p.he}</span>
          ${esp}
          <div class="side-shabat-times">
            <div class="side-time-item">
              <span class="side-time-label">Habdalá</span>
              <span class="side-time-val">${info.havdalah}</span>
            </div>
          </div>
        </div>`;
    }
  }

  // ── Festividades ──
  info.holidays.forEach(h => {
    hasContent = true;
    const timeHTML = h.time ? `<div class="side-holiday-time">🕯️ Encendido: ${h.time}</div>` : '';
    html += `
      <div class="side-holiday-card ${h.tipo}">
        <div class="side-holiday-name">${h.es}</div>
        ${h.he ? `<div class="side-holiday-he">${h.he}</div>` : ''}
        ${h.desc ? `<div class="side-holiday-desc">${h.desc}</div>` : ''}
        ${timeHTML}
      </div>`;
  });

  // ── Eventos personalizados de la comunidad ──
  const customEvs = customEventsMap[key] || [];
  if (customEvs.length) {
    if (hasContent) html += `<hr style="border:none;border-top:1px solid var(--color-border);margin:12px 0;">`;
    html += `<div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-muted);margin-bottom:8px;">Eventos de la comunidad</div>`;
    customEvs.forEach(ev => {
      html += `<div class="cal-ev-item" id="calev-${ev.id}">
        ${_calIsAdmin ? `<button class="cal-ev-item-del" onclick="deleteCalEv('${ev.id}','${key}',event)" title="Eliminar">✕</button>` : ''}
        <div class="cal-ev-item-title">${ev.titulo}</div>
        ${ev.hora ? `<div class="cal-ev-item-hora">🕐 ${ev.hora}</div>` : ''}
        ${ev.descripcion ? `<div class="cal-ev-item-desc">${ev.descripcion}</div>` : ''}
      </div>`;
    });
    hasContent = true;
  }

  if (_calIsAdmin) {
    html += `<button class="cal-add-btn" onclick="showCalAddForm('${key}')">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      Añadir evento a este día
    </button>
    <div id="cal-add-form-${key}" style="display:none;">
      <div class="cal-add-form">
        <input id="caef-titulo-${key}" placeholder="Título del evento" maxlength="80">
        <input id="caef-hora-${key}" type="time" placeholder="Hora (opcional)">
        <textarea id="caef-desc-${key}" placeholder="Descripción (opcional)" rows="2" style="resize:none;"></textarea>
        <div class="cal-add-form-btns">
          <button onclick="hideCalAddForm('${key}')">Cancelar</button>
          <button class="btn-save" onclick="saveCalEv('${key}')">Guardar</button>
        </div>
      </div>
    </div>`;
  }

  if (!hasContent) {
    html = `<p class="cal-empty">Sin eventos hebreos este día</p>`;
  }

  document.getElementById('cal-side-detail').innerHTML = html;
}

function showCalAddForm(key) {
  document.getElementById(`cal-add-form-${key}`).style.display = '';
}
function hideCalAddForm(key) {
  document.getElementById(`cal-add-form-${key}`).style.display = 'none';
}

async function saveCalEv(key) {
  const titulo = document.getElementById(`caef-titulo-${key}`).value.trim();
  if (!titulo) { alert('Escribe un título'); return; }
  const hora  = document.getElementById(`caef-hora-${key}`).value || null;
  const desc  = document.getElementById(`caef-desc-${key}`).value.trim() || null;

  const newEv = { fecha: key, titulo, hora, descripcion: desc, tipo: 'comunidad' };

  const sb = typeof getSupabase === 'function' ? getSupabase() : null;
  if (sb) {
    const { data, error } = await sb.from('calendario_eventos').insert(newEv).select().single();
    if (error) { alert('Error: ' + error.message); return; }
    if (data) newEv.id = data.id;
  } else {
    newEv.id = 'local-' + Date.now();
  }

  if (!customEventsMap[key]) customEventsMap[key] = [];
  customEventsMap[key].push(newEv);
  renderCal();
  selectDate(key);
  if (typeof showToast === 'function') showToast('Evento añadido — todos lo verán', 'success');
}

async function deleteCalEv(id, key, e) {
  e.stopPropagation();
  const sb = typeof getSupabase === 'function' ? getSupabase() : null;
  if (sb) { try { await sb.from('calendario_eventos').delete().eq('id', id); } catch(_) {} }
  if (customEventsMap[key]) customEventsMap[key] = customEventsMap[key].filter(ev => ev.id !== id);
  renderCal();
  selectDate(key);
  if (typeof showToast === 'function') showToast('Evento eliminado', 'success');
}

async function navMonth(delta) {
  curMonth += delta;
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }

  // Si cambia el año, recargar datos
  if (curYear !== loadedYear) {
    document.getElementById('cal-container').innerHTML = `
      <div class="loading-state"><div class="loading-spinner"></div><p>Cargando calendario…</p></div>`;
    try { await ensureData(curYear); await loadCustomEvents(curYear, curMonth); } catch(e) { showError(); return; }
  }
  selectedDate = null;
  renderCal();
}

function showError() {
  document.getElementById('cal-container').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:var(--color-text-muted)">
      <div style="font-size:2rem;margin-bottom:12px">📡</div>
      <p>No se pudo cargar el calendario.<br>Verifica tu conexión a internet.</p>
    </div>`;
}

/* ─── Init ─── */
document.addEventListener('DOMContentLoaded', async () => {
  requireAuth();
  initNav('calendario');
  try {
    await ensureData(curYear);
    await loadCustomEvents(curYear, curMonth);
    renderCal();
  } catch(e) {
    showError();
  }
});
</script>
