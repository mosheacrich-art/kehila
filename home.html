<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kehilá — Inicio</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    /* ─── Layout principal ─── */
    .main-content {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      background: var(--color-bg);
    }

    @media (max-width: 768px) {
      .main-content { margin-left: 0; }
    }

    .home-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 32px 40px;
    }

    @media (max-width: 768px) {
      .home-inner { padding: 20px 16px 88px; }
    }

    /* ─── 1. Header personalizado ─── */
    .home-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    .home-greeting-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-gold-dark);
      margin-bottom: 4px;
    }

    .home-greeting {
      font-family: var(--font-brand);
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.15;
      margin-bottom: 4px;
    }

    .home-greeting .name-accent {
      color: var(--color-primary);
    }

    .home-date {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .home-date .dot {
      width: 3px;
      height: 3px;
      background: var(--color-gold);
      border-radius: 50%;
      display: inline-block;
    }

    /* Tarjeta de horarios */
    .tefila-card {
      background: var(--color-primary);
      color: var(--color-white);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 14px 18px;
      min-width: 192px;
      flex-shrink: 0;
    }

    .tefila-card-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .tefila-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .tefila-row + .tefila-row {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .tefila-name {
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.7);
    }

    .tefila-time {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--color-gold);
      font-family: var(--font-brand);
    }

    @media (max-width: 600px) {
      .home-header { flex-direction: column; }
      .tefila-card { width: 100%; min-width: unset; }
      .home-greeting { font-size: 1.6rem; }
    }

    /* ─── 2. Banner carousel ─── */
    .banner-carousel {
      position: relative;
      height: 320px;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 24px;
      background: #1a1a2e;
    }
    @media (max-width: 768px) { .banner-carousel { height: 240px; } }
    @media (max-width: 480px) { .banner-carousel { height: 200px; border-radius: var(--radius-sm); } }

    .banner-slides {
      display: flex;
      height: 100%;
      transition: transform 0.5s ease;
    }

    .banner-slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .banner-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .banner-slide-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }

    .banner-slide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.2) 70%, transparent 100%);
      display: flex;
      align-items: flex-end;
      padding: 28px 28px;
      gap: 0;
    }

    .banner-slide-text {
      color: #fff;
      max-width: 75%;
    }

    .banner-slide-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    .banner-slide-subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
      margin-top: 6px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      line-height: 1.4;
      max-width: 420px;
    }

    .banner-dots {
      position: absolute;
      bottom: 7px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
    }

    .banner-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: background 0.25s, width 0.25s;
    }

    .banner-dot.active {
      background: #fff;
      width: 16px;
      border-radius: 3px;
    }

    .banner-btn-prev,
    .banner-btn-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.18);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .banner-btn-prev:hover, .banner-btn-next:hover { background: rgba(255,255,255,0.32); }
    .banner-btn-prev { left: 8px; }
    .banner-btn-next { right: 8px; }

    .banner-admin-btn {
      position: absolute;
      top: 7px;
      right: 7px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.7rem;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      gap: 4px;
      font-weight: 600;
    }
    .banner-admin-btn:hover { background: rgba(255,255,255,0.28); }

    /* ─── Sección genérica ─── */
    .home-section {
      margin-bottom: 36px;
    }

    .home-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .home-section-title {
      font-size: 1.0625rem;
      font-weight: 700;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .home-section-title svg {
      width: 18px;
      height: 18px;
      color: var(--color-gold);
    }

    .home-section-link {
      font-size: 0.875rem;
      color: var(--color-primary);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color var(--transition-fast);
      text-decoration: none;
      border: none;
      background: none;
      padding: 0;
    }
    .home-section-link:hover { color: var(--color-gold-dark); }

    /* ─── 3. Grid módulos ─── */
    .modules-grid-home {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .modules-grid-home .module-card {
      min-height: 72px;
      padding: 10px 8px;
      gap: 5px;
    }
    .modules-grid-home .module-icon { width: 22px; height: 22px; }
    .modules-grid-home .module-label { font-size: 0.68rem; }

    /* ─── 4. Eventos cards (scroll horizontal) ─── */
    .eventos-scroll {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .eventos-scroll::-webkit-scrollbar { display: none; }

    .evento-home-card {
      flex: 0 0 268px;
      background: var(--color-white);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      overflow: hidden;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      display: flex;
      flex-direction: column;
    }

    .evento-home-card:hover {
      border-color: #c0c7d4;
      box-shadow: var(--shadow-md);
    }

    .evento-home-thumb {
      height: 72px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      font-size: 2rem;
      position: relative;
    }

    .evento-home-date-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      min-width: 48px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .evento-home-day {
      font-family: var(--font-brand);
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--color-white);
      line-height: 1;
    }

    .evento-home-month {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.8);
    }

    .evento-home-emoji {
      font-size: 2.2rem;
      line-height: 1;
    }

    .evento-home-body {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .evento-home-cat {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-gold-dark);
    }

    .evento-home-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.35;
    }

    .evento-home-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.775rem;
      color: var(--color-text-muted);
    }

    .evento-home-meta svg {
      width: 12px;
      height: 12px;
      color: var(--color-text-light);
      flex-shrink: 0;
    }

    .evento-home-footer {
      padding: 10px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .plazas-badge {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 2px 7px;
      border-radius: var(--radius-xs);
    }

    .plazas-badge.libre { background: var(--color-success-light); color: #065F46; }
    .plazas-badge.lleno { background: var(--color-danger-light); color: #991B1B; }
    .plazas-badge.pocas { background: var(--color-warning-light); color: #92400E; }

    /* ─── 5. Noticias ─── */
    .noticias-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .noticia-home-card {
      background: var(--color-white);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      cursor: pointer;
      transition: border-color var(--transition-fast);
      text-decoration: none;
      color: inherit;
    }

    .noticia-home-card:hover {
      border-color: #c0c7d4;
    }

    .noticia-home-card.destacada {
      flex-direction: column;
      gap: 10px;
    }

    .noticia-home-thumb {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      background: var(--color-gold-light);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .noticia-home-thumb.big {
      width: 100%;
      height: 120px;
      border-radius: var(--radius-sm);
      font-size: 3rem;
    }

    .noticia-home-content { flex: 1; min-width: 0; }

    .noticia-home-cat {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-gold-dark);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .noticia-home-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .noticia-home-card.destacada .noticia-home-title {
      font-size: 1.05rem;
    }

    .noticia-home-excerpt {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      line-height: 1.5;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .noticia-home-date {
      font-size: 0.725rem;
      color: var(--color-text-light);
    }

    .noticia-pinned-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--color-gold-light);
      color: var(--color-gold-dark);
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: var(--radius-xs);
    }

    /* ─── 6. Card Shabat ─── */
    .shabat-card {
      background: var(--color-primary);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      color: var(--color-white);
      position: relative;
      overflow: hidden;
    }

    .shabat-card::before {
      content: '';
      position: absolute;
      right: -30px;
      top: -30px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.035);
      pointer-events: none;
    }
    .shabat-card::after {
      content: '';
      position: absolute;
      right: 60px;
      bottom: -50px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.025);
      pointer-events: none;
    }

    .shabat-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    .shabat-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-gold);
      margin-bottom: 4px;
    }

    .shabat-parasha {
      font-family: var(--font-brand);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-white);
      line-height: 1.2;
    }

    .shabat-parasha-he {
      display: block;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    .shabat-horarios {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .shabat-horario-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .shabat-horario-label {
      font-size: 0.675rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .shabat-horario-time {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-gold);
      font-family: var(--font-brand);
    }

    .shabat-horario-day {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }

    .shabat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    @media (max-width: 600px) {
      .shabat-card { padding: 22px 20px; }
      .shabat-card-top { flex-direction: column; gap: 12px; }
      .shabat-horarios { gap: 16px; }
      .shabat-horario-time { font-size: 1.1rem; }
    }

    /* ─── Dropdown perfil ─── */
    .user-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--color-white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--color-border);
      min-width: 200px;
      z-index: 200;
      overflow: hidden;
      animation: dropIn 0.18s ease;
    }

    .user-dropdown.hidden { display: none; }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Colores de fondo evento ─── */
    .ev-bg-0, .ev-bg-1, .ev-bg-2, .ev-bg-3, .ev-bg-4, .ev-bg-5 {
      background: var(--color-primary);
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kehilá">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>

  <!-- Sidebar placeholder -->
  <div id="sidebar-placeholder"></div>

  <!-- Contenido principal -->
  <div class="main-content">
    <div class="home-inner">

      <!-- ══════════════════════════════════
           1. HEADER PERSONALIZADO
      ══════════════════════════════════ -->
      <div class="home-header">
        <div>
          <p class="home-greeting-label">שלום</p>
          <h1 class="home-greeting">
            ¡Boker tov, <span class="name-accent" id="greeting-name">Amigo</span>!
          </h1>
          <p class="home-date" id="home-date-display">
            Cargando fecha...
          </p>
        </div>

        <div class="tefila-card" id="tefila-horarios-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <p class="tefila-card-label" style="margin:0;" data-i18n="home_sinagoga">Hoy en la sinagoga</p>
            <button id="btn-edit-horarios" onclick="abrirEditHorarios()" style="display:none;background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--color-text-muted);transition:color 0.15s;" title="Editar horarios">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/></svg>
            </button>
          </div>
          <div id="horarios-rows">
            <div class="tefila-row"><span class="tefila-name">Shajarit</span><span class="tefila-time">07:30</span></div>
            <div class="tefila-row"><span class="tefila-name">Minjá</span><span class="tefila-time">19:30</span></div>
            <div class="tefila-row"><span class="tefila-name">Entrada Shabat</span><span class="tefila-time">19:42</span></div>
          </div>
        </div>
      </div>

      <!-- ══════════════════════════════════
           2. BANNER CAROUSEL
      ══════════════════════════════════ -->
      <div class="banner-carousel" id="banner-carousel">
        <div class="banner-slides" id="banner-slides-track"></div>
        <div class="banner-dots" id="banner-dots"></div>
        <button class="banner-btn-prev" id="banner-prev" aria-label="Anterior">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
        </button>
        <button class="banner-btn-next" id="banner-next" aria-label="Siguiente">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
        </button>
        <button class="banner-admin-btn" id="banner-admin-btn">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/></svg>
          <span data-i18n="home_banner_manage">Gestionar</span>
        </button>
      </div>

      <!-- ══════════════════════════════════
           3. ACCESOS RÁPIDOS
      ══════════════════════════════════ -->
      <div class="home-section">
        <div class="home-section-header">
          <h2 class="home-section-title">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">

    /* ─── Fecha ─── */
    (function renderDate() {
      const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
      const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      const hoy = new Date();
      const diaNombre = dias[hoy.getDay()];
      const dia = hoy.getDate();
      const mes = meses[hoy.getMonth()];
      const año = hoy.getFullYear();

      // Fecha hebrea aproximada (mock para el prototipo)
      const fechaHebrea = '25 Adar 5785';

      const el = document.getElementById('home-date-display');
      el.innerHTML = `${diaNombre}, ${dia} de ${mes} de ${año} <span class="dot"></span> ${fechaHebrea}`;
    })();

    /* ─── Renderizar eventos ─── */
    const bgClasses = ['ev-bg-0','ev-bg-1','ev-bg-2','ev-bg-3','ev-bg-4','ev-bg-5'];
    const mesesCortos = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    function renderEventos() {
      const container = document.getElementById('eventos-container');
      const eventos = MOCK_EVENTOS.slice(0, 4);

      container.innerHTML = eventos.map((ev, i) => {
        const fecha = new Date(ev.fecha + 'T00:00:00');
        const dia = fecha.getDate();
        const mes = mesesCortos[fecha.getMonth()];
        const plazasLibres = ev.aforo - ev.inscritos;
        const lleno = plazasLibres === 0;
        const pocas = plazasLibres > 0 && plazasLibres <= 5;

        let plazasClass = 'libre';
        let plazasText = `${plazasLibres} plazas libres`;
        if (lleno) { plazasClass = 'lleno'; plazasText = 'Completo'; }
        else if (pocas) { plazasClass = 'pocas'; plazasText = `¡Solo ${plazasLibres} plazas!`; }

        const _lleno_txt = lleno ? (typeof t === 'function' ? t('ev_completo') : 'Completo') : (typeof t === 'function' ? t('inscribirse') : 'Inscribirse');
        const _plazas_lleno = typeof t === 'function' ? t('ev_completo') : 'Completo';
        const _plazas_pocas = typeof t === 'function' ? t('ev_pocas').replace('{n}', plazasLibres) : `¡Solo ${plazasLibres} plazas!`;
        const _plazas_libre = typeof t === 'function' ? t('ev_plazas').replace('{n}', plazasLibres) : `${plazasLibres} plazas libres`;
        if (lleno) plazasText = _plazas_lleno;
        else if (pocas) plazasText = _plazas_pocas;
        else plazasText = _plazas_libre;

        return `
          <div class="evento-home-card">
            <div class="evento-home-thumb ${bgClasses[i % bgClasses.length]}">
              <div class="evento-home-date-block">
                <span class="evento-home-day">${dia}</span>
                <span class="evento-home-month">${mes}</span>
              </div>
            </div>
            <div class="evento-home-body">
              <span class="evento-home-cat">${ev.categoria}</span>
              <p class="evento-home-title">${ev.titulo}</p>
              <div class="evento-home-meta">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                </svg>
                ${ev.hora}
              </div>
              <div class="evento-home-meta">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
                </svg>
                ${ev.lugar.split(',')[0]}
              </div>
            </div>
            <div class="evento-home-footer">
              <span class="plazas-badge ${plazasClass}">${plazasText}</span>
              <button
                class="btn btn-primary btn-sm"
                ${lleno ? 'disabled' : ''}
                onclick="inscribirse('${ev.id}', '${ev.titulo.replace(/'/g, "\\'")}', ${lleno})"
              >
                ${_lleno_txt}
              </button>
            </div>
          </div>`;
      }).join('');
    }

        return `

    /* ══════════════════════════════════════
       BANNER CAROUSEL
    ══════════════════════════════════════ */
    const BANNER_FALLBACK = [
      { imagen_url: '', titulo: 'Bienvenidos a Kehilá', subtitulo: 'Tu comunidad judía en España', color: 'linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)' },
      { imagen_url: '', titulo: 'Próximos eventos', subtitulo: 'Shabat · Clases · Celebraciones', color: 'linear-gradient(135deg,#2d4a22 0%,#3a6b2e 100%)' },
      { imagen_url: '', titulo: 'Tienda Kosher', subtitulo: 'Vinos, productos y más', color: 'linear-gradient(135deg,#5c2d0a 0%,#8b4513 100%)' }
    ];

    let bannerSlides = [];
    let bannerCurrent = 0;
    let bannerTimer = null;

    function buildBannerSlide(s) {
      const slide = document.createElement('div');
      slide.className = 'banner-slide';
      if (s.href) slide.style.cursor = 'pointer';
      if (s.href) slide.addEventListener('click', () => { window.location.href = s.href; });

      if (s.imagen_url) {
        slide.innerHTML = `
          <img src="${s.imagen_url}" alt="${s.titulo || ''}" loading="lazy" onerror="this.style.display='none'">
          <div class="banner-slide-overlay">
            <div class="banner-slide-text">
              ${s._cat ? `<div style="font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:6px;">${s._cat}</div>` : ''}
              ${s.titulo ? `<div class="banner-slide-title">${s.titulo}</div>` : ''}
              ${s.subtitulo ? `<div class="banner-slide-subtitle">${s.subtitulo}</div>` : ''}
            </div>
          </div>`;
      } else {
        slide.innerHTML = `
          <div class="banner-slide-placeholder" style="background:${s.color || '#1a1a2e'}">
            <div class="banner-slide-overlay" style="background:none;padding:0 20px;">
              <div class="banner-slide-text">
                ${s._cat ? `<div style="font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:6px;">${s._cat}</div>` : ''}
                ${s.titulo ? `<div class="banner-slide-title">${s.titulo}</div>` : ''}
                ${s.subtitulo ? `<div class="banner-slide-subtitle">${s.subtitulo}</div>` : ''}
              </div>
            </div>
          </div>`;
      }
      return slide;
    }

    function bannerGoTo(idx) {
      bannerCurrent = (idx + bannerSlides.length) % bannerSlides.length;
      document.getElementById('banner-slides-track').style.transform = `translateX(-${bannerCurrent * 100}%)`;
      document.querySelectorAll('.banner-dot').forEach((d, i) => d.classList.toggle('active', i === bannerCurrent));
    }

    function startBannerTimer() {
      clearInterval(bannerTimer);
      if (bannerSlides.length > 1) bannerTimer = setInterval(() => bannerGoTo(bannerCurrent + 1), 10000);
    }

    function renderBanner(slides) {
      bannerSlides = slides;
      const track = document.getElementById('banner-slides-track');
      const dots = document.getElementById('banner-dots');
      track.innerHTML = '';
      dots.innerHTML = '';

      if (!slides.length) return;

      slides.forEach((s, i) => {
        track.appendChild(buildBannerSlide(s));
        const dot = document.createElement('button');
        dot.className = 'banner-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', 'Slide ' + (i + 1));
        dot.addEventListener('click', () => { bannerGoTo(i); startBannerTimer(); });
        dots.appendChild(dot);
      });

      document.getElementById('banner-prev').addEventListener('click', () => { bannerGoTo(bannerCurrent - 1); startBannerTimer(); });
      document.getElementById('banner-next').addEventListener('click', () => { bannerGoTo(bannerCurrent + 1); startBannerTimer(); });

      bannerGoTo(0);
      startBannerTimer();
    }

    function getNoticiaSlides() {
      const catColors = {
        'Kashrut':   'linear-gradient(135deg,#1a3a1a 0%,#2d5a2d 100%)',
        'Comunidad': 'linear-gradient(135deg,#1a1a3a 0%,#2d2d6e 100%)',
        'España':    'linear-gradient(135deg,#3a1a1a 0%,#8b1a1a 100%)',
        'Cultura':   'linear-gradient(135deg,#1a2a3a 0%,#1a4a6e 100%)',
        'Calendario':'linear-gradient(135deg,#2a1a3a 0%,#5a1a8e 100%)',
      };
      return (typeof MOCK_NOTICIAS !== 'undefined' ? MOCK_NOTICIAS : []).map(n => ({
        imagen_url: '',
        titulo: n.titulo,
        subtitulo: n.resumen,
        color: catColors[n.categoria] || 'linear-gradient(135deg,#1a202c 0%,#2d3748 100%)',
        _cat: n.categoria,
        href: 'noticias.html'
      }));
    }

    async function loadBanner() {
      const sb = typeof getSupabase === 'function' ? getSupabase() : null;
      if (user && user.role === 'admin') {
        const btn = document.getElementById('banner-admin-btn');
        if (btn) btn.style.display = 'flex';
      }
      const noticiaSlides = getNoticiaSlides();
      if (!sb) { renderBanner([...BANNER_FALLBACK, ...noticiaSlides]); return; }
      try {
        const { data, error } = await sb.from('banner_slides').select('*').eq('activo', true).order('orden');
        const dbSlides = data?.length ? data : BANNER_FALLBACK;
        renderBanner([...dbSlides, ...noticiaSlides]);
      } catch(e) { renderBanner([...BANNER_FALLBACK, ...noticiaSlides]); }
    }

    /* ── Admin: gestionar slides ── */

        const { data } = await sb.from('banner_slides').select('*').order('orden');

          <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee;" data-id="${s.id}">
            ${s.imagen_url ? `<img src="${s.imagen_url}" style="width:60px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0;" onerror="this.style.display='none'">` : `<div style="width:60px;height:36px;border-radius:6px;background:#eee;flex-shrink:0;"></div>`}

              <div style="font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.titulo || '(sin título)'}</div>
              <div style="font-size:0.75rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.imagen_url || 'Sin imagen'}</div>
            </div>
            <button onclick="deleteBannerSlide('${s.id}')" style="background:none;border:none;cursor:pointer;color:#e55;font-size:1rem;flex-shrink:0;" title="Eliminar">🗑</button>
          </div>`).join('') || '<p style="color:#aaa;font-size:0.85rem;text-align:center;padding:16px 0;">No hay slides todavía</p>';

      overlay.id = 'banner-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;';
      overlay.innerHTML = `

            <button onclick="document.getElementById('banner-overlay').remove()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:#888;">✕</button>
          </div>

            <div id="banner-list-container" style="margin-bottom:20px;"></div>

              <input id="bnew-subtitulo" placeholder="Subtítulo (opcional)" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:0.88rem;font-family:inherit;outline:none;margin-bottom:8px;box-sizing:border-box;">

      await sb.from('banner_slides').delete().eq('id', id);

      document.querySelector(`[data-id="${id}"]`)?.remove();
      loadBanner();

      const container = document.getElementById('horarios-rows');
      if (!container) return;
      container.innerHTML = items.map(it =>
        `<div class="tefila-row">
           <span class="tefila-name">${it.nombre}</span>
           <span class="tefila-time">${it.hora}</span>

      // Mostrar botón de edición si es admin
      if (user && user.role === 'admin') {

      }

      const sb = getSupabase();
      if (!sb) return; // usa los valores por defecto del HTML

      try {
        const { data, error } = await sb
          .from('horarios')
          .select('items')
          .eq('id', 'sinagoga')
          .single();

        if (!error && data?.items?.length) {
          renderHorarios(data.items);
        }
      } catch (e) {
        console.warn('horarios: usando valores por defecto');
      }
    }

    async function guardarHorarios(items) {
      const sb = getSupabase();
      if (!sb) { showToast('Sin conexión a internet', 'error'); return false; }

      const { error } = await sb
        .from('horarios')
        .upsert({ id: 'sinagoga', items, updated_by: user?.name || 'admin' },
                 { onConflict: 'id' });

      if (error) { showToast('Error al guardar: ' + error.message, 'error'); return false; }
      return true;
    }

      "Nitzavim-Vayeilech":"Nitsavim-Vayelej","Ha'azinu":"Haaziní","Vezot Haberakhah":"Vezot Habrajá"
    };

    async function loadShabatCard() {
      try {
        const cityKey = localStorage.getItem('kehila_city') || 'madrid';
        const city = SHABAT_CITIES[cityKey] || SHABAT_CITIES['madrid'];

        const today = new Date();
        const year  = today.getFullYear();
        const month = today.getMonth() + 1;

        // Pedir mes actual y el siguiente para cubrir fin de mes
        const fetchMonth = async (m, y) => {
          const url = `https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=off&nx=off&year=${y}&month=${m}&ss=on&mf=off&c=on&geo=pos&latitude=${city.lat}&longitude=${city.lon}&tzid=${encodeURIComponent(city.tz)}&m=${city.m}&b=${city.b}&s=on&lg=s`;
          const r = await fetch(url);
          return (await r.json()).items || [];
        };

        const nextMonth = month === 12 ? 1 : month + 1;
        const nextYear  = month === 12 ? year + 1 : year;
        const [items1, items2] = await Promise.all([
          fetchMonth(month, year),
          fetchMonth(nextMonth, nextYear)
        ]);
        const items = [...items1, ...items2];

        // Buscar el próximo encendido de velas (desde hoy)
        const todayStr = today.toISOString().slice(0, 10);
        let candles = null, havdala = null, parasha = null;

        for (const item of items) {
          const dateStr = item.date.slice(0, 10);
          if (dateStr < todayStr) continue;
          if (!candles  && item.category === 'candles')  candles  = item;
          if (!havdala  && item.category === 'havdalah') havdala  = item;
          if (!parasha  && item.category === 'parashat') parasha  = item;
          if (candles && havdala && parasha) break;
        }

        const fmtTime = iso => new Date(iso).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', timeZone: city.tz });
        const fmtDay  = iso => {
          const d = new Date(iso);
          const dias  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
          const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
          return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
        };

        // Parasha
        if (parasha) {
          const raw = parasha.title.replace(/^Parashat\s+/,'').replace(/^Parasha\s+/,'');
          const es  = SHABAT_PARASHA[raw] || raw;
          const he  = parasha.hebrew || '';
          document.getElementById('shabat-parasha').childNodes[0].textContent = 'Parashat ' + es + ' ';
          document.getElementById('shabat-parasha-he').textContent = he;
        }

        // Encendido
        if (candles) {
          document.getElementById('shabat-velas-time').textContent = fmtTime(candles.date);
          document.getElementById('shabat-velas-day').textContent  = fmtDay(candles.date);
        }

        // Havdalá
        if (havdala) {
          document.getElementById('shabat-havdala-time').textContent = fmtTime(havdala.date);
          document.getElementById('shabat-havdala-day').textContent  = fmtDay(havdala.date);
        }

        // Ciudad
        const lat = city.lat;
        const coords = `${Math.abs(lat).toFixed(2)}°${lat >= 0 ? 'N' : 'S'}`;
        document.getElementById('shabat-ciudad-name').textContent   = city.name;
        document.getElementById('shabat-ciudad-coords').textContent = coords;

      } catch(e) {
        console.warn('Shabat card: error cargando datos', e);
      }
    }
