<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabad Barcelona — Professionals</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; background: var(--color-bg); }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }
    body.in-iframe .main-content { margin-left: 0 !important; }
    body.in-iframe .page-inner { padding-top: 16px; }

    .page-inner { max-width: 1100px; margin: 0 auto; padding: 32px 32px 80px; }
    @media (max-width: 768px) { .page-inner { padding: 20px 16px 88px; } }

    /* Filtros */
    .filters-bar { background: var(--color-white); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 20px; display: flex; gap: 12px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; box-shadow: var(--shadow-sm); }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--color-text-muted); pointer-events: none; }
    .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 0.875rem; color: var(--color-text); background: var(--color-bg); outline: none; transition: border-color var(--transition-fast); }
    .search-wrap input:focus { border-color: var(--color-primary); background: #fff; }
    .filter-select { padding: 9px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 0.875rem; color: var(--color-text); background: var(--color-bg); outline: none; cursor: pointer; }
    .filter-select:focus { border-color: var(--color-primary); }

    /* Grid profesionales */
    .professionals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 900px) { .professionals-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .professionals-grid { grid-template-columns: 1fr; } }

    .prof-card { background: var(--color-white); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 24px 20px 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow-sm); transition: box-shadow var(--transition-fast), transform var(--transition-fast); }
    .prof-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .prof-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-brand); font-size: 1.4rem; font-weight: 700; color: white; margin: 0 auto 4px; flex-shrink: 0; }
    .prof-avatar[data-color="0"] { background: #1B2E5E; }
    .prof-avatar[data-color="1"] { background: #2A6049; }
    .prof-avatar[data-color="2"] { background: #7B3F00; }
    .prof-avatar[data-color="3"] { background: #1A4A6E; }
    .prof-avatar[data-color="4"] { background: #4A1A6E; }
    .prof-avatar[data-color="5"] { background: #6E1A1A; }
    .prof-avatar[data-color="6"] { background: #1A5C38; }
    .prof-avatar[data-color="7"] { background: #4A4A00; }

    .prof-name { font-size: 1rem; font-weight: 700; color: var(--color-text); text-align: center; }
    .prof-badge-main { display: inline-block; background: var(--color-gold-light); color: var(--color-gold-dark); font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-full); text-align: center; }
    .prof-bio { font-size: 0.8rem; color: var(--color-text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .prof-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 0.75rem; color: var(--color-text-muted); }
    .prof-meta-item { display: flex; align-items: center; gap: 4px; }
    .prof-meta-item svg { width: 12px; height: 12px; }
    .prof-langs { display: flex; gap: 4px; flex-wrap: wrap; }
    .lang-pill { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-full); padding: 2px 8px; font-size: 0.68rem; font-weight: 600; color: var(--color-text-muted); }
    .prof-rating { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; font-weight: 600; color: var(--color-text); }
    .stars { display: flex; gap: 1px; }
    .star-full { color: #F59E0B; font-size: 0.85rem; }
    .prof-price { font-size: 0.8rem; color: var(--color-text-muted); }
    .prof-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-outline-primary { flex: 1; padding: 8px 10px; border: 1.5px solid var(--color-primary); border-radius: var(--radius-sm); background: transparent; color: var(--color-primary); font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all var(--transition-fast); }
    .btn-outline-primary:hover { background: var(--color-primary); color: white; }
    .btn-gold { flex: 1; padding: 8px 10px; border: none; border-radius: var(--radius-sm); background: var(--color-gold); color: var(--color-primary-dark); font-family: var(--font-ui); font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: opacity var(--transition-fast); }
    .btn-gold:hover { opacity: 0.9; }
    .no-results { text-align: center; padding: 60px 20px; color: var(--color-text-muted); grid-column: 1/-1; }
    .no-results svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: 0.3; }

    /* Modal base */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: var(--z-overlay); align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: var(--radius-lg); max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl); }
    .modal-header { padding: 24px 24px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; position: sticky; top: 0; background: white; border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding-bottom: 16px; border-bottom: 1px solid var(--color-border); }
    .modal-title { font-family: var(--font-brand); font-size: 1.25rem; font-weight: 700; color: var(--color-primary); }
    .modal-close { width: 32px; height: 32px; border: none; background: var(--color-bg); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--color-text-muted); flex-shrink: 0; transition: background var(--transition-fast); }
    .modal-close:hover { background: var(--color-border); }
    .modal-body { padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* Modal perfil */
    .prof-modal-avatar { width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-brand); font-size: 1.8rem; font-weight: 700; color: white; margin: 0 auto; }
    .prof-modal-avatar[data-color="0"] { background: #1B2E5E; }
    .prof-modal-avatar[data-color="1"] { background: #2A6049; }
    .prof-modal-avatar[data-color="2"] { background: #7B3F00; }
    .prof-modal-avatar[data-color="3"] { background: #1A4A6E; }
    .prof-modal-avatar[data-color="4"] { background: #4A1A6E; }
    .prof-modal-avatar[data-color="5"] { background: #6E1A1A; }
    .prof-modal-avatar[data-color="6"] { background: #1A5C38; }
    .prof-modal-avatar[data-color="7"] { background: #4A4A00; }
    .modal-reviews { display: flex; flex-direction: column; gap: 12px; }
    .review-item { background: var(--color-bg); border-radius: var(--radius-sm); padding: 12px 14px; }
    .review-author { font-size: 0.8rem; font-weight: 600; color: var(--color-text); margin-bottom: 4px; }
    .review-text { font-size: 0.8rem; color: var(--color-text-muted); line-height: 1.5; }

    /* Form styles */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.85rem; font-weight: 600; color: var(--color-text); }
    .form-input, .form-select, .form-textarea { padding: 10px 14px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 0.875rem; color: var(--color-text); background: white; outline: none; transition: border-color var(--transition-fast); width: 100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--color-primary); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .char-counter { font-size: 0.75rem; color: var(--color-text-muted); text-align: right; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .checkboxes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
    .checkbox-item input { cursor: pointer; }
    .btn-primary-full { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--color-primary); color: white; font-family: var(--font-ui); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background var(--transition-fast); }
    .btn-primary-full:hover { background: var(--color-primary-dark); }
    .btn-gold-full { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--color-gold); color: var(--color-primary-dark); font-family: var(--font-ui); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity var(--transition-fast); }
    .btn-gold-full:hover { opacity: 0.9; }
    .section-divider { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); padding-bottom: 8px; }

    /* ── Formulario publicar perfil ── */
    .prof-form-wrap { display:flex; flex-direction:column; gap:0; }
    .form-section { background:var(--color-white); border:1.5px solid var(--color-border); border-radius:var(--radius-md); padding:24px; margin-bottom:16px; }
    .form-section-title { font-size:1rem; font-weight:700; color:var(--color-primary); margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .form-section-title::before { content:''; display:block; width:4px; height:18px; background:var(--color-gold); border-radius:2px; }
    .form-row { display:flex; gap:16px; }
    @media(max-width:600px){ .form-row { flex-direction:column; } }
    .form-group { display:flex; flex-direction:column; gap:6px; flex:1; margin-bottom:14px; }
    .form-group:last-child { margin-bottom:0; }
    .form-label { font-size:.8125rem; font-weight:600; color:var(--color-text); }
    .form-label span { color:var(--color-danger); margin-left:2px; }
    .form-input, .form-select, .form-textarea { padding:10px 13px; border:1.5px solid var(--color-border); border-radius:var(--radius-sm); font-size:.875rem; color:var(--color-text); background:var(--color-white); font-family:var(--font-ui); outline:none; transition:border-color var(--transition-fast); width:100%; box-sizing:border-box; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--color-primary); }
    .form-textarea { resize:vertical; min-height:90px; }
    .char-counter { font-size:.75rem; color:var(--color-text-muted); text-align:right; }
    .lang-checks { display:flex; gap:16px; flex-wrap:wrap; margin-top:4px; }
    .lang-check-item { display:flex; align-items:center; gap:6px; font-size:.875rem; cursor:pointer; color:var(--color-text); }
    .mod-radio-group { display:flex; gap:20px; flex-wrap:wrap; margin-top:4px; }
    .mod-radio-item { display:flex; align-items:center; gap:6px; font-size:.875rem; cursor:pointer; color:var(--color-text); }
    .btn-publish-prof { width:100%; padding:14px; background:linear-gradient(135deg,var(--color-primary) 0%,#2A4080 100%); color:#fff; border:none; border-radius:var(--radius-md); font-size:1rem; font-weight:700; cursor:pointer; font-family:var(--font-ui); transition:all var(--transition-fast); box-shadow:var(--shadow-md); margin-top:4px; }
    .btn-publish-prof:hover { transform:translateY(-1px); box-shadow:var(--shadow-lg); }

    /* servicios dinámicos */
    .services-list { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
    .service-row { display:flex; gap:8px; align-items:center; }
    .service-row .svc-name { flex:1; }
    .service-row .svc-price { width:120px; flex-shrink:0; }
    .btn-remove-svc { width:30px; height:30px; border:none; background:var(--color-bg); border-radius:var(--radius-sm); cursor:pointer; color:var(--color-text-muted); font-size:1.1rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background var(--transition-fast); padding:0; }
    .btn-remove-svc:hover { background:#fee2e2; color:#dc2626; }
    .btn-add-svc { padding:8px 14px; border:1.5px dashed var(--color-border); border-radius:var(--radius-sm); background:none; color:var(--color-text-muted); font-family:var(--font-ui); font-size:0.8rem; cursor:pointer; width:100%; margin-top:6px; transition:all var(--transition-fast); }
    .btn-add-svc:hover { border-color:var(--color-primary); color:var(--color-primary); }
    .svc-header { display:flex; gap:8px; margin-bottom:4px; }
    .svc-header span { font-size:0.72rem; font-weight:600; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:.04em; }
    .svc-header .sh-name { flex:1; }
    .svc-header .sh-price { width:120px; flex-shrink:0; }
    .svc-header .sh-gap { width:30px; flex-shrink:0; }

    /* foto perfil upload */
    .foto-upload-box { width:80px; height:80px; border:2px dashed var(--color-border); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; background:var(--color-bg); overflow:hidden; flex-shrink:0; transition:border-color var(--transition-fast); }
    .foto-upload-box:hover { border-color:var(--color-primary); }
    .foto-upload-box img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jabad Barcelona">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="page-inner">

      <!-- Filtros + botón publicar -->
      <div class="filters-bar">
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar por nombre o especialidad..." oninput="renderProfessionals()">
        </div>
        <select class="filter-select" id="filterCat" onchange="renderProfessionals()">
          <option value="">Todas las categorías</option>
          <option>Profesor Bar Mitzvá</option>
          <option>Profesor de Hebreo</option>
          <option>Mohel</option>
          <option>Sofer STaM</option>
          <option>Shojet</option>
          <option>Profesor Torah adultos</option>
          <option>Tutor académico</option>
          <option>Orientador espiritual</option>
          <option>Músico/Jazán</option>
          <option>Fotógrafo smajot</option>
        </select>
        <select class="filter-select" id="filterCiudad" onchange="renderProfessionals()">
          <option value="">Todas las ciudades</option>
          <option>Madrid</option>
          <option>Barcelona</option>
          <option>Online</option>
        </select>
        <select class="filter-select" id="filterMod" onchange="renderProfessionals()">
          <option value="">Toda modalidad</option>
          <option>Presencial</option>
          <option>Online</option>
          <option>Ambos</option>
        </select>
        <button class="btn-gold" style="white-space:nowrap;padding:9px 16px;border-radius:var(--radius-sm);font-size:0.875rem;flex-shrink:0;" onclick="openOfrecerModal()">
          + Ofrecer mis servicios
        </button>
      </div>

      <!-- Grid -->
      <div class="professionals-grid" id="profGrid"></div>

    </div>
  </div>

  <!-- Modal: Ver Perfil -->
  <div class="modal-overlay" id="modalPerfil">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="perfilTitle">Perfil profesional</span>
        <button class="modal-close" onclick="closeModal('modalPerfil')">×</button>
      </div>
      <div class="modal-body" id="perfilBody"></div>
    </div>
  </div>

  <!-- Modal: Solicitar Sesión -->
  <div class="modal-overlay" id="modalSesion">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="sesionTitle">Solicitar sesión</span>
        <button class="modal-close" onclick="closeModal('modalSesion')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Tipo de servicio</label>
          <select class="form-select" id="sesionTipo">
            <option>Clase individual</option>
            <option>Consulta puntual</option>
            <option>Sesión de orientación</option>
            <option>Evento / smajá</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Modalidad</label>
          <div style="display:flex;gap:16px;">
            <label class="checkbox-item"><input type="radio" name="sesionMod" value="Presencial" checked> Presencial</label>
            <label class="checkbox-item"><input type="radio" name="sesionMod" value="Online"> Online</label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Fecha preferida</label>
            <input type="date" class="form-input" id="sesionFecha">
          </div>
          <div class="form-group">
            <label class="form-label">Hora preferida</label>
            <select class="form-select" id="sesionHora">
              <option>09:00</option><option>09:30</option><option>10:00</option><option>10:30</option>
              <option>11:00</option><option>11:30</option><option>12:00</option><option>16:00</option>
              <option>16:30</option><option>17:00</option><option>17:30</option><option>18:00</option>
              <option>18:30</option><option>19:00</option><option>19:30</option><option>20:00</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mensaje para el profesional</label>
          <textarea class="form-textarea" id="sesionMensaje" placeholder="Cuéntale brevemente lo que necesitas, tu nivel actual, o cualquier detalle relevante..." maxlength="500"></textarea>
        </div>
        <button class="btn-gold-full" onclick="enviarSolicitud()">Enviar solicitud</button>
      </div>
    </div>
  </div>

  <!-- Modal: Ofrecer servicios -->
  <div class="modal-overlay" id="modalOfrecer">
    <div class="modal" style="max-width:640px">
      <div class="modal-header">
        <span class="modal-title">Publica tu perfil profesional</span>
        <button class="modal-close" onclick="closeModal('modalOfrecer')">×</button>
      </div>
      <div class="modal-body" style="padding:20px 24px 24px">
        <div class="prof-form-wrap">

          <!-- Identificación -->
          <div class="form-section">
            <div class="form-section-title">Identificación</div>
            <div style="display:flex;gap:16px;align-items:flex-start">
              <div style="flex-shrink:0">
                <div class="foto-upload-box" id="prof-upload-area" onclick="document.getElementById('prof-img-file').click()">
                  <div id="prof-img-ph" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:24px;height:24px;color:var(--color-text-muted)"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
                    <span style="font-size:0.62rem;color:var(--color-text-muted);text-align:center;line-height:1.3">Foto<br>perfil</span>
                  </div>
                  <div id="prof-img-filled" style="display:none;position:relative;width:100%;height:100%">
                    <img id="prof-img-preview" style="width:100%;height:100%;object-fit:cover;border-radius:50%">
                    <button type="button" onclick="event.stopPropagation();clearProfImg()" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;line-height:18px;text-align:center;padding:0">&times;</button>
                  </div>
                </div>
                <input type="file" id="prof-img-file" accept="image/*" style="display:none">
              </div>
              <div style="flex:1">
                <div class="form-group">
                  <label class="form-label">Categoría <span>*</span></label>
                  <select class="form-select" id="ofrecerCat">
                    <option value="">Selecciona categoría...</option>
                    <option>Profesor Bar/Bat Mitzvá</option>
                    <option>Profesor de Hebreo</option>
                    <option>Mohel</option>
                    <option>Sofer STaM</option>
                    <option>Shojet</option>
                    <option>Profesor Torah adultos</option>
                    <option>Tutor académico</option>
                    <option>Orientador espiritual</option>
                    <option>Músico/Jazán</option>
                    <option>Fotógrafo smajot</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Título profesional</label>
                  <input type="text" class="form-input" id="ofrecerTitulo" placeholder="Ej: Profesor de Hebreo Bíblico">
                </div>
              </div>
            </div>
            <div class="form-row" style="margin-top:4px">
              <div class="form-group">
                <label class="form-label">WhatsApp / Teléfono</label>
                <input type="tel" class="form-input" id="ofrecerTelefono" placeholder="+34 600 000 000">
              </div>
              <div class="form-group">
                <label class="form-label">Email de contacto <span style="font-weight:400;color:var(--color-text-muted)">(opcional)</span></label>
                <input type="email" class="form-input" id="ofrecerEmail" placeholder="tu@email.com">
              </div>
            </div>
          </div>

          <!-- Perfil profesional -->
          <div class="form-section">
            <div class="form-section-title">Perfil profesional</div>
            <div class="form-group">
              <label class="form-label">Biografía <span style="font-weight:400;color:var(--color-text-muted)">(máx. 300 caracteres)</span></label>
              <textarea class="form-textarea" id="ofrecerBio" maxlength="300"
                oninput="document.getElementById('ofrecerBioCount').textContent=this.value.length"
                placeholder="Describe tu experiencia y enfoque profesional..."></textarea>
              <div class="char-counter"><span id="ofrecerBioCount">0</span> / 300</div>
            </div>
            <div class="form-group">
              <label class="form-label">Formación y certificaciones</label>
              <input type="text" class="form-input" id="ofrecerFormacion" placeholder="Ej: Semicha, grado universitario, certificación...">
            </div>
          </div>

          <!-- Datos y tarifas -->
          <div class="form-section">
            <div class="form-section-title">Datos y tarifas</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Años de experiencia</label>
                <input type="number" class="form-input" id="ofrecerExp" min="0" max="50" placeholder="5">
              </div>
              <div class="form-group">
                <label class="form-label">Precio orientativo (tarjeta)</label>
                <input type="text" class="form-input" id="ofrecerPrecio" placeholder="Desde €40/h">
              </div>
            </div>
            <div class="form-group" style="margin-top:4px">
              <label class="form-label">Servicios y tarifas <span style="font-weight:400;color:var(--color-text-muted)">(hasta 6)</span></label>
              <div class="svc-header">
                <span class="sh-name">Servicio</span>
                <span class="sh-price">Precio</span>
                <span class="sh-gap"></span>
              </div>
              <div class="services-list" id="serviciosList">
                <div class="service-row">
                  <input type="text" class="form-input svc-name" placeholder="Ej: Clase individual">
                  <input type="text" class="form-input svc-price" placeholder="40€/h">
                  <button type="button" class="btn-remove-svc" onclick="removeServiceRow(this)">×</button>
                </div>
              </div>
              <button type="button" class="btn-add-svc" onclick="addServiceRow()">+ Añadir servicio</button>
            </div>
          </div>

          <!-- Disponibilidad -->
          <div class="form-section">
            <div class="form-section-title">Disponibilidad</div>
            <div class="form-group">
              <label class="form-label">Idiomas</label>
              <div class="lang-checks">
                <label class="lang-check-item"><input type="checkbox" checked> Español</label>
                <label class="lang-check-item"><input type="checkbox"> Inglés</label>
                <label class="lang-check-item"><input type="checkbox"> Hebreo</label>
                <label class="lang-check-item"><input type="checkbox"> Francés</label>
                <label class="lang-check-item"><input type="checkbox"> Árabe</label>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Modalidad</label>
                <div class="mod-radio-group">
                  <label class="mod-radio-item"><input type="radio" name="ofrecerMod" value="Presencial"> Presencial</label>
                  <label class="mod-radio-item"><input type="radio" name="ofrecerMod" value="Online" checked> Online</label>
                  <label class="mod-radio-item"><input type="radio" name="ofrecerMod" value="Ambos"> Ambos</label>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Ciudad</label>
                <input type="text" class="form-input" id="ofrecerCiudad" placeholder="Ej: Barcelona">
              </div>
            </div>
          </div>

          <button class="btn-publish-prof" onclick="publicarPerfil()">Publicar perfil</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    /* ── Prof photo upload ── */
    document.getElementById('prof-img-file').addEventListener('change', function() {
      var file = this.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('prof-img-preview').src = e.target.result;
        document.getElementById('prof-img-ph').style.display = 'none';
        document.getElementById('prof-img-filled').style.display = 'block';
      };
      reader.readAsDataURL(file);
    });
    function clearProfImg() {
      document.getElementById('prof-img-file').value = '';
      document.getElementById('prof-img-preview').src = '';
      document.getElementById('prof-img-ph').style.display = 'flex';
      document.getElementById('prof-img-filled').style.display = 'none';
    }
    function getProfImg() {
      var img = document.getElementById('prof-img-preview');
      return (img && img.src && img.src.startsWith('data:')) ? img.src : null;
    }

    const PROFESSIONALS_KEY = 'kehila_professionals';

    function loadProfessionals() {
      try { return JSON.parse(localStorage.getItem(PROFESSIONALS_KEY) || '[]'); } catch(e) { return []; }
    }
    function saveProfessionals(list) {
      localStorage.setItem(PROFESSIONALS_KEY, JSON.stringify(list));
    }

    let PROFESSIONALS = loadProfessionals();

    const REVIEWS_MOCK = {
      default: [{ autor:'Miembro comunidad', texto:'Excelente profesional, muy recomendable.' }, { autor:'Usuario verificado', texto:'Muy buena experiencia, volvería a contratar.' }, { autor:'Jabad Barcelona', texto:'Un profesional que aporta mucho a nuestra comunidad.' }]
    };

    let currentProf = null;

    function getStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5 ? 1 : 0;
      let html = '<div class="stars">';
      for (let i = 0; i < full; i++) html += '<span class="star-full">★</span>';
      if (half) html += '<span class="star-full" style="opacity:0.5">★</span>';
      html += '</div>';
      return html;
    }

    function renderProfessionals() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('filterCat').value;
      const ciudad = document.getElementById('filterCiudad').value;
      const mod = document.getElementById('filterMod').value;

      const filtered = PROFESSIONALS.filter(p => {
        const matchQ = !q || p.nombre.toLowerCase().includes(q) || p.especialidad.toLowerCase().includes(q) || p.bio.toLowerCase().includes(q);
        const matchCat = !cat || p.especialidad === cat;
        const matchCiudad = !ciudad || p.ciudad.includes(ciudad);
        const matchMod = !mod || p.modalidad === mod;
        return matchQ && matchCat && matchCiudad && matchMod;
      });

      const grid = document.getElementById('profGrid');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.182 16.318A4.486 4.486 0 0 0 12.016 15a4.486 4.486 0 0 0-3.198 1.318M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z"/></svg><p>No se encontraron profesionales con esos filtros.</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="prof-card">
          ${p.foto ? `<img src="${p.foto}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 4px;display:block;">` : `<div class="prof-avatar" data-color="${p.color}">${p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>`}
          <div class="prof-name">${p.nombre}</div>
          <div style="text-align:center"><span class="prof-badge-main">${p.especialidad}</span></div>
          <p class="prof-bio">${p.bio}</p>
          <div class="prof-meta">
            <span class="prof-meta-item">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
              ${p.ciudad}
            </span>
            <span class="prof-meta-item">· ${p.experiencia} años exp.</span>
            <span style="background:var(--color-info-light);color:var(--color-info);font-size:0.68rem;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);">${p.modalidad}</span>
          </div>
          <div class="prof-langs">${p.idiomas.map(l=>`<span class="lang-pill">${l}</span>`).join('')}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div class="prof-rating">${getStars(p.rating)} ${p.rating} <span style="font-weight:400;color:var(--color-text-muted);font-size:0.75rem">(${p.valoraciones})</span></div>
            <span class="prof-price">${p.precio}</span>
          </div>
          <div class="prof-actions">
            <button class="btn-outline-primary" onclick="openPerfil('${p.id}')">Ver perfil</button>
            <button class="btn-gold" onclick="openSesion('${p.id}')">Contactar</button>
          </div>
        </div>
      `).join('');
    }

    function openPerfil(id) {
      const p = PROFESSIONALS.find(x => x.id === id);
      if (!p) return;
      currentProf = p;
      document.getElementById('perfilTitle').textContent = p.nombre;
      const reviews = REVIEWS_MOCK[id] || REVIEWS_MOCK.default;
      document.getElementById('perfilBody').innerHTML = `
        <div style="text-align:center">
          <div class="prof-modal-avatar" data-color="${p.color}">${p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div style="font-family:var(--font-brand);font-size:1.25rem;font-weight:700;color:var(--color-primary);margin-top:12px">${p.nombre}</div>
          <span class="prof-badge-main" style="margin-top:6px;display:inline-block">${p.especialidad}</span>
        </div>
        <div>
          <div class="section-divider">Sobre mí</div>
          <p style="font-size:0.875rem;color:var(--color-text-muted);line-height:1.6;margin-top:10px">${p.bio}</p>
        </div>
        <div>
          <div class="section-divider">Formación y certificaciones</div>
          <p style="font-size:0.875rem;color:var(--color-text-muted);line-height:1.6;margin-top:10px">${p.formacion}</p>
        </div>
        ${(p.servicios && p.servicios.length) ? `
        <div>
          <div class="section-divider">Servicios y tarifas</div>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">
            ${p.servicios.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--color-bg);border-radius:var(--radius-sm);font-size:0.875rem"><span style="color:var(--color-text)">${s.nombre}</span><span style="font-weight:700;color:var(--color-primary)">${s.precio}</span></div>`).join('')}
          </div>
        </div>` : ''}
        ${(p.telefono || p.email_contacto) ? `
        <div>
          <div class="section-divider">Contacto directo</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">
            ${p.telefono ? `<a href="https://wa.me/${p.telefono.replace(/\D/g,'')}" target="_blank" style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:#25D366;color:white;border-radius:var(--radius-sm);font-size:0.8rem;font-weight:700;text-decoration:none">WhatsApp · ${p.telefono}</a>` : ''}
            ${p.email_contacto ? `<a href="mailto:${p.email_contacto}" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--color-border);color:var(--color-text);border-radius:var(--radius-sm);font-size:0.8rem;font-weight:600;text-decoration:none">${p.email_contacto}</a>` : ''}
          </div>
        </div>` : ''}
        <div>
          <div class="section-divider">Valoraciones de la comunidad</div>
          <div class="modal-reviews" style="margin-top:10px">
            ${reviews.map(r=>`<div class="review-item"><div class="review-author">${r.autor} ${getStars(5)}</div><div class="review-text">${r.texto}</div></div>`).join('')}
          </div>
        </div>
        <button class="btn-gold-full" onclick="closeModal('modalPerfil');openSesion('${p.id}')">Solicitar sesión</button>
      `;
      document.getElementById('modalPerfil').classList.add('open');
    }

    function openSesion(id) {
      const p = PROFESSIONALS.find(x => x.id === id);
      if (!p) return;
      currentProf = p;
      document.getElementById('sesionTitle').textContent = `Solicitar sesión con ${p.nombre}`;
      document.getElementById('modalSesion').classList.add('open');
    }

    function enviarSolicitud() {
      if (!currentProf) return;
      closeModal('modalSesion');
      showToast(`Solicitud enviada a ${currentProf.nombre}. Te responderá en máximo 24h.`, 'success');
    }

    function openOfrecerModal() {
      document.getElementById('modalOfrecer').classList.add('open');
    }

    function addServiceRow() {
      const list = document.getElementById('serviciosList');
      if (list.children.length >= 6) { showToast('Máximo 6 servicios.', 'error'); return; }
      const row = document.createElement('div');
      row.className = 'service-row';
      row.innerHTML = '<input type="text" class="form-input svc-name" placeholder="Ej: Clase individual"><input type="text" class="form-input svc-price" placeholder="40€/h"><button type="button" class="btn-remove-svc" onclick="removeServiceRow(this)">×</button>';
      list.appendChild(row);
    }

    function removeServiceRow(btn) {
      const list = document.getElementById('serviciosList');
      if (list.children.length <= 1) { btn.closest('.service-row').querySelectorAll('input').forEach(i => i.value = ''); return; }
      btn.closest('.service-row').remove();
    }

    function getServicios() {
      const rows = document.querySelectorAll('#serviciosList .service-row');
      const result = [];
      rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const nombre = inputs[0].value.trim();
        const precio = inputs[1].value.trim();
        if (nombre) result.push({ nombre, precio: precio || 'A consultar' });
      });
      return result;
    }

    function resetServiciosList() {
      const list = document.getElementById('serviciosList');
      list.innerHTML = '<div class="service-row"><input type="text" class="form-input svc-name" placeholder="Ej: Clase individual"><input type="text" class="form-input svc-price" placeholder="40€/h"><button type="button" class="btn-remove-svc" onclick="removeServiceRow(this)">×</button></div>';
    }

    let pendingProf = null;

    function publicarPerfil() {
      const cat = document.getElementById('ofrecerCat').value;
      if (!cat) { showToast('Selecciona una categoría para continuar.', 'error'); return; }

      const foto = getProfImg();
      const user = getCurrentUser();
      const idiomasChecked = [];
      const checks = document.querySelectorAll('#modalOfrecer .lang-check-item input[type="checkbox"]');
      const LANG_MAP = ['ES','EN','HE','FR','AR'];
      checks.forEach((cb, i) => { if (cb.checked && LANG_MAP[i]) idiomasChecked.push(LANG_MAP[i]); });

      const servicios = getServicios();
      pendingProf = {
        id: 'p_' + Date.now(),
        nombre: user?.name || 'Profesional',
        titulo: document.getElementById('ofrecerTitulo').value.trim(),
        especialidad: cat,
        ciudad: document.getElementById('ofrecerCiudad').value.trim() || 'España',
        modalidad: document.querySelector('input[name="ofrecerMod"]:checked')?.value || 'Online',
        experiencia: parseInt(document.getElementById('ofrecerExp').value) || 0,
        idiomas: idiomasChecked.length ? idiomasChecked : ['ES'],
        rating: 0, valoraciones: 0,
        precio: document.getElementById('ofrecerPrecio').value.trim() || (servicios[0] ? servicios[0].precio : 'A consultar'),
        bio: document.getElementById('ofrecerBio').value.trim(),
        color: String(Math.floor(Math.random() * 8)),
        formacion: document.getElementById('ofrecerFormacion').value.trim(),
        telefono: document.getElementById('ofrecerTelefono').value.trim(),
        email_contacto: document.getElementById('ofrecerEmail').value.trim(),
        servicios,
        foto,
        usuario_id: user?.userId || null
      };

      // Guardar en localStorage
      PROFESSIONALS.unshift(pendingProf);
      saveProfessionals(PROFESSIONALS);

      // Guardar en Supabase
      const sb = typeof getSupabase === 'function' ? getSupabase() : null;
      if (sb) {
        sb.from('profesionales').insert({
          nombre: pendingProf.nombre,
          titulo: pendingProf.titulo,
          especialidad: pendingProf.especialidad,
          ciudad: pendingProf.ciudad,
          modalidad: pendingProf.modalidad,
          experiencia: pendingProf.experiencia,
          idiomas: pendingProf.idiomas,
          precio: pendingProf.precio,
          bio: pendingProf.bio,
          formacion: pendingProf.formacion,
          usuario_id: pendingProf.usuario_id
        }).then(() => {}).catch(() => {});
      }

      renderProfessionals();
      closeModal('modalOfrecer');
      clearProfImg();
      document.getElementById('ofrecerCat').value = '';
      document.getElementById('ofrecerTitulo').value = '';
      document.getElementById('ofrecerBio').value = '';
      document.getElementById('ofrecerBioCount').textContent = '0';
      document.getElementById('ofrecerFormacion').value = '';
      document.getElementById('ofrecerExp').value = '';
      document.getElementById('ofrecerPrecio').value = '';
      document.getElementById('ofrecerCiudad').value = '';
      document.getElementById('ofrecerTelefono').value = '';
      document.getElementById('ofrecerEmail').value = '';
      resetServiciosList();
      pendingProf = null;
      showToast('Perfil publicado correctamente.', 'success');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
    });

    if (window.self === window.top) {
      initNav('professionals');
    } else {
      document.body.classList.add('in-iframe');
    }
    renderProfessionals();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/kehila/sw.js").catch(()=>{});
    }
  </script>
</body>
</html>
