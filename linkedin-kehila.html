<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kehilá — Professionals</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; background: var(--color-bg); }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }

    .page-inner { max-width: 1100px; margin: 0 auto; padding: 32px 32px 80px; }
    @media (max-width: 768px) { .page-inner { padding: 20px 16px 88px; } }

    /* Header */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
    .page-header-text h1 { font-family: var(--font-brand); font-size: 2rem; font-weight: 700; color: var(--color-primary); margin-bottom: 6px; }
    .page-header-text p { color: var(--color-text-muted); font-size: 0.95rem; }

    /* Filtros */
    .filters-bar { background: var(--color-white); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 20px; display: flex; gap: 12px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; box-shadow: var(--shadow-sm); }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--color-text-muted); pointer-events: none; }
    .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 0.875rem; color: var(--color-text); background: var(--color-bg); outline: none; transition: border-color var(--transition-fast); }
    .search-wrap input:focus { border-color: var(--color-primary); background: #fff; }
    .filter-select { padding: 9px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 0.875rem; color: var(--color-text); background: var(--color-bg); outline: none; cursor: pointer; }
    .filter-select:focus { border-color: var(--color-primary); }

    /* Grid profesionales */
    .professionals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 900px) { .professionals-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .professionals-grid { grid-template-columns: 1fr; } }

    .prof-card { background: var(--color-white); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 24px 20px 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow-sm); transition: box-shadow var(--transition-fast), transform var(--transition-fast); }
    .prof-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .prof-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-brand); font-size: 1.4rem; font-weight: 700; color: white; margin: 0 auto 4px; flex-shrink: 0; }
    .prof-avatar[data-color="0"] { background: #1B2E5E; }
    .prof-avatar[data-color="1"] { background: #2A6049; }
    .prof-avatar[data-color="2"] { background: #7B3F00; }
    .prof-avatar[data-color="3"] { background: #1A4A6E; }
    .prof-avatar[data-color="4"] { background: #4A1A6E; }
    .prof-avatar[data-color="5"] { background: #6E1A1A; }
    .prof-avatar[data-color="6"] { background: #1A5C38; }
    .prof-avatar[data-color="7"] { background: #4A4A00; }

    .prof-name { font-size: 1rem; font-weight: 700; color: var(--color-text); text-align: center; }
    .prof-badge-main { display: inline-block; background: var(--color-gold-light); color: var(--color-gold-dark); font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-full); text-align: center; }
    .prof-bio { font-size: 0.8rem; color: var(--color-text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .prof-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 0.75rem; color: var(--color-text-muted); }
    .prof-meta-item { display: flex; align-items: center; gap: 4px; }
    .prof-meta-item svg { width: 12px; height: 12px; }
    .prof-langs { display: flex; gap: 4px; flex-wrap: wrap; }
    .lang-pill { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-full); padding: 2px 8px; font-size: 0.68rem; font-weight: 600; color: var(--color-text-muted); }
    .prof-rating { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; font-weight: 600; color: var(--color-text); }
    .stars { display: flex; gap: 1px; }
    .star-full { color: #F59E0B; font-size: 0.85rem; }
    .prof-price { font-size: 0.8rem; color: var(--color-text-muted); }
    .prof-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-outline-primary { flex: 1; padding: 8px 10px; border: 1.5px solid var(--color-primary); border-radius: var(--radius-sm); background: transparent; color: var(--color-primary); font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all var(--transition-fast); }
    .btn-outline-primary:hover { background: var(--color-primary); color: white; }
    .btn-gold { flex: 1; padding: 8px 10px; border: none; border-radius: var(--radius-sm); background: var(--color-gold); color: var(--color-primary-dark); font-family: var(--font-ui); font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: opacity var(--transition-fast); }
    .btn-gold:hover { opacity: 0.9; }
    .no-results { text-align: center; padding: 60px 20px; color: var(--color-text-muted); grid-column: 1/-1; }
    .no-results svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: 0.3; }

    /* Modal base */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: var(--z-overlay); align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: var(--radius-lg); max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl); }
    .modal-header { padding: 24px 24px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; position: sticky; top: 0; background: white; border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding-bottom: 16px; border-bottom: 1px solid var(--color-border); }
    .modal-title { font-family: var(--font-brand); font-size: 1.25rem; font-weight: 700; color: var(--color-primary); }
    .modal-close { width: 32px; height: 32px; border: none; background: var(--color-bg); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--color-text-muted); flex-shrink: 0; transition: background var(--transition-fast); }
    .modal-close:hover { background: var(--color-border); }
    .modal-body { padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* Modal perfil */
    .prof-modal-avatar { width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-brand); font-size: 1.8rem; font-weight: 700; color: white; margin: 0 auto; }
    .prof-modal-avatar[data-color="0"] { background: #1B2E5E; }
    .prof-modal-avatar[data-color="1"] { background: #2A6049; }
    .prof-modal-avatar[data-color="2"] { background: #7B3F00; }
    .prof-modal-avatar[data-color="3"] { background: #1A4A6E; }
    .prof-modal-avatar[data-color="4"] { background: #4A1A6E; }
    .prof-modal-avatar[data-color="5"] { background: #6E1A1A; }
    .prof-modal-avatar[data-color="6"] { background: #1A5C38; }
    .prof-modal-avatar[data-color="7"] { background: #4A4A00; }
    .modal-reviews { display: flex; flex-direction: column; gap: 12px; }
    .review-item { background: var(--color-bg); border-radius: var(--radius-sm); padding: 12px 14px; }
    .review-author { font-size: 0.8rem; font-weight: 600; color: var(--color-text); margin-bottom: 4px; }
    .review-text { font-size: 0.8rem; color: var(--color-text-muted); line-height: 1.5; }

    /* Form styles */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.85rem; font-weight: 600; color: var(--color-text); }
    .form-input, .form-select, .form-textarea { padding: 10px 14px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 0.875rem; color: var(--color-text); background: white; outline: none; transition: border-color var(--transition-fast); width: 100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--color-primary); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .char-counter { font-size: 0.75rem; color: var(--color-text-muted); text-align: right; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .checkboxes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
    .checkbox-item input { cursor: pointer; }
    .btn-primary-full { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--color-primary); color: white; font-family: var(--font-ui); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background var(--transition-fast); }
    .btn-primary-full:hover { background: var(--color-primary-dark); }
    .btn-gold-full { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--color-gold); color: var(--color-primary-dark); font-family: var(--font-ui); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity var(--transition-fast); }
    .btn-gold-full:hover { opacity: 0.9; }
    .section-divider { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); padding-bottom: 8px; }
  </style>
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="page-inner">

      <!-- Header -->
      <div class="page-header">
        <div class="page-header-text">
          <h1>Kehilá Professionals</h1>
          <p>Encuentra al profesional que necesitas dentro de tu comunidad</p>
        </div>
        <button class="btn-gold" style="white-space:nowrap;padding:10px 20px;border-radius:var(--radius-sm);font-size:0.875rem;" onclick="openOfrecerModal()">
          + Ofrecer mis servicios
        </button>
      </div>

      <!-- Filtros -->
      <div class="filters-bar">
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar por nombre o especialidad..." oninput="renderProfessionals()">
        </div>
        <select class="filter-select" id="filterCat" onchange="renderProfessionals()">
          <option value="">Todas las categorías</option>
          <option>Profesor Bar Mitzvá</option>
          <option>Profesor de Hebreo</option>
          <option>Mohel</option>
          <option>Sofer STaM</option>
          <option>Shojet</option>
          <option>Profesor Torah adultos</option>
          <option>Tutor académico</option>
          <option>Orientador espiritual</option>
          <option>Músico/Jazán</option>
          <option>Fotógrafo smajot</option>
        </select>
        <select class="filter-select" id="filterCiudad" onchange="renderProfessionals()">
          <option value="">Todas las ciudades</option>
          <option>Madrid</option>
          <option>Barcelona</option>
          <option>Online</option>
        </select>
        <select class="filter-select" id="filterMod" onchange="renderProfessionals()">
          <option value="">Toda modalidad</option>
          <option>Presencial</option>
          <option>Online</option>
          <option>Ambos</option>
        </select>
      </div>

      <!-- Grid -->
      <div class="professionals-grid" id="profGrid"></div>

    </div>
  </div>

  <!-- Modal: Ver Perfil -->
  <div class="modal-overlay" id="modalPerfil">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="perfilTitle">Perfil profesional</span>
        <button class="modal-close" onclick="closeModal('modalPerfil')">×</button>
      </div>
      <div class="modal-body" id="perfilBody"></div>
    </div>
  </div>

  <!-- Modal: Solicitar Sesión -->
  <div class="modal-overlay" id="modalSesion">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="sesionTitle">Solicitar sesión</span>
        <button class="modal-close" onclick="closeModal('modalSesion')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Tipo de servicio</label>
          <select class="form-select" id="sesionTipo">
            <option>Clase individual</option>
            <option>Consulta puntual</option>
            <option>Sesión de orientación</option>
            <option>Evento / smajá</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Modalidad</label>
          <div style="display:flex;gap:16px;">
            <label class="checkbox-item"><input type="radio" name="sesionMod" value="Presencial" checked> Presencial</label>
            <label class="checkbox-item"><input type="radio" name="sesionMod" value="Online"> Online</label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Fecha preferida</label>
            <input type="date" class="form-input" id="sesionFecha">
          </div>
          <div class="form-group">
            <label class="form-label">Hora preferida</label>
            <select class="form-select" id="sesionHora">
              <option>09:00</option><option>09:30</option><option>10:00</option><option>10:30</option>
              <option>11:00</option><option>11:30</option><option>12:00</option><option>16:00</option>
              <option>16:30</option><option>17:00</option><option>17:30</option><option>18:00</option>
              <option>18:30</option><option>19:00</option><option>19:30</option><option>20:00</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mensaje para el profesional</label>
          <textarea class="form-textarea" id="sesionMensaje" placeholder="Cuéntale brevemente lo que necesitas, tu nivel actual, o cualquier detalle relevante..." maxlength="500"></textarea>
        </div>
        <button class="btn-gold-full" onclick="enviarSolicitud()">Enviar solicitud</button>
      </div>
    </div>
  </div>

  <!-- Modal: Ofrecer servicios -->
  <div class="modal-overlay" id="modalOfrecer">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Publica tu perfil profesional</span>
        <button class="modal-close" onclick="closeModal('modalOfrecer')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Categoría principal</label>
          <select class="form-select">
            <option value="">Selecciona...</option>
            <option>Profesor Bar/Bat Mitzvá</option>
            <option>Profesor de Hebreo</option>
            <option>Mohel</option>
            <option>Sofer STaM</option>
            <option>Shojet</option>
            <option>Profesor Torah adultos</option>
            <option>Tutor académico</option>
            <option>Orientador espiritual</option>
            <option>Músico/Jazán</option>
            <option>Fotógrafo smajot</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Título profesional</label>
          <input type="text" class="form-input" placeholder="Ej: Profesor de Hebreo Bíblico">
        </div>
        <div class="form-group">
          <label class="form-label">Bio profesional</label>
          <textarea class="form-textarea" id="ofrecerBio" maxlength="300" oninput="document.getElementById('ofrecerBioCount').textContent=this.value.length" placeholder="Describe tu experiencia y enfoque profesional..."></textarea>
          <span class="char-counter"><span id="ofrecerBioCount">0</span>/300</span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Años de experiencia</label>
            <input type="number" class="form-input" min="0" max="50" placeholder="5">
          </div>
          <div class="form-group">
            <label class="form-label">Precio orientativo</label>
            <input type="text" class="form-input" placeholder="Ej: Desde €40/h">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Formación y certificaciones</label>
          <input type="text" class="form-input" placeholder="Ej: Semicha, grado universitario, certificación...">
        </div>
        <div class="form-group">
          <label class="form-label">Idiomas</label>
          <div class="checkboxes-grid">
            <label class="checkbox-item"><input type="checkbox" checked> Español</label>
            <label class="checkbox-item"><input type="checkbox"> Inglés</label>
            <label class="checkbox-item"><input type="checkbox"> Hebreo</label>
            <label class="checkbox-item"><input type="checkbox"> Francés</label>
            <label class="checkbox-item"><input type="checkbox"> Árabe</label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Modalidad</label>
          <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <label class="checkbox-item"><input type="radio" name="ofrecerMod" value="Presencial"> Presencial</label>
            <label class="checkbox-item"><input type="radio" name="ofrecerMod" value="Online" checked> Online</label>
            <label class="checkbox-item"><input type="radio" name="ofrecerMod" value="Ambos"> Ambos</label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Ciudad (si presencial)</label>
          <input type="text" class="form-input" placeholder="Ej: Madrid">
        </div>
        <button class="btn-primary-full" onclick="publicarPerfil()">Publicar mi perfil profesional</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PROFESSIONALS = [
      { id:'p1', nombre:'Rabino Moshé Katz', especialidad:'Profesor Bar Mitzvá', ciudad:'Madrid', modalidad:'Presencial', experiencia:15, idiomas:['ES','HE'], rating:4.9, valoraciones:47, precio:'Desde €60/h', bio:'Especialista en preparación de Bar y Bat Mitzvá con más de 15 años de experiencia. Método personalizado adaptado a cada alumno y su familia.', color:'0', formacion:'Semicha del Beit Din de Madrid. Licenciado en Ciencias de la Educación. Formación pedagógica avanzada.' },
      { id:'p2', nombre:'Dvora Mizrahi', especialidad:'Profesora Hebreo', ciudad:'Barcelona', modalidad:'Online', experiencia:8, idiomas:['ES','EN','HE'], rating:4.8, valoraciones:32, precio:'Desde €45/h', bio:'Profesora nativa de hebreo moderno y bíblico. Clases para todos los niveles, desde principiantes hasta avanzados. Método comunicativo y dinámico.', color:'1', formacion:'Licenciada en Filología Hebrea por la Universidad Hebrea de Jerusalén. Certificación de enseñanza de hebreo como segunda lengua.' },
      { id:'p3', nombre:'Iosef Ben David', especialidad:'Sofer STaM', ciudad:'Madrid', modalidad:'Presencial', experiencia:20, idiomas:['ES','HE'], rating:4.9, valoraciones:18, precio:'A consultar', bio:'Sofer certificado especialista en mezuzot, tefilim y meguilot. Verificación y restauración de klaf. Cada pieza escrita con máxima precisión halachica.', color:'2', formacion:'Formación en scritura sagrada en Bnei Brak. Certificación del Vaad Mishmeret STaM. 20 años de práctica continua.' },
      { id:'p4', nombre:'Lea Cohen', especialidad:'Tutora académica', ciudad:'Barcelona', modalidad:'Online', experiencia:6, idiomas:['ES','EN'], rating:4.7, valoraciones:24, precio:'Desde €35/h', bio:'Tutora de matemáticas, física y química para ESO y Bachillerato. Método claro y estructurado con resultados probados en selectividad.', color:'3', formacion:'Grado en Ingeniería por la UPC. Máster en Pedagogía. Experiencia en academia desde 2018.' },
      { id:'p5', nombre:'Jazán Aaron Peretz', especialidad:'Músico/Jazán', ciudad:'Madrid', modalidad:'Ambos', experiencia:12, idiomas:['ES','HE'], rating:5.0, valoraciones:28, precio:'A consultar', bio:'Jazán con voz de tenor. Especialista en bodas, Bar y Bat Mitzvá y eventos comunitarios. Estilo sefaradí tradicional y repertorio moderno.', color:'4', formacion:'Conservatorio Superior de Música de Madrid. Formación en hazanut sefaradí con maestros en Israel.' },
      { id:'p6', nombre:'David Levi', especialidad:'Profesor Torah adultos', ciudad:'Online', modalidad:'Online', experiencia:10, idiomas:['EN','HE'], rating:4.8, valoraciones:41, precio:'Desde €50/h', bio:'Shiurim personalizados en Torah, Talmud y Halaká para adultos. Enfoque académico y práctico. Ideal para baalei teshuva y aquellos que desean profundizar.', color:'5', formacion:'Yeshivá Kerem B\'Yavneh. Semicha. Doctorado en Talmud por la Universidad Bar-Ilan.' },
      { id:'p7', nombre:'Miriam Goldberg', especialidad:'Orientadora espiritual', ciudad:'Online', modalidad:'Online', experiencia:9, idiomas:['ES','EN'], rating:4.9, valoraciones:37, precio:'Desde €70/h', bio:'Acompañamiento espiritual en procesos de Guiur, retorno a la práctica judía y orientación personal desde una perspectiva judía contemporánea.', color:'6', formacion:'Máster en Psicología Humanista. Formación en orientación espiritual judía. Supervisada por el Beit Din de Madrid.' },
      { id:'p8', nombre:'Yair Katz', especialidad:'Fotógrafo smajot', ciudad:'Madrid/BCN', modalidad:'Presencial', experiencia:7, idiomas:['ES','EN'], rating:5.0, valoraciones:61, precio:'Desde €400/evento', bio:'Fotógrafo especialista en smajot judíos. Bar y Bat Mitzvá, bodas y brit milá. Estilo reportaje natural que captura la emoción de cada momento.', color:'7', formacion:'Escuela de Fotografía EFTI Madrid. Especialización en fotografía de eventos y celebraciones. Portfolio disponible bajo solicitud.' }
    ];

    const REVIEWS_MOCK = {
      p1: [{ autor:'Familia Benveniste', texto:'Moshé preparó a nuestro hijo para su Bar Mitzvá de forma excepcional. El niño disfrutó cada clase y el resultado fue emocionante.' }, { autor:'Rachel A.', texto:'Muy profesional y paciente. Adapta su método a cada alumno.' }, { autor:'David M.', texto:'Altamente recomendado. Sabe transmitir no solo el texto sino el significado.' }],
      p2: [{ autor:'Sara T.', texto:'Dvora es una profesora increíble. En 6 meses pasé de cero a poder leer el siddur.' }, { autor:'Avi G.', texto:'Clases muy dinámicas, nunca me aburro. Aprendo muchísimo en cada sesión.' }, { autor:'Noa B.', texto:'Perfecta para comenzar con el hebreo. Mucha paciencia y claridad.' }],
      p3: [{ autor:'Beit El Madrid', texto:'Las mezuzot de Iosef son kasher al 100%. Lleva años sirviendo a nuestra comunidad.' }, { autor:'Moshe G.', texto:'Verificó mis tefilim y me explicó todo el proceso. Muy serio y profesional.' }, { autor:'Admin', texto:'De confianza total. Lo recomendamos para toda la comunidad.' }],
      default: [{ autor:'Miembro comunidad', texto:'Excelente profesional, muy recomendable.' }, { autor:'Usuario verificado', texto:'Muy buena experiencia, volvería a contratar.' }, { autor:'Comunidad Kehilá', texto:'Un profesional que aporta mucho a nuestra comunidad.' }]
    };

    let currentProf = null;

    function getStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5 ? 1 : 0;
      let html = '<div class="stars">';
      for (let i = 0; i < full; i++) html += '<span class="star-full">★</span>';
      if (half) html += '<span class="star-full" style="opacity:0.5">★</span>';
      html += '</div>';
      return html;
    }

    function renderProfessionals() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('filterCat').value;
      const ciudad = document.getElementById('filterCiudad').value;
      const mod = document.getElementById('filterMod').value;

      const filtered = PROFESSIONALS.filter(p => {
        const matchQ = !q || p.nombre.toLowerCase().includes(q) || p.especialidad.toLowerCase().includes(q) || p.bio.toLowerCase().includes(q);
        const matchCat = !cat || p.especialidad === cat;
        const matchCiudad = !ciudad || p.ciudad.includes(ciudad);
        const matchMod = !mod || p.modalidad === mod;
        return matchQ && matchCat && matchCiudad && matchMod;
      });

      const grid = document.getElementById('profGrid');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.182 16.318A4.486 4.486 0 0 0 12.016 15a4.486 4.486 0 0 0-3.198 1.318M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z"/></svg><p>No se encontraron profesionales con esos filtros.</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="prof-card">
          <div class="prof-avatar" data-color="${p.color}">${p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div class="prof-name">${p.nombre}</div>
          <div style="text-align:center"><span class="prof-badge-main">${p.especialidad}</span></div>
          <p class="prof-bio">${p.bio}</p>
          <div class="prof-meta">
            <span class="prof-meta-item">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
              ${p.ciudad}
            </span>
            <span class="prof-meta-item">· ${p.experiencia} años exp.</span>
            <span style="background:var(--color-info-light);color:var(--color-info);font-size:0.68rem;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);">${p.modalidad}</span>
          </div>
          <div class="prof-langs">${p.idiomas.map(l=>`<span class="lang-pill">${l}</span>`).join('')}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div class="prof-rating">${getStars(p.rating)} ${p.rating} <span style="font-weight:400;color:var(--color-text-muted);font-size:0.75rem">(${p.valoraciones})</span></div>
            <span class="prof-price">${p.precio}</span>
          </div>
          <div class="prof-actions">
            <button class="btn-outline-primary" onclick="openPerfil('${p.id}')">Ver perfil</button>
            <button class="btn-gold" onclick="openSesion('${p.id}')">Contactar</button>
          </div>
        </div>
      `).join('');
    }

    function openPerfil(id) {
      const p = PROFESSIONALS.find(x => x.id === id);
      if (!p) return;
      currentProf = p;
      document.getElementById('perfilTitle').textContent = p.nombre;
      const reviews = REVIEWS_MOCK[id] || REVIEWS_MOCK.default;
      document.getElementById('perfilBody').innerHTML = `
        <div style="text-align:center">
          <div class="prof-modal-avatar" data-color="${p.color}">${p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div style="font-family:var(--font-brand);font-size:1.25rem;font-weight:700;color:var(--color-primary);margin-top:12px">${p.nombre}</div>
          <span class="prof-badge-main" style="margin-top:6px;display:inline-block">${p.especialidad}</span>
        </div>
        <div>
          <div class="section-divider">Sobre mí</div>
          <p style="font-size:0.875rem;color:var(--color-text-muted);line-height:1.6;margin-top:10px">${p.bio}</p>
        </div>
        <div>
          <div class="section-divider">Formación y certificaciones</div>
          <p style="font-size:0.875rem;color:var(--color-text-muted);line-height:1.6;margin-top:10px">${p.formacion}</p>
        </div>
        <div>
          <div class="section-divider">Valoraciones de la comunidad</div>
          <div class="modal-reviews" style="margin-top:10px">
            ${reviews.map(r=>`<div class="review-item"><div class="review-author">${r.autor} ${getStars(5)}</div><div class="review-text">${r.texto}</div></div>`).join('')}
          </div>
        </div>
        <button class="btn-gold-full" onclick="closeModal('modalPerfil');openSesion('${p.id}')">Solicitar sesión</button>
      `;
      document.getElementById('modalPerfil').classList.add('open');
    }

    function openSesion(id) {
      const p = PROFESSIONALS.find(x => x.id === id);
      if (!p) return;
      currentProf = p;
      document.getElementById('sesionTitle').textContent = `Solicitar sesión con ${p.nombre}`;
      document.getElementById('modalSesion').classList.add('open');
    }

    function enviarSolicitud() {
      if (!currentProf) return;
      closeModal('modalSesion');
      showToast(`Solicitud enviada a ${currentProf.nombre}. Te responderá en máximo 24h.`, 'success');
    }

    function openOfrecerModal() {
      document.getElementById('modalOfrecer').classList.add('open');
    }

    function publicarPerfil() {
      closeModal('modalOfrecer');
      showToast('Tu perfil ha sido enviado para revisión. El equipo lo aprobará en 24-48h.', 'success');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
    });

    initNav('professionals');
    renderProfessionals();
  </script>
</body>
</html>
