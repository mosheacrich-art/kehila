<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kehilá — Beit HaRav</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      background: var(--color-bg);
    }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }

    .rav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }
    @media (max-width: 768px) { .rav-inner { padding: 20px 16px 100px; } }

    /* ─── Tabs ─── */
    .rav-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .rav-tabs::-webkit-scrollbar { display: none; }

    .rav-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: all var(--transition-fast);
      font-family: inherit;
    }
    .rav-tab svg { width: 16px; height: 16px; }
    .rav-tab:hover { color: var(--color-text); }
    .rav-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .rav-tab { padding: 9px 12px; font-size: 0.8rem; gap: 0; }
      .rav-tab svg { display: none; }
    }

    /* ─── Iframe panels ─── */
    .rav-panel { display: none; }
    .rav-panel.active { display: block; }

    .rav-iframe {
      width: 100%;
      border: none;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      min-height: calc(100vh - 160px);
      display: block;
    }
    @media (max-width: 768px) {
      .rav-iframe { min-height: calc(100vh - 140px); }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kehilá">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="main-content">
  <div class="rav-inner">

    <h1 style="font-size:1.5rem;font-weight:700;color:var(--color-text);margin-bottom:20px;">Beit HaRav</h1>

    <!-- ═══ TABS ═══ -->
    <div class="rav-tabs" id="rav-tabs">
      <button class="rav-tab active" data-tab="preguntas">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"/></svg>
        Preguntas al Rav
      </button>
      <button class="rav-tab" data-tab="citas">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5m-9-6h.008v.008H12v-.008ZM12 15h.008v.008H12V15Zm0 2.25h.008v.008H12v-.008ZM9.75 15h.008v.008H9.75V15Zm0 2.25h.008v.008H9.75v-.008ZM7.5 15h.008v.008H7.5V15Zm0 2.25h.008v.008H7.5v-.008Zm6.75-4.5h.008v.008h-.008v-.008Zm0 2.25h.008v.008h-.008V15Zm0 2.25h.008v.008h-.008v-.008Zm2.25-4.5h.008v.008H18v-.008Zm0 2.25h.008v.008H18V15Z"/></svg>
        Cita con el Rav
      </button>
    </div>

    <!-- ═══ PANELS ═══ -->
    <div class="rav-panel active" id="panel-preguntas">
      <iframe class="rav-iframe" src="rav.html" title="Preguntas al Rav" id="iframe-preguntas"></iframe>
    </div>

    <div class="rav-panel" id="panel-citas">
      <iframe class="rav-iframe" src="citas-rabino.html" title="Cita con el Rav" id="iframe-citas" loading="lazy"></iframe>
    </div>

  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
  buildSidebar('rav-hub');
  buildBottomNav('rav-hub');

  const tabs = document.querySelectorAll('.rav-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.rav-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + target).classList.add('active');
    });
  });
</script>
</body>
</html>
