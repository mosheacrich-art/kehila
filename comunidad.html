<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabad Barcelona — Comunidad</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      background: var(--color-bg);
    }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }

    .com-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }
    @media (max-width: 768px) { .com-inner { padding: 20px 16px 100px; } }

    /* ─── Tabs ─── */
    .com-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .com-tabs::-webkit-scrollbar { display: none; }

    .com-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: all var(--transition-fast);
      font-family: inherit;
    }
    .com-tab svg { width: 16px; height: 16px; }
    .com-tab:hover { color: var(--color-text); }
    .com-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .com-tab { padding: 9px 12px; font-size: 0.8rem; gap: 0; }
      .com-tab svg { display: none; }
    }

    /* ─── Iframe panels ─── */
    .com-panel { display: none; }
    .com-panel.active { display: block; }

    .com-iframe {
      width: 100%;
      border: none;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      min-height: calc(100vh - 180px);
      display: block;
    }
    @media (max-width: 768px) {
      .com-iframe { min-height: calc(100vh - 160px); }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jabad Barcelona">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="main-content">
  <div class="com-inner">

    <h1 style="font-size:1.5rem;font-weight:700;color:var(--color-text);margin-bottom:20px;">Comunidad</h1>

    <!-- ═══ TABS ═══ -->
    <div class="com-tabs" id="com-tabs">
      <button class="com-tab active" data-tab="marketplace">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 0 0 3.75-.615A2.993 2.993 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 0 0 2.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.189-1.19A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72"/></svg>
        Marketplace
      </button>
      <button class="com-tab" data-tab="tienda">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
        Tienda
      </button>
      <button class="com-tab" data-tab="negocios">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"/></svg>
        Negocios
      </button>
      <button class="com-tab" data-tab="profesionales">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 0 1-.825-.242m9.345-8.334a2.126 2.126 0 0 0-.476-.095 48.64 48.64 0 0 0-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0 0 11.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>
        Profesionales
      </button>
      <button class="com-tab" data-tab="voluntarios">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>
        Voluntarios
      </button>
    </div>

    <!-- ═══ PANELS ═══ -->
    <div class="com-panel active" id="panel-marketplace">
      <iframe class="com-iframe" src="wallap.html" title="Marketplace" id="iframe-marketplace"></iframe>
    </div>

    <div class="com-panel" id="panel-tienda">
      <iframe class="com-iframe" src="tienda.html" title="Tienda" id="iframe-tienda" loading="lazy"></iframe>
    </div>

    <div class="com-panel" id="panel-negocios">
      <iframe class="com-iframe" src="business.html" title="Negocios" id="iframe-negocios" loading="lazy"></iframe>
    </div>

    <div class="com-panel" id="panel-profesionales">
      <iframe class="com-iframe" src="linkedin-kehila.html" title="Profesionales" id="iframe-profesionales" loading="lazy"></iframe>
    </div>

    <div class="com-panel" id="panel-voluntarios">
      <iframe class="com-iframe" src="voluntariado.html" title="Voluntarios" id="iframe-voluntarios" loading="lazy"></iframe>
    </div>

  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
  buildSidebar('comunidad');
  buildBottomNav('comunidad');

  // Tab switching
  const tabs = document.querySelectorAll('.com-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.com-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + target).classList.add('active');
    });
  });
</script>
</body>
</html>
