<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jabad Barcelona — Servicios Beit Jabad</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      background: var(--color-bg);
    }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }

    .hub-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 28px 80px;
    }
    @media (max-width: 768px) { .hub-inner { padding: 72px 16px 100px; } }

    .hub-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .hub-tabs::-webkit-scrollbar { display: none; }

    .hub-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: all var(--transition-fast);
      font-family: inherit;
    }
    .hub-tab svg { width: 16px; height: 16px; }
    .hub-tab:hover { color: var(--color-text); }
    .hub-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .hub-tab { padding: 9px 12px; font-size: 0.8rem; gap: 0; }
      .hub-tab svg { display: none; }
    }

    .hub-panel { display: none; }
    .hub-panel.active { display: block; }

    .hub-iframe {
      width: 100%;
      border: none;
      min-height: calc(100vh - 160px);
      display: block;
    }
    @media (max-width: 768px) { .hub-iframe { min-height: calc(100vh - 140px); } }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jabad Barcelona">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="main-content">
  <div class="hub-inner">

    <h1 style="font-size:1.5rem;font-weight:700;color:var(--color-text);margin-bottom:20px;">Servicios Beit Jabad</h1>

    <div class="hub-panel active" id="panel-servicios">
      <iframe class="hub-iframe" src="servicios.html" title="Servicios Beit Jabad" id="iframe-servicios"></iframe>
    </div>

  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
  initNav('esencial');
</script>
</body>
</html>
