<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kehilá — Fundamentos</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .main-content {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      background: var(--color-bg);
    }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }

    .hub-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }
    @media (max-width: 768px) { .hub-inner { padding: 20px 16px 100px; } }

    .hub-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .hub-tabs::-webkit-scrollbar { display: none; }

    .hub-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: all var(--transition-fast);
      font-family: inherit;
    }
    .hub-tab svg { width: 16px; height: 16px; }
    .hub-tab:hover { color: var(--color-text); }
    .hub-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .hub-tab { padding: 9px 12px; font-size: 0.8rem; gap: 0; }
      .hub-tab svg { display: none; }
    }

    .hub-panel { display: none; }
    .hub-panel.active { display: block; }

    .hub-iframe {
      width: 100%;
      border: none;
      min-height: calc(100vh - 160px);
      display: block;
    }
    @media (max-width: 768px) { .hub-iframe { min-height: calc(100vh - 140px); } }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b2e5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kehilá">
  <link rel="apple-touch-icon" href="img/icon-192.png">
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="main-content">
  <div class="hub-inner">

    <h1 style="font-size:1.5rem;font-weight:700;color:var(--color-text);margin-bottom:20px;">Fundamentos</h1>

    <div class="hub-tabs" id="hub-tabs">
      <button class="hub-tab active" data-tab="kosher">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z"/></svg>
        Kosher
      </button>
      <button class="hub-tab" data-tab="siddur">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
        Siddur
      </button>
      <button class="hub-tab" data-tab="servicios">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"/></svg>
        Servicios Comunitarios
      </button>
    </div>

    <div class="hub-panel active" id="panel-kosher">
      <iframe class="hub-iframe" src="kosher.html" title="Kosher" id="iframe-kosher"></iframe>
    </div>
    <div class="hub-panel" id="panel-siddur">
      <iframe class="hub-iframe" src="siddur.html" title="Siddur" id="iframe-siddur" loading="lazy"></iframe>
    </div>
    <div class="hub-panel" id="panel-servicios">
      <iframe class="hub-iframe" src="servicios.html" title="Servicios Comunitarios" id="iframe-servicios" loading="lazy"></iframe>
    </div>

  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
  buildSidebar('esencial');
  buildBottomNav('esencial');

  const tabs = document.querySelectorAll('.hub-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.hub-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + target).classList.add('active');
    });
  });
</script>
</body>
</html>
